notes: 'DAS Vitamin Cocktail for Dasycladales Seawater Medium.

  Provides essential vitamins for marine algae culture.


  Preparation: Add Tricine to approximately 85 mL deionized water while stirring

  continuously. Adjust pH to 8.0 with NaOH or HCl. Add remaining vitamin components

  sequentially: thiamine, biotin, pantothenate, PABA. Bring to 100 mL total volume.


  IMPORTANT: Add Vitamin B12 AFTER autoclaving (heat-sensitive).


  Sterilization: Filter sterilize through 0.45 µm Millipore filter.

  DO NOT AUTOCLAVE (vitamins are heat-sensitive).


  Storage: Freezer temperature (-20°C) in darkness.


  Final stock concentrations: Thiamine (2.0 mM), Biotin (0.041 mM),

  Vitamin B12 (0.0059 mM), Pantothenate (0.091 mM), PABA (0.291 mM)


  Final concentrations in medium: Thiamine (0.99 µM), Biotin (0.02 µM),

  Vitamin B12 (0.0029 µM), Pantothenate (0.046 µM), PABA (0.15 µM)

  '
