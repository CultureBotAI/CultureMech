notes: 'Trace metal stock solution for Bold Basal Medium (BBM) and related algae culture
  media.

  Provides essential micronutrients (Zn, Mn, Mo, Cu, Co) for freshwater algae.


  Preparation: Add components to approximately 900 mL deionized water in the order
  specified

  while stirring continuously. Add H2SO4 FIRST to acidify the solution before adding
  metals.

  This prevents precipitation. Bring to 1 L total volume.


  Storage: Room temperature in darkness. The acidic pH keeps metals in solution.


  Final stock concentrations: ZnSO4·7H2O (1.50 µM), MnCl2·4H2O (0.36 µM),

  MoO3 (0.26 µM), CuSO4·5H2O (0.31 µM), Co(NO3)2·6H2O (0.084 µM)

  '
