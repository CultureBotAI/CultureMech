notes: 'Macro Component 1 for J Medium (UTEX).

  First of two macronutrient stock solutions for J Medium.

  Provides nitrogen and phosphorus sources, plus buffering capacity.


  Preparation: Add components to approximately 900 mL deionized water in the order

  listed while stirring continuously. Adjust pH to 8.5-8.8 with NaOH or HCl.

  Bring to 1 L total volume.


  Storage: Refrigerator temperature (4°C).


  Final stock concentrations: NaNO3 (7.9 mM), Na2HPO4 (0.05 mM),

  K2HPO4 (0.22 mM), Tricine (1.4 mM)


  Note: Tricine provides buffering capacity to maintain pH in the alkaline range

  suitable for freshwater algae.

  '
