preparation_notes: 'Dissolve ingredients except carbonates, trimethylamine, vitamins,
  cysteine and sulfide, then sparge medium with 80% N2 and 20% CO2 gas mixture for
  30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere into anoxic
  Hungate-type tubes or serum vials and autoclave. Complete medium by adding sterile
  anoxic stock solutions of trimethylamine, vitamins (sterilized by filtration), cysteine
  and sulfide prepared under 100% N2 gas atmosphere and bicarbonate and carbonate
  from sterile anoxic stock solutions prepared under 80% N2 and 20% CO2 gas mixture.
  Adjust pH of complete medium to 6.9 - 7.0, if necessary.


  Original volume: 1011 mL'
