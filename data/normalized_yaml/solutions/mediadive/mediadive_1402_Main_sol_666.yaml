preparation_notes: 'Dissolve ingredients (except bicarbonate, succinate, yeast extract,
  cysteine and sulfide), bring medium to the boil, then cool to room temperature under
  100% CO2 gas atmosphere. Add the bicarbonate and equilibrate the medium with the
  CO2 gas to pH 6.8. Distribute under 100% CO2 gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Thereafter, add succinate, yeast extract, cysteine
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas atmosphere.
  Adjust pH of complete medium to 6.7 - 6.8, if necessary.

  Note: Supplementing the medium with 1.50 g/l agar stimulates growth of strains after
  resuscitation from ampoules.'
