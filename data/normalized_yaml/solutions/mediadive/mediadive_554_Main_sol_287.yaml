preparation_notes: 'Dissolve ingredients (except bicarbonate, vitamins, cysteine and
  sulfide) and sparge medium with 80% H2 and 20% CO2 gas mixture for 30 - 45 min to
  make it anoxic. Add and dissolve bicarbonate, adjust pH to 6.8 and then dispense
  medium under 80% H2 and 20% CO2 gas atmosphere into anoxic Hungate-type tubes or
  serum bottles and autoclave. After sterilization add cysteine and sulfide from sterile
  anoxic stock solutions autoclaved under 100% N2 gas. Vitamins are prepared under
  100% N2 gas atmosphere and sterilized by filtration. Adjust pH of complete medium
  to 6.8 - 7.0. For incubation use sterile 80% H2 and 20% CO2 gas mixture at one atmospheres
  of pressure.


  Original volume: 1011 mL'
