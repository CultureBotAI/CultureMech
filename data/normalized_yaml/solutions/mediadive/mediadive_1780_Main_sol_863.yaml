preparation_notes: "Anaerobically dispense liquid minimal medium in 10-ml portions\
  \ into 100-ml serum vials under an atmosphere of N2/CO2 (80:20). Seal vials with\
  \ butyl rubber stoppers secured with aluminium crimp seals. Sterilize by autoclaving\
  \ for 15 minutes at 121°C. Prior to inoculation, pressurize bottles to 2 x 102 kPa\
  \ with H2/CO2. For solidified plating medium, add the following components per liter\
  \ of liquid minimal medium: \nAdd titanium(III) citrate solution to warm (60°C)\
  \ agar medium after autoclaving. For preparation of solidified agar medium.\n\n\
  Original volume: 1016 mL"
