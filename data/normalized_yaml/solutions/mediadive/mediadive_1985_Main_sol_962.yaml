preparation_notes: 'Dissolve ingredients (except bicarbonate, acetate and vitamins),
  boil medium to dissolve AQDS, then cool to room temperature under 80% N2 and 20%
  CO2 gas atmosphere. Add solid bicarbonate and adjust pH to 6.8 - 7.0. Dispense medium
  under 80% N2 and 20% CO2 gas atmosphere into anoxic Hungate-type tubes or serum
  vials and autoclave. Add acetate and vitamins from sterile anoxic stock solutions
  prepared under 100% N2 gas. Vitamins should be sterilized by filtration. Adjust
  pH of complete medium to 7.0, if necessary.


  Original volume: 1011 mL'
