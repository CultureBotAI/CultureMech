preparation_notes: "Adjust pH to 7.2.\nMix components thoroughly, except agar, and\
  \ adjust pH to 7.0. Add agarose to the medium and autoclave under a N2 gas atmosphere.\
  \ After cooling to 50C, add the following solutions to the medium aseptically and\
  \ anaerobically (autoclaved or *filter-sterilized): \nKeep the medium temperature\
  \ at 50C until the medium is distributed into sterile screw-capped test tubes as\
  \ described below.\nAdjust pH to 7.0 - 7.2 with sterile HCl or NaOH solution. Then,\
  \ aseptically and anaerobically, add the following solution (autoclaved): \nDispense\
  \ the medium to sterile screw-capped test tubes (typically 12 ml medium into 125\
  \ by 15 mm test tubes) under air and cap. Allow to stand until the medium is solidified\
  \ and a O2-gradient formed (as evidenced by a pink upper oxic zone and a colorless\
  \ lower anoxic zone). Inoculate cells just below the pink-colorless interface in\
  \ the medium tube using a syringe.\n\nOriginal volume: 1019 mL"
