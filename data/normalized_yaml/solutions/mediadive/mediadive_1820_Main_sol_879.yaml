preparation_notes: 'Dissolve ingredients (except bicarbonate, yeast extract, fructose,
  vitamins, and reducing agents), sparge medium with 80% N2 and 20% CO2 gas mixture
  for 30 - 45 min to make it anoxic and adjust pH to 5.0. Dispense medium under the
  same gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave
  at 121°C for 15 min. Add yeast extract, fructose, vitamins (sterilized by filtration),
  cysteine, and sulfide from sterile stock solutions prepared under a 100% N2 gas
  atmosphere and bicarbonate from a sterile stock solution prepared under an 80% N2
  and 20% CO2 gas atmosphere. Adjust the pH of the complete medium to 5.9!


  Original volume: 1011 mL'
