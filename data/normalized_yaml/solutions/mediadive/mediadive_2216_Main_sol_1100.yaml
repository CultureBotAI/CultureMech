preparation_notes: 'Dissolve ingredients (except bicarbonate, lactate and sulfide)
  and sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic. Dispense medium
  under same gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
  Add lactate and sulfide form sterile anoxic stock solutions prepared under 100%
  N2 gas and bicarbonate from a sterile anoxic stock solution prepared under 80% N2
  and 20% CO2 gas mixture. Adjust pH of the complete medium to 7.2, if necessary.


  Original volume: 1018 mL'
