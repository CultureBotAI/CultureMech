preparation_notes: "Add components to distilled water and bring volume to 1.0 L. Autoclave\
  \ and let it stand for three days. Decant the clear solution into another empty\
  \ sterile bottle. Then, aseptically add per liter the following solutions (autoclaved\
  \ or *filter-sterilized): \nDistribute the medium into culture vessels, replace\
  \ the gas phase with N2 containing 5% O2 (by vol.) and close with butyl rubber stoppers.\n\
  \nOriginal volume: 54 mL"
