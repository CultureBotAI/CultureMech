preparation_notes: Mix components thoroughly except the glucose solution and Vitamin
  solution. Gently heat and bring to a boil. Autoclave and then cool to 45 - 50C.
  Aseptically add the filter-sterilized glucose solution and Vitamin solution. Adjust
  pH to 7.2 - 7.4 with sterile KOH, if necessary. For preparation of solid medium,
  add 15 g/L agar.
