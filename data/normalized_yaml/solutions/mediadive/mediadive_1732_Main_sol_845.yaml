preparation_notes: 'Dissolve ingredients except trace elements, vitamins and catalase,
  adjust pH to 7.2 - 7.4, bring medium to the boil and cool to room temperature under
  100% N2 gas atmosphere. Dispense under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. To complete the medium add trace elements, vitamins
  and catalase from sterile anoxic stock solutions prepared under 100% N2 gas atmosphere.
  Vitamins and catalase should be sterilized by filtration. After inoculation, inject
  sterile air into the culture vessel up to about 20% of the total gas volume (i.e.,
  4 parts N2 and 1 part air).


  Original volume: 1003 mL'
