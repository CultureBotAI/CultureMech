preparation_notes: "Prepare the growth medium as follows:\nDilute 100 ml solution\
  \ 1 to 1 litre with 2% NaCl and then add 1 ml of solution 3, 1 ml of\r\nthe trace\
  \ elements, and 0.1 ml of solution 2. If solid media is required add 1.5% agar.\r\
  \nDispense the medium into the growth vessels. If using sealed vessels it is appropriate\
  \ to\r\nadd 25% methane to the gas phase and autoclave at 121C (15psi) for 15 minutes.\r\
  \nAutoclave the phosphate buffer separately. When the growth medium is cool 10 ml/l\
  \ of\r\nthe phosphate buffer is added - if too warm the phosphate will precipitate.\
  \ Liquid\r\ncultures should be grown with shaking."
