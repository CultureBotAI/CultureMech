preparation_notes: "Mix components thoroughly, bring to a boil for 5 min, then, cool\
  \ down under a stream of a N2-CO2 (80:20, v/v) gas mixture. Distribute the medium\
  \ into Balch-type culture tubes (5 ml each) under the same gas mixture, seal with\
  \ thick blue butyl rubber stoppers and autoclave.\nTo complete the medium, add the\
  \ following solutions to each of culture tubes (containing 5 ml medium) from sterile\
  \ anaerobic stocks (autoclaved or *filter-sterilized): \nPressurize the tubes to\
  \ 70 kPa H2-CO2 (80:20, v/v) and allow to stand for at least 7 hr. Check the final\
  \ pH of the medium to be about 5.7.\n\nOriginal volume: 1011 mL"
