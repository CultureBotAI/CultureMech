preparation_notes: 'Dissolve ingredients (except thiosulfate and sodium sulfide),
  adjust pH to 6.0, boil medium for 1 min, then cool to room temperature under 80%
  H2 and 20% CO2 gas atmosphere. Dispense under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials to 30% of their volume and autoclave. Add sodium thiosulfate
  from an anoxic stock solution prepared under 100% N2 gas and sterilized by filtration.
  Reduce medium with a sterile, neutralized solution of sodium sulfide prepared under
  100% N2 gas . Adjust pH of complete medium to 6.0, if necessary.

  After inoculation pressurize cultivation vessels to   2 bar overpressure using sterile
  80% H2 and 20% CO2 gas mixture.


  Original volume: 1020 mL'
