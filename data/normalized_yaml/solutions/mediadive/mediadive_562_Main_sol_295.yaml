preparation_notes: 'Dissolve ingredients except carbonate, glucose, vitamins, and
  cysteine, then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Dispense medium under the same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add glucose, vitamins (sterilized by filtration),
  and cysteine from sterile anoxic stock solutions prepared under 100% N2 gas and
  carbonate from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2
  gas mixture. Prior to use adjust pH of complete medium to 7.3 - 7.5, if necessary.

  Note: For transfers use 5 - 10% (v/v) inoculum.


  Original volume: 1003 mL'
