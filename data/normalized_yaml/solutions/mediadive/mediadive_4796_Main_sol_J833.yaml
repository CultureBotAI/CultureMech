  \ vessels leaving 40 to 50% volume of gas phase (e.g., 30 ml of the medium in a\
  \ 50 ml serum bottle) and seal with butyl rubber stoppers. Replace the gas phase\
  \ with a N2-CO2-H2 (8:1:1, v/v) gas mixture. Finally, add the following reducing\
  \ solution and chlorosolvent (per liter): \nAdjust pH to 7.0, if necessary.\n\n\
