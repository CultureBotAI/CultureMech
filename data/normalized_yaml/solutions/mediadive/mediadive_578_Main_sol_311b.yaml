preparation_notes: 'Dissolve ingredients (except phosphates, carbonate, vitamins,
  cysteine and sulfide) and sparge medium with 80% N2 and 20% CO2 gas mixture for
  30 - 45 min to make it anoxic. Dispense under same gas atmosphere in anoxic Hungate-type
  tubes or serum vials and autoclave. Add phosphates, vitamins (sterilized by filtration),
  cysteine and sulfide to the medium after autoclaving from sterile stock solutions
  prepared under 100% N2 gas and carbonate from a sterile stock solution prepared
  under 80% N2 and 20% CO2 gas mixture. Adjust pH of completed medium to pH 7.5 -
  7.7.


  Original volume: 1005 mL'
