preparation_notes: "Mix components, except NaHCO3 and vitamin solution, and bring\
  \ to a boil for 5-10 sec. Cool down under a stream of H2-CO2 (80:20, v/v) and add\
  \ NaHCO3 to the medium. Dispense the medium into culture vessels under a stream\
  \ of H2-CO2 (80:20, v/v), seal with butyl rubber stoppers and autoclave. Prior to\
  \ inoculation, add per liter the following solutions (autoclaved or *filter-sterilized\
  \ and stored under a N2 atmosphere). \n\nOriginal volume: 1023 mL"
