preparation_notes: 'Dissolve ingredients (except yeast extract, Casamino acids, vitamins,
  carbonate, hydrogenphosphate and sulfide), bring medium to the boil, then cool to
  room temperature under 80% N2 and 20% CO2 gas mixture. Dispense under same gas atmosphere
  into anoxic Hungate-type tubes or serum vials and autoclave. After sterilization
  add yeast extract, Casamino acids, hydrogenphosphate and sulfide from sterile anoxic
  stock solutions prepared under 100% N2 gas and carbonate from a sterile anoxic stock
  solution prepared under 80% N2 and 20% CO2 gas mixture. Vitamins are prepared under
  100% N2 gas atmosphere and strerilized by filtration. Adjust pH of complete medium
  to 7.0, if necessay.


  Original volume: 1002 mL'
