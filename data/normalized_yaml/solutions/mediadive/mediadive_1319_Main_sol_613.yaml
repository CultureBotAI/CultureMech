preparation_notes: 'Dissolve ingredients (except glucose, calcium chloride, vitamins
  and reducing agents), adjust pH to 6.5 - 6.8 and sparge medium with 100% N2 gas
  for 30 - 45 min to make it anoxic. Dispense under same gas atmosphere into anoxic
  Hungate-type tubes or serum vials to 30% of their volume and autoclave. Add glucose,
  calcium chloride, vitamins (sterilized by filtration), sulfide and cysteine from
  sterile anoxic stock solutions prepared under 100% N2 gas atmosphere.


  Original volume: 1011 mL'
