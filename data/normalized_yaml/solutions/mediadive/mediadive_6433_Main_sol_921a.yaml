preparation_notes: 'Combine Solutions 1-3 with Trace Elements and distilled water.
  Then dispense into growth vessels and autoclave under 20% methane in air (or strain
  specific other ratio) atmosphere (if not using agar).

  Add separately autoclaved phosphate buffer (10 ml/L) to autoclaved and cooled medium.
  If phosphate buffer is added to warm medium, it will precipitate.

  Liquid cultures should be grown with shaking.'
