preparation_notes: 'Mix ingredients except sulfur and Na2S x 9H2O, adjust pH to 7.0-7.2
  and autoclave under a N2 atmosphere. Steam sulfur for 3 hr on each of 3 successive
  days. Neutralize Na2S x 9H2O as a 5% solution and autoclave under a N2 gas atmosphere.
  Distribute the medium and sulfur into culture vessels under a N2 stream, and seal
  with butyl rubber stoppers. Prior to inoculation, add the sterile Na2S x 9H2O solution,
  and readjust pH to 7.0-7.2, if necessary.

  Comment:

  Most of <I>Thermococcus</I> strains will grow in this medium supplemented with 5.0
  g/L maltodextrin and omitted sulfur.


  Original volume: 1020 mL'
