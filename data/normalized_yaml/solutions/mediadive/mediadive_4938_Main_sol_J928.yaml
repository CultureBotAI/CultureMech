preparation_notes: "Mix components, adjust pH to 6.6 - 6.8 and autoclave. After cooling,\
  \ add the following solutions (filter-sterilized) to the medium: \nDistribute the\
  \ medium into culture vessels (leave >80% volume gas phase), purge air in the gas\
  \ phase with N2 for 1 min and seal with butyl rubber stoppers. Inject O2 gas into\
  \ the gas phase (1.5% volume of the gas phase). Then, overpressure the culture vessels\
  \ with methane gas (50% volume of the gas phase).\n\nOriginal volume: 1005 mL"
