preparation_notes: 'Dissolve ingredients (except bicarbonate, gelatine and sulfide),
  then sparge medium with 100% CO2 gas for 30 - 45 min to make it anoxic. Add and
  dissolve bicarbonate and equilibrate the medium with the CO2 gas to achieve a pH
  of 7.0. Dispense the medium under 100% CO2 gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. After sterilization add gelatine and sulfide
  from sterile anoxic stock solutions autoclaved under 100% N2 gas. Prior to inoculation
  check pH of complete medium and adjust to 7.0, if necessary.


  Original volume: 1010 mL'
