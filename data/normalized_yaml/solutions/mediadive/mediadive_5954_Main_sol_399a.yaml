preparation_notes: 'Dissolve ingredients except for carbonate, pyruvate, sulfite (Na2SO3),
  vitamins, and dithiothreitol, then sparge medium with 80% N2 and 20% CO2 gas mixture
  for 30 - 45 min to make it anoxic. Dispense medium under the same gas atmosphere
  into serum vials (e.g., 20 ml per 100 ml bottle), seal, and autoclave. Before use
  add carbonate from a sterile anoxic stock solution prepared under 80% N2 and 20%
  CO2 gas atmosphere. Pyruvate, sulfite, vitamins, and dithiothreitol are added from
  sterile anoxic stock solutions prepared under 100% N2 gas and sterilized by filtration.
  Adjust the pH of the complete medium to 6.5, if necessary.


  Original volume: 1003 mL'
