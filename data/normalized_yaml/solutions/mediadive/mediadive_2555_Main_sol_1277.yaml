preparation_notes: 'Dissolve ingredients (except carbonate, thiosulfate and vitamins)
  and sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type tubes
  or serum vials to 30% volume and autoclave. Add thiosulfate and vitamins from sterile
  anoxic stock solutions prepared under 100% N2 gas and carbonate from a sterile anoxic
  stock solution prepared under 80% N2 and 20% CO2 gas mixture. Stock solutions of
  thiosulfate and vitamins should be sterilized by filtration. Adjust pH of complete
  medium to 7.5, if necessary.

  After inoculation add sterile air in an amount equivalent to 1% (v/v) of the total
  volume of the culture vessel.


  Original volume: 1003 mL'
