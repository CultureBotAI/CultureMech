preparation_notes: Dissolve ingredients (except betaine and cysteine), boil medium
  for 1 min, then cool to room temperature under 100% N2 gas atmosphere. Adjust the
  pH to 7.2. Thereafter, dispense under 100% N2 gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add betaine and cysteine from sterile, anoxic
  stock solutions prepared under 100% N2. Adjust the pH of the complete medium to
  7.3 - 7.5.
