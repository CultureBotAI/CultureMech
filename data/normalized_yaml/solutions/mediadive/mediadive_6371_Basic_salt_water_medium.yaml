preparation_notes: 'Incubate all used glass ware and magnetic stirring rods in 0.1
  M HCl and rinse 3x with double distilled water to remove residual detergents (always
  check visual for soap bubbles).

  Autoclave the basic salt water medium and cool to room temperature. This medium
  should be free of any precipitations!

  Aseptically, add per L of basic salt water medium the following solutions from sterile
  stocks (do not store complemented SCM): Trace element solution (Nitrososphaera),
  FeNaEDTA solution, NaHCO3 solution, HEPES buffer solution, NH4Cl solution, KH2PO4
  solution

  Adjust pH to 7.6.'
