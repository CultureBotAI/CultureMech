preparation_notes: 'Dehydrated media preparations are available from media distributors.

  We use OXOID Legionella CYE-Agar base with Legionella BCYE supplement.

  For solubilization of the lyophilized pellet use standard liquid media. Although
  Legionellae do not grow in those media they are suitable for resuspension and transfer
  onto agar plates.

  Note: Alternatively use CYE-ACES AGAR'
