preparation_notes: Dissolve ingredients (except carbonate, and sulfide), adjust pH
  to 8.0, boil for 10 min. and sparge medium with 100% N2 gas for 30 min to make it
  anoxic. Distribute under N2 into Hungate tubes (10 ml) and autoclave. Add sulfide
  from a sterile anoxic stock solution prepared under 100% N2 gas and carbonate from
  a sterile stock solution prepared under 80% N2 and 20% CO2 gas mixture. Filter sterilize
  vitamin solution and aseptically add 100 µl per Hungate tube. Adjust pH of the complete
  medium to 8.0, if necessary.
