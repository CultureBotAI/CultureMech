preparation_notes: "Mix meat, water and NaOH, and bring to a boil with stirring. Cool\
  \ to room temperature, skim fat off surface, and filter, retaining both meat particles\
  \ and filtrate. To the filtrate add sufficient distilled water to restore volume\
  \ to 1000 ml. To this filtrate add: \nBoil and cool medium under 80% N2, 10% H2,\
  \ 10% CO2, and add: \nAdjust medium for final pH 7.0. Anaerobically dispense 7 ml\
  \ into tubes containing meat particles (use 1 part meat to 5 parts fluid) under\
  \ the same gas phase.\n\nOriginal volume: 1039 mL"
