preparation_notes: 'Dissolve ingredients (except fumarate, vitamins, cysteine and
  sulfide), adjust pH to 8.5 and sparge medium with 100% N2 gas for 30 - 45 min to
  make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. After sterilization add fumarate, vitamins,
  cysteine and sulfide from sterile anoxic stock solutions prepared under 100% N2
  gas. Stock solutions of fumarate and vitamins are sterilized by filtration. Adjust
  pH of complete medium to 8.5, if necessary.


  Original volume: 1006 mL'
