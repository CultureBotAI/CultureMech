preparation_notes: 'Dissolve ingredients except bicarbonate, ethylene glycol, vitamins,
  cysteine and sulfide, bring to the boil and cool to room temperature under 80% N2
  and 20% CO2 gas mixture. Add bicarbonate (solid) and equilibrate the medium with
  the gas until a pH of around 7.4 is reached. Then distribute under the same gas
  atmosphere into anoxic Hungate-type tubes or serum vials and autoclave. Before use
  add ethylene glycol, vitamins (sterilized by filtration), cysteine and sulfide from
  sterile anoxic stock solutions prepared under 100% N2 gas. Adjust pH of complete
  medium to 7.0 - 7.2, if necessary.


  Original volume: 1021 mL'
