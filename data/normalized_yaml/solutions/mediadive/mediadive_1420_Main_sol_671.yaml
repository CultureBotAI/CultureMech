preparation_notes: 'Dissolve ingredients (except carbonate, cellobiose, vitamins and
  sulfide), then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Dispense under same gas atmosphere into anoxic Hungate-type tubes
  or serum vials and autoclave. After sterilization add cellobiose, vitamins and sulfide
  from sterile anoxic stock solutions prepared under 100% N2 gas and carbonate from
  a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture. Stock
  solutions of cellobiose and vitamins should be sterilized by filtration. Adjust
  pH of complete medium to 7.0, if necessary.

  Note: Some strains can be adapted to cellulose as substrate using 2.00 g/l Avicel
  microcrystalline cellulose (SIGMA).


  Original volume: 1011 mL'
