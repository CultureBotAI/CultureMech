preparation_notes: Mix components thoroughly and adjust pH to 6.0-6.5. For preparation
  of solid medium, add per liter 20.0 g agar. Bring to a boil (and dissolve agar),
  cool down and distribute the medium into culture vessels (e.g., 10 ml medium in
  Balch type tubes) under a stream of N2, seal with butyl rubber stoppers and autoclave.
