preparation_notes: "Mix components thoroughly and adjust pH to 7.0 with NaOH. Distribute\
  \ the medium into culture vessels under a stream of a N2 gas, seal with butyl rubber\
  \ stoppers, and autoclave. After cooling, aseptically and anaerobically add per\
  \ liter the following solutions from anaerobic stock solutions (autoclaved or *filter-sterilized):\
  \ \nReadjust pH to 7.2 - 7.5, if necessary, with sterile HCl or NaOH solution. Inoculate\
  \ when the medium turns colorless.\nComment: Optionally add the FeSO4 x 5H2O solution\
  \ as described, for the formation of magnetosome.\n\nOriginal volume: 1028 mL"
