preparation_notes: 'Sparge medium with 100% N2 gas mixture for 10 min to make anoxic.

  Adjust pH to 7.0 with NaOH.

  Sparge medium with 80% N2 and 20% CO2 gas mixture for 10 min.

  Dispense the medium (10 mL) into 100 mL serum bottles, containing 0,03g sulfur (powder)
  under a stream of H2/CO2 (80:20) and seal with butyl rubber stoppers.

  Autoclave at 121 °C for 20 min.

  Prior to inoculation, add vitamins, NaNO3, and NaHCO3 (from filter sterilized stock
  solutions under a N2 gas atmosphere) to the medium.


  Original volume: 1010 mL'
