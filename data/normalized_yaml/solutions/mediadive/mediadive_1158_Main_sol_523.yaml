preparation_notes: Dissolve ingredients (except carbonate, cellobiose, cysteine and
  sulfide), bring medium to the boil, then cool to room temperature under 100% CO2
  gas atmosphere. Add the carbonate and equilibrate the medium with the CO2 gas to
  pH 6.8. Distribute under CO2 gas atmosphere into anoxic Hungate-type tubes or serum
  vials and autoclave. Add cellobiose, cysteine and sulfide from sterile anoxic stock
  solutions prepared under 100% N2 gas. Cellobiose has to be sterilized by filtration.
  Adjust pH of complete medium to 6.7 - 6.8, if necessary.
