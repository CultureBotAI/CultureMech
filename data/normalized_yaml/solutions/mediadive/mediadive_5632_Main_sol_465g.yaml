preparation_notes: 'Rehydrate and cultivate lyophilized cells in the complex medium
  recommended for the specific strain (e.g. medium 1, 220, 535 or 830). After this
  reactivation, cultivate on mineral medium with the appropriate carbon source.

  Prepare and autoclave medium. Add 5.5 g/l glycerol from a sterile solution. Add
  645 mg/l cyanuric acid from a neutralized and filter sterilized stock solution and
  10 ml vitamin solution (see medium 461) to the medium.


