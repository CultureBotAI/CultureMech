preparation_notes: 'Prewarm distilled water at 50C in a beaker with a stir bar. While
  rapidly starring the water, add FeSO4 x 7H2O, followed immediately by Na2S x 9H2O.
  A thick black precipitate will form instantly. Stir continuously for 2 to 3 min.
  Remove the mixture to a narrow-mouthed glass bottle (500 ml) that can be tightly
  stopped. The bottle is filled to the top with distilled water and capped. Allow
  to settle for several hours, decant and replace the overlaying water. Repeat this
  procedure at least five times to wash the FeS precipitate. Check pH to be close
  to neutral. To stock the FeS solution, fill the bottle with distilled water and
  cap. Remove the overlaying water when prepare the bottom layer.


  Original volume: 300 mL'
