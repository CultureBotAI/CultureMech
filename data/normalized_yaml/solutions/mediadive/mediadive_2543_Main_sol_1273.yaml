preparation_notes: 'Dissolve ingredients (except carbonate, vitamins, cysteine and
  sulfide) and sparge medium with 80% H2 and 20% CO2 gas mixture for 30 - 45 min to
  make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials to 30% of their volume and autoclave. Add vitamins, cysteine
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas and carbonate
  from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture.
  The vitamin solution should be sterilized by filtration. Adjust pH of complete medium
  to 6.8, if necessary.

  After inoculation pressurize vials to 1 bar overpressure with sterile 80% H2 and
  20% CO2 gas mixture.


  Original volume: 1011 mL'
