preparation_notes: "Mix ingredients and adjust pH to 7.4. Bring to a boil and cool\
  \ down under a N2-CO2 (4:1, v/v) gas stream. Distribute the medium into culture\
  \ tubes under the same gas mixture, seal with butyl rubber stoppers and autoclave.\n\
  To complete the medium, aseptically and anaerobically add the following stock solutions\
  \ (per liter, final volume): \nFilter-sterilize NaHCO3 solution and store under\
  \ a N2-CO2 (4:1, v/v) gas mixture. The other solutions are autoclaved and stored\
  \ anaerobically under a N2 atmosphere.\nReadjust pH of the medium to 7.4, if necessary.\n\
  \nOriginal volume: 1001 mL"
