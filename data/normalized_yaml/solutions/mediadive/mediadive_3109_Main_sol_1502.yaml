preparation_notes: "Adjust the pH with 1M NaOH or H2SO4 to 8.0-8.4 (after autoclaving\
  \ and mixing all solutions the pH should be 8.0-8.4)\nDispense the medium into the\
  \ culture vessels. For small volumes serum bottles or\r\nHungate tubes may be used.\
  \ The gas phase to liquid ratio should be about 1:10. Use a\r\ngas phase containing\
  \ air, 10-20% methane and 5-10% CO2 and autoclave at 121C for\r\n15 minutes. When\
  \ the growth medium is cool the NaHCO3 is added.\r\nLiquid cultures should be grown\
  \ with shaking.\nAdd to the sterile medium per liter from a 8% filter sterilised\
  \ stock solution:"
