preparation_notes: 'Dissolve ingredients (except carbonate, sludge fluid, methanol,
  coenzyme M, cysteine and sulfide), then sparge medium with 80% N2 and 20% CO2 gas
  mixture for 30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere
  into anoxic Hungate-type tubes or serum vials and autoclave. Add sludge fluid, methanol
  (50% v/v solution), coenzyme M (sterilized by filtration), cysteine and sulfide
  from sterile anoxic stock solutions prepared under 100% N2 gas and carbonate from
  a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture. Adjust
  pH of complete medium to 6.0 - 6.5, if necessary.


  Original volume: 1021 mL'
