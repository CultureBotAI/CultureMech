  \ stoppers and autoclave. Then, add the following solutions (filter-sterilized)\
  \ to the medium (per liter): \nFinally, replace the gas phase with a N2-CO2-O2 (79:20:1,\
  \ by volume) gas mixture and pressurize to 200 kPa with the same gas mixture.\n\n\
  Original volume: 1026 mL"
