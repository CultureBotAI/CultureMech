preparation_notes: Mix ingredients, except sodium thioglycolate and sulfur, and adjust
  pH to 7.3. Autoclave the medium under a N2 atmosphere. Separately autoclave sodium
  thioglycolate as 10% solution under a N2 atmosphere. Steam sulfur for 3 hr on each
  of 3 successive days. Under a N2 stream, mix the medium and sulfur in culture vessels
  and seal with butyl rubber stoppers. Prior to inoculation, add the thioglycolate
  solution to the medium anaerobically.
