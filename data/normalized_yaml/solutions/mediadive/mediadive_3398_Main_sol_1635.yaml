preparation_notes: 'Dissolve ingredients (except thiosulfate, bicarbonate and vitamins),
  adjust pH to 6.0 and dispense medium under air atmosphere into serum vials up to
  a volume of 20%, close with rubber septa and autoclave. Add thiosulfate, vitamins
  and bicarbonate to the autoclaved medium from sterile stock solutions sterilized
  by filtration. Adjust pH of the complete medium to 7.2.


