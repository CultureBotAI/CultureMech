preparation_notes: 'Dissolve ingredients (except carbonate, vitamins and sulfide),
  then sparge medium with  80% H2 and 20% CO2 gas mixture for 30 - 45 min to make
  it anoxic. Dispense medium under the same gas atmosphere into anoxic Hungate-type
  tubes or serum vials to 30% of their volume and autoclave. Add vitamins and sulfide
  from sterile anoxic stock solutions prepared under 100% N2 gas. Vitamins should
  be sterilized by filtration. Add carbonate from a sterile anoxic stock solution
  prepared under 80% N2 and 20% CO2 gas atmosphere. The pH of the complete medium
  should be 6.5.


  Original volume: 1011 mL'
