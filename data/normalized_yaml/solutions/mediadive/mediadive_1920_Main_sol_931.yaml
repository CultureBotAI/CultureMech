preparation_notes: 'Final pH 9.5-10.0

  Prepare the medium without adding the vitamins, sucrose, yeast extract, NH4Cl, Na2CO3,
  and NaHCO3 using anaerobic conditions, under nitrogen. If the medium has been boiled
  to remove oxygen add the NH4Cl, Na2CO3, and NaHCO3 after the medium had cooled.
  Dispense into tubes stopper with rubber stoppers (serum tubes or bottles, or screw
  capped tubes). Autoclave, and to the cooled medium add the vitamins (filter sterilised
  under N2), sucrose, yeast extract, and Na2S x 9 H2O from anaerobic, sterile stock
  solutions.'
