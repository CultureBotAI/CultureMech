preparation_notes: Prepare the medium without NaHCO3, Na2S, cellobiose or vitamins,
  boil and cool under a stream of nitrogen. Add the NaHCO3 and autoclave the medium.
  Na2S, cellobiose and vitamins are added from sterile, anaerobic stock solutions
  just before inoculating. When medium is prepared using microcrystalline cellulose
  instead of cellobiose as a substrate the microcrystalline cellulose must be added
  to the medium before autoclaving at the appropiate concentration. The final pH is
  7.0.
