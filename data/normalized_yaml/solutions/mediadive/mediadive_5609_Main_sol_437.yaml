  adjust pH to 6.9 with 8 N NaOH while gassing is continued. Switch to 100% N2 gas
  after pH has reached the desired value, distribute in anaerobic tubes under nitrogen,
  and autoclave.

  Adjust pH to 6.9.

  Before use add 5% (v/v) bovine serum (made anaerobic by preincubation in a GasPak
