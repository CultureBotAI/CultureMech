preparation_notes: 'Dissolve ingredients (except sulfide), adjust pH to 7.2, bring
  medium to the boil, then cool to room temperature under 100% N2 gas. Dispense medium
  under same gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
  After sterilization add sulfide from a sterile anoxic stock solution prepared under
  100% N2 gas atmosphere.


  Original volume: 1001 mL'
