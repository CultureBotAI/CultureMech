preparation_notes: 'Dissolve hydrogen carbonate, carbonate, sodium chloride, and hydrogen
  phosphate, then sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic.
  Dispense solution under the same gas atmosphere into anoxic Hungate-type tubes or
  serum vials and autoclave. After sterilization add ammonium chloride, magnesium
  chloride, yeast extract, trace elements, glycerol, vitamins, and sulfide from a
  sterile anoxic stock solution prepared under 100% N2 gas. The vitamin solution should
  be sterilized by filtration. Sulfur is sterilized by steaming for 3 hours on each
  of 3 successive days (see medium 35) and added aseptically to the sterile medium
  as powder while retaining anoxic conditions. Adjust the pH of the complete medium
  to 9.8 - 10.0, if necessary.


  Original volume: 1003 mL'
