  adjust pH of medium to 6.5. Dispense medium under air atmosphere into serum vials
  suitable for anaerobic cultivation (e.g., 20 ml medium in 100 ml bottles) and close
  with butyl rubber septa. After autoclaving complete medium with thiosulfate and
  bicarbonate added from stock solutions sterilized by filtration.


