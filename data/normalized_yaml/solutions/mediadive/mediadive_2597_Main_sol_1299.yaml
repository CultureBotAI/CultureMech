preparation_notes: 'Dissolve ingredients except glucose, vitamins and sulfide, then
  sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic. Dispense medium
  under same gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
  After sterilization add glucose, vitamins and sulfide from sterile anoxic stock
  solution prepared under 100% N2 gas. The vitamin solution should be sterilized by
  filtration. Adjust pH of complete medium to 6.5 - 7.0, if necessary.


  Original volume: 1002 mL'
