preparation_notes: 'Dissolve ingredients except bicarbonate, methanol, and dithiothreitol
  (DTT), then sparge medium with 80% H2 and 20% CO2 gas mixture for 30 - 45 min to
  make it anoxic. Add and dissolve bicarbonate, adjust pH of medium to 6.8 - 7.0,
  then dispense medium under 80% H2 and 20% CO2 gas atmosphere into anoxic Hungate-type
  tubes or serum vials to 30% of their volume and autoclave. Add methanol (50% v/v
  solution), vitamins, and DTT from sterile anoxic stock solutions prepared under
  100% N2 gas. Vitamins and DTT should be sterilized by filtration. Prior to use check
  pH of complete medium and adjust to 6.7 - 6.9, if necessary.

  After inoculation add sterile 80% H2 and 20% CO2 gas mixture to 1 bar overpressure.


  Original volume: 1028 mL'
