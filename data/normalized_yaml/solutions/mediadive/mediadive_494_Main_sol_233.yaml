preparation_notes: 'Dissolve ingredients (except bicarbonate, vitamins, methanol,
  cysteine and sulfide), sparge medium with 80% N2 and 20% CO2 gas mixture for 30
  - 45 min to make it anoxic. Add and dissolve bicarbonate and adjust pH to 6.5, then
  distribute under same gas atmosphere into anoxic Hungate-type tubes or serum vials
  to 30% of their volume and autoclave. After sterilization add methanol (from 50%
  v/v solution), cysteine and sulfide from sterile anoxic stock solutions autoclaved
  under 100% N2 gas. Vitamins are prepared under N2 gas atmosphere and sterilized
  by filtration. Adjust pH of complete medium to 6.5, if necessary.


  Original volume: 1023 mL'
