preparation_notes: 'Dissolve nitrilotriacetic acid first in 200 ml of distilled water,
  and adjust pH to 6.5 with KOH. Then add the remaining salts and adjust volume to
  1.0 L. Readjust pH to 7.0 with KOH.

  Comment: For strain JCM 10134, incubate with a 10-20% inoculum.'
