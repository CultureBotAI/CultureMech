preparation_notes: 'Dissolve sodium chloride, potassium hydrogenphosphate, ammonium
  chloride and potassium nitrate, then sparge solution with 80% N2 and 20% CO2 gas
  mixture for at least 30 - 45 min to remove dissolved oxygen. Dispense solution under
  same gas atmosphere in vials suitable for anaerobic cultures (e.g. Balch-type tubes)
  to 50% volume, close vials with butyl rubber septa and autoclave. Add trace elements,
  calcium chloride, magnesium sulfate, thiosulfate, and vitamins from sterile anoxic
  stock solutions prepared under 100% N2 gas and bicarbonate from a sterile anoxic
  stock solution prepared under 80% N2 and 20% CO2 gas mixture. Thiosulfate and vitamins
  should be sterilized by filtration. Adjust pH of the complete medium to 7.5 - 7.8
  using a sterile anoxic stock solution of sodium carbonate (5% w/v) prepared under
  80% N2 and 20% CO2 gas atmosphere.

  Note: Use at least 10% (v/v) as inoculum.


  Original volume: 1002 mL'
