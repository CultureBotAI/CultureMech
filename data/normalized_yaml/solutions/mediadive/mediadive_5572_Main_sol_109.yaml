preparation_notes: 'Incubate in the light using a tungsten lamp.

  Adjust pH to 6.8.

  To medium add 0.1% sodium malate and 0.05% sodium thiosulfate (). Adjust pH to 6.8
  and sterilize at 121°C for 15 min. The liquid medium is sterilized in rubber stoppered
  or screw-capped bottles under anaerobic conditions (Ref. 3365). After sterilization
  neutralized sterile sodium sulfide solution is added to a final concentration of
  0.03% (see medium 27).'
