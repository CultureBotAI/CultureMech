preparation_notes: "Thoroughly  disperse  the agar  in cold  75% seawater.  Bring\
  \  to the boil,  stirring \r\ncontinuously.  During heating add the other constituents.\
  \  Transfer the molten agar \r\nto suitable vessels and sterilise at 15 psi for\
  \ 15 minutes.  If available a bench top \r\nagar  maker  is  preferable  to making\
  \  this  medium.  The  constant stirring  during \r\nsterilisation minimises flocculation."
