preparation_notes: 'Dissolve ingredients (except carbonate, nitrate, acetate, vitamins
  and sulfide), then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45
  min to make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add vitamins (sterilized by filtration), nitrate,
  acetate and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas
  and carbonate from a sterile anoxic stock solution prepared under 80% N2 and 20%
  CO2 gas atmosphere. The pH of the complete medium should be 6.5 -7.0.


  Original volume: 1003 mL'
