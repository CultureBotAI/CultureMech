preparation_notes: Mix ingredients, except maltose and Na2S x 9H2O, and adjust pH
  to 7.0. Autoclave the medium under a N2 atmosphere. Filter-sterilize maltose as
  a 10% solution under a N2 atmosphere, and add to the medium anaerobically. Neutralize
  Na2S x 9H2O as a 5% solution, and autoclave under a N2 atmosphere. Prior to inoculation,
  add the Na2S x 9H2O solution to the medium aseptically and anaerobically.
