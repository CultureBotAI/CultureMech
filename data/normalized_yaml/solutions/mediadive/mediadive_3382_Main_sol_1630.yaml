preparation_notes: Dissolve ingredients (except trace elements, HEPES buffer, ammonium
  chloride, pyruvate, bicarbonate and vitamins) and dispense medium under air atmosphere
  into culture vessels suitable for anaerobic cultivation (e.g., 20 ml medium per
  100 ml serum bottle), seal with grey butyl rubber stoppers and autoclave. Add HEPES
  buffer and ammonium chloride from stock solutions sterilized by autoclaving. Trace
  elements, pyruvate, bicarbonate, and vitamins are added from sterile stock solutions
  sterilized by filtration. Adjust pH of the complete medium to 7.5 using a sterile
  solution of bicarbonate (5% w/v) or 1 N HCl.
