preparation_notes: "Mix components thoroughly and adjust pH to 6.75 with NaOH. Distribute\
  \ the medium into culture vessels, leaving &; 80% volume of gas phase (e.g., 5.0\
  \ ml in 25 ml serum bottles or Balch tubes), under a stream of N2, seal with butyl\
  \ rubber stoppers and autoclave. After cooling, aseptically add per liter the following\
  \ solutions (autoclaved): \nThen, add filter-sterilized H2, CO2 and air to the culture\
  \ vessels to make the gaseous composition in the gas phase 75% N2, 17% H2, 4% CO2\
  \ and 4% air by volume.\n\nOriginal volume: 1020 mL"
