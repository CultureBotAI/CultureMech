preparation_notes: 'Dissolve ingredients (except sulfur, glucose, vitamins and sulfide),
  then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Adjust pH to 6.2 - 6.4 and dispense medium under 80% N2 and 20% CO2 gas
  atmosphere into anoxic Hungate-type tubes or serum vials containing already the
  appropriate amount of sulfur. Sterilize medium by heating cultivation vessels in
  a boiling water bath for 2 - 3 hours on each of 3 successive days. After sterilization
  add glucose, vitamins and sulfide from sterile anoxic stock solutions prepared under
  100% N2 gas atmosphere. Vitamins are sterilized by filtration. Adjust pH of complete
  medium to 6.5, if necessary.


  Original volume: 1002 mL'
