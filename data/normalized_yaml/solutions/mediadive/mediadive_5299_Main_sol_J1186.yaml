preparation_notes: "Mix components and adjust pH to 7.5. Bring to a boil and cool\
  \ down under a H2-CO2 (4:1, v/v) gas stream. Distribute the medium into culture\
  \ vessels (e.g., 20 ml medium in 60 ml serum bottles) under the same gas mixture,\
  \ seal with butyl rubber stoppers and autoclave. After cooling, aseptically and\
  \ anaerobically add per liter the following solutions (autoclaved or *filter-sterilized):\
  \ \nPressurize the inoculated vessels to 100 kPa H2-CO2 (4:1, v/v)\n\nOriginal volume:\
  \ 1041 mL"
