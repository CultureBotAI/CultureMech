preparation_notes: 'Dissolve ingredients (except carbonate, acetate and yeast extract),
  then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type tubes
  or serum vials and autoclave. Prior to inoculation add acetate and yeast extract
  from sterile anoxic stock solutions prepared under 100% N2 gas and carbonate from
  a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture. The
  pH of the complete medium should be at 7.0 - 7.2.


  Original volume: 1002 mL'
