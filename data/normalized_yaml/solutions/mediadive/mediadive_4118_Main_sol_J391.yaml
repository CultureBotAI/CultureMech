preparation_notes: "Mix components thoroughly and adjust pH 7.0. Bring to a boil and\
  \ cool down under a N2-CO2 (4:1, v/v) gas stream. Autoclave under the same gas mixture.\
  \ After cooling, add the following solutions (filter-sterilized): \nAseptically\
  \ and anaerobically distribute the medium into culture vessels (e.g., 10 ml medium\
  \ in Balch tubes) and seal with butyl rubber stoppers. Add per liter the following\
  \ solution (autoclave or *filter-sterilize and store under a N2 atmosphere): \n\
  Readjust pH to 7.0 - 7.3, if necessary.\nComment: For strain JCM 31729, replace\
  \ sodium lactate with final 10 mM sodium fumarate and 0.01% yeast extract.\n\nOriginal\
  \ volume: 1025 mL"
