preparation_notes: 'Dissolve sodium chloride, hydrogenphosphate and sodium sulfate,
  then sparge solution with 100% N2 gas for 30 - 45 min to make it anoxic. Add and
  dissolve hydrogencarbonate and carbonate, then dispense under 100% N2 gas atmosphere
  into anoxic Hungate-type tubes or serum vials and autoclave. After sterilization
  add ammonium chloride, magnesium chloride, trace elements, yeast extract, pyruvate,
  arsenate, vitamins and sulfide from sterile anoxic stock solutions prepared under
  100% N2 gas. Stock solutions of vitamins, pyruvate and arsenate should be sterilized
  by filtration. Adjust pH of complete medium to 9.5 - 10.


  Original volume: 1003 mL'
