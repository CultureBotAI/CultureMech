preparation_notes: "Mix components thoroughly, except iron metal, and autoclave under\
  \ a N2 gas atmosphere. After cooling, add the following solutions from sterile anaerobic\
  \ stocks (autoclaved or *filter-sterilized): \nSeparately autoclave and dry iron\
  \ metal (powder). Aseptically distribute the medium and iron metal into culture\
  \ vessels (e.g., 10 ml medium and 100 mg iron in Hungate tubes) under a N2 gas stream\
  \ and seal with butyl rubber stoppers. Prior to use, aseptically and anaerobically\
  \ add per liter the following solution (filter-sterilized): \nAdjust pH to 8.0,\
  \ if necessary.\n\nOriginal volume: 1063 mL"
