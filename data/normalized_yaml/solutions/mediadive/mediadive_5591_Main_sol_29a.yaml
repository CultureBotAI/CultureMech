preparation_notes: 'Mix solution D, C and E. Bubble with CO2 in an ice bath under
  sterile conditions.

  Fill 50 ml in each bottle of solution A. Before using add 4 ml solution B and 0.1
  ml solution F. To final medium add 10 mM bicarbonate, 10 mM FeSO4 and 2mM acetate.

  Adjust pH to 6.8.

  Fill in sterile, N2 gassed screw-cap tubes under N2 gas.

  At 25C in light the incubation time is about 4 weeks.'
