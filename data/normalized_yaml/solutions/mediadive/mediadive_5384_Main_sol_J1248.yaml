preparation_notes: "Mix components thoroughly, bring to a boil and cool down under\
  \ a N2-CO2 (4:1, v/v) gas mixture. Add the following solutions: \nAdjust pH of the\
  \ medium to 7.0-7.2, if necessary. Dispense the medium into culture vessels (e.g.,\
  \ 100 ml in 120 ml-serum bottles) under the same gas mixture and seal with butyl\
  \ rubber stoppers or Teflon-lined stoppers. Then, anaerobically add per liter the\
  \ following solution: \nDissolve tetrachloroethene with ultrasound. Autoclave in\
  \ a closed basket. Do not remove the culture vessels from autoclave before temperature\
  \ of the media has reached below 70C.\nFinally, add per liter the following solution\
  \ from an anaerobic stock (filter-sterilized): \n\nOriginal volume: 1059 mL"
