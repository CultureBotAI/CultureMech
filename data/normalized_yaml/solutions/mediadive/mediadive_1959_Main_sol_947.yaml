preparation_notes: 'Dissolve ingredients (except bicarbonate, vitamins and reducing
  agents), then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Add solid bicarbonate and equilibrate pH to 6.3 with 80% N2 and
  20% CO2 gas mixture. Dispense medium under 80% N2 and 20% CO2 gas atmosphere into
  anoxic Hungate-type tubes or serum vials and autoclave. Add vitamins (sterilized
  by filtration), cysteine and sulfide from sterile anoxic stock solutions prepared
  under 100% N2 gas. Adjust pH of complete medium to 6.2 - 6.5, if necessary.


  Original volume: 1003 mL'
