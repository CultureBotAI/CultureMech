preparation_notes: Mix ingredients, except FeSO4 x 7H2O, sodium thioglycolate and
  ascorbic acid, bring to a boil, and cool down to room temperature under a N2 gas
  stream. Add FeSO4 x 7H2O in 10 ml distilled water, and sodium thioglycolate and
  ascorbic acid in 10 ml distilled water, and adjust pH to 7.8 with NaOH. While swirling
  the medium, dispense into culture vessels under a N2 gas stream, seal with butyl
  rubber stoppers, and autoclave. Adjust pH to 6.8-7.0, if necessary.
