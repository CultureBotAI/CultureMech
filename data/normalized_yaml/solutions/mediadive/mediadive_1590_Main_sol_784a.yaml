preparation_notes: 'Dissolve ingredients except carbonate, bicarbonate, vitamins and
  sulfide, then sparge medium with 80% H2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Add and dissolve carbonates and sulfide while gassing the head
  space only. Dispense under same gas atmosphere into anoxic Hungate-type tubes or
  serum vials and autoclave. Before use add vitamins from an anoxic stock solution
  sterilized by filtration. Adjust pH of the complete medium to 9.0 - 9.5.


  Original volume: 1002 mL'
