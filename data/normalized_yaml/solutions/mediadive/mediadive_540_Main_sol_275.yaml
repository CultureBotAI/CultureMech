preparation_notes: Dissolve ingredients except for cysteine, carbonate, and glucose,
  and sparge medium with 80% N2 and 20% CO2 gas atmosphere to make it anoxic. Add
  cysteine and adjust pH to 7.2 - 7.4 by adding and dissolving solid Na2CO3. Then
  distribute the medium under the same gas atmosphere into anoxic Hungate-type tubes
  or serum vials and autoclave. After autoclaving add glucose from a sterile anoxic
  stock solution prepared under a 100% N2 gas atmosphere. The final pH of the medium
  should be at 7.4.
