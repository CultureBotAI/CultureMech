preparation_notes: 'Dilute 100 ml solution 1 to 1 litre with 2% NaCl and then add
  1 ml of solution 3, 1 ml of the trace elements, and 0.1 ml of solution 2. If solid
  media is required add 1.5% agar. Autoclave the phosphate buffer separately. When
  the growth medium is cool 10 ml/l of the phosphate buffer is added - if too warm
  the phosphate will precipitate.

  Add filter-sterilized methanol to produce 1% (final concentration).'
