preparation_notes: "Boil the medium for 5 min and cool on ice under N2 (100%). Do\
  \ not bubble. \npH Wert 7.6-8.0.\nFill 10 ml in Hungate tubes with a rubber septum\
  \ under N2 (100%) flux.\nFlush each Hungate tube with molecular hydrogen for 10\
  \ seconds.\nAutoclave at 121° for 15 min. After autoclaving add 0.01 ml of filter-sterilized\
  \ vitamin solution per 10 ml media.\nInject 3 ml of sterile air with sterile syringe\
  \ into each Hungate tube before inoculation."
