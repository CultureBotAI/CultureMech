preparation_notes: 'Dissolve ingredients except sulfur and sulfide and adjust pH to
  6.0 with sulfuric acid. Sparge medium with 100% N2 gas for 30 - 45 min to make it
  anoxic, dispense under the same gas atmosphere into anoxic Hungate-type tubes or
  serum vials containing the appropriate amount of sulfur, only to 30% of their volume
  to allow for a large headspace. Sterilize medium by heating for 2 - 3 hours in a
  boiling water bath on each of 3 successive days. Before use reduce the medium by
  adding sulfide from a sterile anoxic stock solution prepared under 100% N2 gas atmosphere.
  Check pH and adjust to pH 6.5 - 7.0, if necessary.

  After inoculation pressurize culture vessels to 1 bar overpressure with a sterile
  80% H2 and 20% CO2 gas mixture.


  Original volume: 1027 mL'
