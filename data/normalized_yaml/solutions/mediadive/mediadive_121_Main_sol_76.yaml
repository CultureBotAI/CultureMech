preparation_notes: 'First dissolve KOH and K2HPO4 in water, then add uric acid and
  boil until the acid is dissolved. Cool medium to room temperature under 100% N2
  gas atmosphere and add all other compounds, except carbonate and thioglycolate.
  Dispense under 100% N2 gas atmosphere into anoxic Hungate-type tubes or serum vials
  and autoclave for 15 min at 121°C. Then add carbonate (filter-sterilized stock solution
  prepared under 80% N2 and 20% CO2 gas atmosphere) and thioglycolate (stock solution,
  autoclaved separately under 100% N2 gas). Adjust pH of complete medium to 7.0 -
  7.5, if necessary.


  Original volume: 1008 mL'
