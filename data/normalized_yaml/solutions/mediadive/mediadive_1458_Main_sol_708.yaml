preparation_notes: 'Dissolve ingredients except carbonate, vitamins, propionate and
  sulfide. Sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make
  it anoxic, then dispense under same gas atmosphere into anoxic Hungate-type tubes
  or serum vials and autoclave. Add vitamins, propionate and sulfide from sterile
  anoxic stock solutions prepared under 100% N2 gas and carbonate from a sterile anoxic
  stock solution prepared under 80% N2 and 20% CO2 gas mixture. Vitamins should be
  sterilized by filtration. The pH of the complete medium should be 7.2 - 7.6.


  Original volume: 1004 mL'
