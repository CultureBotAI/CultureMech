preparation_notes: 'Dissolve ingredients, except thiosulfate, cysteine, carbonate,
  glucose, and sulfide, then sparge medium for 30 - 45 min with 80% N2 and 20% CO2
  gas mixture to make it anoxic. Add thiosulfate and cysteine, then adjust pH to 7.0
  and dispense medium under 80% N2 and 20% CO2 gas atmosphere into anoxic Hungate-type
  tubes or serum vials to 30% of their volume and autoclave. After autoclaving, add
  glucose and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas
  and carbonate from a sterile anoxic stock solution prepared under 80% N2 and 20%
  CO2 gas atmosphere. Adjust the pH of the complete medium to 7.2 - 7.4, if necessary.


  Original volume: 1010 mL'
