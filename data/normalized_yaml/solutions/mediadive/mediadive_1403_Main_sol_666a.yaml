preparation_notes: Dissolve ingredients (except bicarbonate, cellobiose, yeast extract,
  cysteine and DTT), bring medium to the boil, then cool to room temperature under
  100% CO2 gas atmosphere. Add the bicarbonate and equilibrate the medium with the
  CO2 gas to pH 6.8. Distribute under 100% CO2 gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Thereafter, add cellobiose, yeast extract, cysteine
  and DTT from sterile anoxic stock solutions prepared under 100% N2 gas atmosphere.
  Cellobiose has to be sterilzed by filtration. Adjust pH of complete medium to 6.7
  - 6.8, if necessary.
