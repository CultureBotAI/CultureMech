preparation_notes: "Mix components and adjust pH to 5.5. Distribute the medium into\
  \ culture vessels (e.g., 20 ml in 60 ml-serum bottles) under a stream of N2, seal\
  \ with butyl rubber stoppers and add Autoclave. After cooling, add per liter the\
  \ following solutions (filter-sterilized): \nReplace the gas phase with N2-CO2-O2\
  \ (94:5:1, v/v/v, 100 kPa). Check final pH to be around 6.2.\n\nOriginal volume:\
  \ 1020 mL"
