preparation_notes: 'Dissolve ingredients (except sulfide), adjust pH to 7.0, bring
  medium to the boil, then cool to room temperature under 100% carbon monoxide gas.
  Dispense under same gas atmosphere into anoxic Hungate-type tubes or serum vials
  to 30% of their volume and autoclave. After sterilization add sulfide from a sterile
  anoxic stock solution prepared under 100% N2 gas.


  Original volume: 1016 mL'
