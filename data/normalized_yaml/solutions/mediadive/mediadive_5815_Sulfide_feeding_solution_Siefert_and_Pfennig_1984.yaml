preparation_notes: 'Sparge medium with 100% CO2 gas mixture.

  Autoclave at 121 °C for 15 min.

  Sterile solution is saturated with CO2 (0.8 bar) until pH is approx. 7.3.

  1 ml is added to 100 ml of culture approx. every 3 days or when the sulfide is consumed.


  Original volume: 250 mL'
