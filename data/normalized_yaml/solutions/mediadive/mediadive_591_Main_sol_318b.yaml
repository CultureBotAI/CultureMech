preparation_notes: 'Dissolve ingredients (except bicarbonate, ethanol, vitamins, cysteine
  and sulfide), then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45
  min to make it anoxic. Add and dissolve bicarbonate and adjust pH to 7.0, then dispense
  under 80% N2 and 20% CO2 gas atmosphere into anoxic Hungate-type tubes or serum
  vials and autoclave. After sterilization add ethanol, cysteine and sulfide from
  sterile anoxic stock solutions prepared under 100% N2 gas. Vitamins are prepared
  under 100% N2 gas and sterilized by filtration. Adjust pH of complete medium to
  7.0 - 7.2, if necessary.


  Original volume: 1013 mL'
