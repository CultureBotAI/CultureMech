preparation_notes: 'Dissolve ingredients (except carbonate, sulfide, lactate, and
  vitamins) and sparge medium with 100 % N2 gas for 30 - 45 min to make it anoxic.
  Add and dissolve carbonate and sulfide, then adjust pH to 8.8 - 9.0, dispense under
  100% N2 gas atmosphere into Hungate-type tubes or serum vials and autoclave. Before
  use add lactate and vitamins (sterilized by filtration) from sterile anoxic stock
  solutions prepared under 100% N2 gas.


  Original volume: 1003 mL'
