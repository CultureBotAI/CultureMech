preparation_notes: 'Dissolve ingredients (except sulfur, carbonate, vitamins and sulfide)
  and sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Adjust pH to 5.9, dispense medium under 80% N2 and 20% CO2 gas atmosphere
  into anoxic Hungate-type tubes or serum vials containing already the appropriate
  amount of sulfur and sterilize medium by heating in a boiling water bath for 2-
  3 hours on each of 3 successive days. Add vitamins (sterilized by filtration) and
  sulfide from sterile anoxic stock solutions prepared under 100% N2 gas and carbonate
  from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture.
  Prior to use adjust pH of complete medium to 6.8 - 7.0, if necessary.


  Original volume: 1002 mL'
