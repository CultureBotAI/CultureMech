preparation_notes: 'The difference between this medium and "normal" SP4 medium (Medium
  1076) is that the yeast extract was left out and DNA was added instead. Since most
  mycoplasmas use either glucose or arginine as their energy source one is added to
  the media. Do not combine both in one medium, arginine can inhibit the growth of
  some glucose utilizers (unknown reason).

  Adjust pH to 7.4; autoclave at 121°C for 15 minutes.

  Add aseptically:

  As energy source add either:

  For Ureaplasma add instead of Glucose or Arginine:

  For agar plates use only 126 ml of distilled water and add 2 g of agar. Medium containing
  agar should be placed at 55°C before adding supplements.


  Original volume: 200 mL'
