preparation_notes: "Mix components except sulfur thoroughly and autoclave under a\
  \ N2-CO2 (4:1, v/v) gas mixture. After cooling, add per liter the following solutions\
  \ (autoclaved or *filter-sterilized): \nSteam sulfur for 3 hr on each of 3 successive\
  \ days. Aseptically distribute the medium and sulfur into culture vessels under\
  \ a stream of N2-CO2 (4:1, v/v) and seal with butyl rubber stoppers. Prior to inoculation,\
  \ add per liter the following solution from an anaerobic stock (autoclaved and stored\
  \ under a N2 atmosphere): \n\nOriginal volume: 1063 mL"
