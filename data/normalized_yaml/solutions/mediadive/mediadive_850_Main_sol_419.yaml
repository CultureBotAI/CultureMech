  to 6.8, bring medium to the boil and then cool to room temperature under 100% CO2
  gas atmosphere. Add solid carbonate and cysteine, then equilibrate pH to 6.8. Dispense
  under 100% CO2 gas atmosphere into anoxic Hungate-type tubes or serum vials and
  autoclave.


