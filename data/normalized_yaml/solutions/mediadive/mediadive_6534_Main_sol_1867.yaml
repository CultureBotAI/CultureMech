preparation_notes: 'Autoclave at 121 °C for 20 min.

  Sparge medium with 80% N2 and 20% CO2 gas mixture , flush headspace with gas phase
  to remove oxygen.

  Make up to <span class=''amount'' data-volume=''1000''>1000</span> ml with anaerobic
  distilled water.

  aliquot medium into autoclaved sterilized serum vials, pressurized with 80% N2 :
  20% CO2

  Prior to the cultivation supplement media aliquot with 30 mM acetate, 25 mM NO-3,
  and 1.75 g/L Na2CO3.'
