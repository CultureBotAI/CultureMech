preparation_notes: Add to the medium 0.5% casitone and 2.5% NaCl (marine source).
  Adjust pH to 5.7 with hydrochloric acid before sterilization. Sterilize the medium
  by heating for 1 h at 90 - 100°C on three successive days. Before use add 30.0 ml/l
  of 5% (w/v) sterile, anaerobic NaHCO3-solution, vitamins and sulfide. Final pH should
  be 6.5.
