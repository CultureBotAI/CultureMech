preparation_notes: 'Dissolve ingredients except bicarbonate, fructose, vitamins, cysteine
  and sulfide. Sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to
  make it anoxic, then dispense under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add fructose, vitamins, cysteine and sulfide
  from sterile anoxic stock solutions prepared under 100% N2 gas and bicarbonate from
  a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture. The
  pH of the complete medium should be at 6.5.

  Note: For autotrophic growth fructose is omitted and a gas atmosphere of 80% H2
  and 20% CO2 is used.


  Original volume: 1021 mL'
