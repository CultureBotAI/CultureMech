preparation_notes: Prepare the medium without the Na2S x 9 H2O by boiling and cooling
  under a nitrogen atmosphere. Adjust the pH to 6.5 - 7.0. Dispense into Hungate tubes
  or serum bottles fitted with butyl rubber stoppers. Autoclave and reduce the medium
  before use by adding the appropriate amount of Na2S x 9 H2O from a neutralised,
  sterile stock solution.
