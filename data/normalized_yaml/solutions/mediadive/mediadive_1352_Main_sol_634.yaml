preparation_notes: Dissolve dehydrated RCM medium (available from BD-BBL, OXOID or
  MERCK) in distilled water and add 0.5 ml/l Na-resazurin solution (0.1% w/v), bring
  to the boil and cool to room temperature while sparging with 100% N2 gas. Dispense
  medium under same gas atmosphere into anoxic Hungate-type tubes or serum vials and
  autoclave.
