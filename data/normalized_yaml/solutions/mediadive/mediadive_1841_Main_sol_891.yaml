preparation_notes: 'Adjust pH to 7.0 using H2SO4.

  Prepare the medium under H2 gas and fill 20 ml medium into 100 ml serum bottles
  and seal with a rubber stopper. Steam/heat medium in an almost boiling waterbath
  for 3 hours on each of 3 successive days to sterilize.

  Add bicarbonate from a autoclaved, neutralized stock solution.

  Give an atmosphere of H2/CO2/O2 (78/20/2) with an overpressure of two atmospheres.'
