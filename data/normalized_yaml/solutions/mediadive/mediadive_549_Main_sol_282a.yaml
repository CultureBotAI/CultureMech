preparation_notes: 'Dissolve ingredients except bicarbonate, vitamins, cysteine and
  sulfide. Sparge medium with 80% H2 and 20% CO2 gas mixture for 30 - 45 min to make
  it anoxic. Add and dissolve bicarbonate, then dispense medium into anoxic tubes
  to 30% of their volume under  80%  H2 and 20% CO2 gas atmosphere and autoclave.
  Add vitamins (sterilized by filtration), cysteine and sulfide from sterile anoxic
  stock solutions prepared under 100% N2 gas. Prior to use check pH of complete medium
  and adjust to 6.0, if necessary.

  After inoculation add sterile 80% H2 and 20% CO2 gas mixture to 2 bar overpressure.


  Original volume: 1012 mL'
