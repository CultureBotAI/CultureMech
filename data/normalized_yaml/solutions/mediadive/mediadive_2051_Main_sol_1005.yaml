preparation_notes: 'Dissolve ingredients (except vitamins and cysteine), adjust pH
  to 5.5 with 10 N H2SO4 and sparge medium with 80% H2 and 20% CO2 gas mixture for
  30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere into anoxic
  Hungate-type tubes or serum vials (e.g., 20 ml of medium in 50 ml bottles) and autoclave.
  Prior to inoculation add vitamins (sterilized by filtration) and cysteine from sterile
  anoxic stock solutions prepared under 100% N2 gas. Adjust pH of complete medium
  to 5.5 - 6.0, if necessary.

  After inoculation pressurize vials to 0.5 bar overpressure with sterile 80% H2 and
  20% CO2 gas mixture.


  Original volume: 1011 mL'
