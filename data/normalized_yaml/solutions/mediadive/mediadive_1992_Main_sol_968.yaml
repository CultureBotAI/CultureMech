preparation_notes: 'Dissolve ingredients (except carbonate, hydrogencarbonate and
  reducing agents), then sparge medium with 100% N2 gas for 30 - 45 min to make it
  anoxic. Add solid carbonate and bicarbonate, adjust pH to 9.8, dispense medium under
  100% N2 gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
  Before inoculation, add cysteine and sulfide from sterile anoxic stock solutions
  prepared under 100% N2 gas. Adjust pH of complete medium to 9.8, if necessary.


  Original volume: 1002 mL'
