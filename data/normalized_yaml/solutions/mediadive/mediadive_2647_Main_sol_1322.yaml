preparation_notes: 'Final pH 5.0-5.8.

  Prepare the medium without methanol  in closed vessels. Adjust pH to 5.0-5.8 and
  sterilize. Allow to cool to about 30°C before adding 10 mL filter-sterilized methanol
  per litre medium.

  The medium is fairly weakly buffered so the pH should be checked before and after
  autoclaving. The pH should be adjusted with H3PO4 (sterilised if added to sterile
  medium). The strain should be grown with shaking.'
