preparation_notes: Prepare the medium without the vitamin solution and the phosphate
  buffer. Dispense the medium into the growth vessels. If using sealed vessels it
  is appropriate to add 50% methane to the gas phase and autoclave at 121°C for 15
  minutes. Autoclave the phosphate buffer separately. When the growth medium is cool
  add 0.1 ml/l of vitamin solution (filter sterilized) and 2 ml/l of the phosphate
  buffer - if too warm the phosphate will precipitate. Liquid cultures should be grown
  with shaking.
