preparation_notes: 'Mix ingredients, except Trace vitamins and NaHCO3, and adjust
  pH to 7.0. Distribute the medium into culture vessels (e.g., 20 ml of medium in
  120 ml serum bottles) under a stream of N2-CO2 (4:1, v/v) gas mixture, seal with
  butyl rubber stoppers and autoclave. Filter-sterilize Trace vitamins and 5% NaHCO3
  solution and add to the medium. Finally add O2 gas to make 5% (v/v) in the gas phase.


  Original volume: 1002 mL'
