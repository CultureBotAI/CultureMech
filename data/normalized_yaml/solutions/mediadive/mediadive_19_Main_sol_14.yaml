preparation_notes: 'Dissolve ingredients (except carbonate and fructose) and sparge
  medium with 100% N2 gas for at least 30 - 45 min to make it anoxic. Dispense medium
  under same gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
  Add fructose from a sterile anoxic stock solution prepared under 100% N2 gas and
  carbonate from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2
  gas atmosphere. Adjust pH of complete medium to 8.0.


