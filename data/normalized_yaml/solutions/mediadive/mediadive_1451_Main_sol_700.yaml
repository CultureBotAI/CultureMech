preparation_notes: 'Prepare the medium under N2, omitting Na2CO3, Na HCO3, Na2S, sucrose
  and vitamin solution.

  Boil the medium and cool under nitrogen, add the Na2CO3 and NaHCO3 and adjust the
  pH to 9.7 with 6N NaOH (about 15 ml). Sterilize by autoclaving and add the Na2S
  (neutralized), vitamins and sucrose from sterile stock solutions.'
