preparation_notes: 'The sulfide solution is prepared in a vessel sealed with a butyl
  rubber.

  Autoclave at 121°C for 15 min under a N2 atmosphere. After cooling to room temperature
  the pH is adjusted to about 7.3 by adding of sterile 2N H2SO4 drop-wise with a syringe
  without opening the bottle. The vessel should be shaken continuously to avoid precipitation
  of elemental sulfur. The final solution should be transparent yellow.


  Original volume: 100 mL'
