preparation_notes: 'Mix ingredients, except NaHCO3, L-cysteine x HCl x H2O and Na2S
  x 9H2O, adjust pH to 7.5 - 8.0, and autoclave. Separately autoclave NaHCO3, L-cysteine
  x HCl x H2O and Na2S x 9H2O solutions (5% each) under a N2 atmosphere. Distribute
  the medium into culture vessels (e.g., 20 ml of medium in 120 ml serum bottles)
  under a stream of H2-CO2 (4:1, v/v) gas mixture and seal with butyl rubber stoppers.
  Prior to inoculation, add the sterile NaHCO3, L-cysteine x HCl x H2O and Na2S x
  9H2O solutions aseptically and anaerobically. Pressurize the inoculated bottle to
  200 kPa H2-CO2 (4:1, v/v).


  Original volume: 1010 mL'
