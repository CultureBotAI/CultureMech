preparation_notes: 'Dissolve ingredients (except bicarbonate, cysteine, and DTT),
  bring the medium to a boil, and then cool it to room temperature under an 80% H2
  and 20% CO2 gas atmosphere. Add the bicarbonate and equilibrate the medium to pH
  6.8. Distribute under the same gas atmosphere into anoxic Hungate-type tubes or
  serum vials, filling them to 30% of their volume, and then autoclave. After that,
  add cysteine and DTT from sterile anoxic stock solutions prepared under a 100% N2
  gas atmosphere. Adjust the pH of the complete medium to 6.7 - 6.8, if necessary.

  After inoculation add sterile 80% H2 and 20% CO2 gas mixture to 2 bar of overpressure.'
