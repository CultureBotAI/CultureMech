preparation_notes: 'Dissolve ingredients (except cysteine, carbonate, cellobiose and
  sulfide), bring medium to the boil, then cool to room temperature under 80% N2 and
  20% CO2 gas mixture and add cysteine. Dispense under same gas atmosphere into anoxic
  Hungate-type tubes or serum vials and autoclave. Add sulfide from a sterile anoxic
  stock solution prepared under 100% N2 gas and carbonate from a sterile anoxic stock
  solution prepared under 80% N2 and 20% CO2 gas mixture. Sterilize cellobiose separately
  by filtration under 100% N2 gas. Adjust pH of the complete medium to 7.0, if necessary.

  Note: Some strains can be adapted to cellulose as substrate using 10.0 g/l cellulose
  powder MN 301 (MACHEREY-NAGEL).


  Original volume: 1021 mL'
