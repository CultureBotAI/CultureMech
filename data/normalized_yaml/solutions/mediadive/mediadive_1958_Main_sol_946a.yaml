preparation_notes: 'Dissolve ingredients (except carbonate, yeast extract, vitamins
  and sulfide), then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45
  min to make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Prior to inoculation add carbonate from a sterile
  anoxic stock solution prepared under 80% N2 and 20% CO2 gas atmosphere and yeast
  extract, vitamins and sulfide from sterile anoxic stock solutions prepared under
  100% N2 gas. Vitamins are sterilized by filtration. Adjust pH of complete medium
  to 6.8, if necessary.


  Original volume: 1011 mL'
