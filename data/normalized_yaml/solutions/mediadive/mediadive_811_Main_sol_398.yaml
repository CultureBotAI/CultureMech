preparation_notes: 'Adjust pH of the mineral base to about 2 with sulfuric acid and
  autoclave. Add glucose and yeast extract from filter-sterilized stock solutions.

  Check pH to be 2 to 3.

  For anaerobic growth, the acidified mineral base containing sulfur is filled into
  serum bottles (20 ml per 100 ml bottle) under N2 + CO2 (80 + 20) gas mixture. Then,
  the bottles are sterilized by tyndallisation. Yeast extract and glucose are added
  from separately sterilized stock solutions.'
