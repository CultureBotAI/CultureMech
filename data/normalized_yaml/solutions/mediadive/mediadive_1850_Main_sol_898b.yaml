preparation_notes: 'Dissolve all ingredients except carbonates, yeast extract, crotonate,
  vitamins and sulfide, then sparge medium with 100% N2 gas for 30 - 45 min to make
  it anoxic. Add carbonate and hydrogencarbonate, adjust pH to 9.0 - 9.5, dispense
  medium under 100% N2 gas atmosphere into anoxic Hungate-type tubes or serum vials
  and autoclave. Add yeast extract, crotonate, vitamins and sulfide from sterile anoxic
  stock solutions prepared under 100% N2 gas. Vitamins should be sterilized by filtration.
  Adjust pH of complete medium to 9.5 - 9.7.


  Original volume: 1002 mL'
