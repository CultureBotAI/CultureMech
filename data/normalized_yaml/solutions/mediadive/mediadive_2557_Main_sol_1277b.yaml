preparation_notes: 'Dissolve ingredients (except carbonate, pyrosulfite and vitamins),
  then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Dispense medium under same gas atmosphere into Hungate-type tubes or serum
  vials and autoclave. Add pyrosulfite from a 10% (w/v) stock solution adjusted to
  pH 7.5-8.0 with NaOH, made anoxic with 100% N2 gas and sterilized by filtration.
  Vitamins are added from a stock solution prepared under 100% N2 gas atmosphere and
  sterilized by filtration and carbonate is added from a sterile stock solution prepared
  under 80% N2 and 20% CO2 gas atmosphere. Adjust pH of complete medium to 7.5 - 8.0.
  Incubate without shaking.


  Original volume: 1007 mL'
