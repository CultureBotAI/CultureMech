preparation_notes: 'Autoclave solution A without the vitamin solution. Autoclave solution
  B in half full, closed bottles. Autoclave solution C. Combine the sterile solutions
  A, B, and C after cooling. Aseptically add 1.0 ml of the vitamin solution (filter
  sterilized) to 1 litre of the sterile medium.

  Adjust to pH 9.8. The medium may be solidified by adding 20 g/l agar, but care should
  be taken that the temperature of the solutions to be mixed are about 50°C, otherwise
  the agar will darken and degrade.


  Original volume: 1006 mL'
