preparation_notes: 'Adjust the pH to 9.0 - 9.5 with 2M KOH. Dispense into closed vessels
  (i.e. a serum tube or bottle) with a liquid to air ratio of about 1:10. Flush the
  gas phase with nitrogen and add 2% oxygen. Sterilize at 120°C 20 min.

  Incubate statically until growth occurs, then shake at 100 rpm.

  After sterilization add from sterile stock solutions:

  (a white colloid will form which will rapidly dissolve after mixing)'
