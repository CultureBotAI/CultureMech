preparation_notes: 'Dissolve ingredients (except bicarbonate, xylose, vitamins, cysteine
  and sulfide), adjust pH to 8.5, then sparge medium with 100% N2 gas for 30 - 45
  min to make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add xylose, vitamins, cysteine and sulfide from
  sterile anoxic stock solutions prepared under 100% N2 gas and bicarbonate from a
  sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas atmosphere.
  Sterilize stock solutions of xylose and vitamins by filtration. Adjust pH of the
  complete medium to 8.5, if necessary.


  Original volume: 1011 mL'
