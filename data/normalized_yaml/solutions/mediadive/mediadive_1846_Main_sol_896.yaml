preparation_notes: 'Dissolve ingredients except vitamins and cysteine, adjust pH to
  7.2 and sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic. Dispense
  medium under same gas atmosphere into anoxic Hungate-type tubes or serum vials and
  autoclave. Prior to inoculation add vitamins and cysteine from sterile anoxic stock
  solutions prepared under 100% N2 gas. Vitamins should be sterilized by filtration.
  Adjust pH of complete medium to 7.0, if necessary.


