preparation_notes: 'Dissolve ingredients (except carbonate, thiosulfate and vitamins)
  and sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Dispense medium under air atmosphere into Hungate-type tubes or serum vials
  to 30% of volume, close with butyl rubber septa and autoclave. Add carbonate, thiosulfate
  and vitamins from stock solutions sterilized by filtration. Adjust pH of complete
  medium to 7.0 - 7.2. Incubate without shaking.


  Original volume: 1003 mL'
