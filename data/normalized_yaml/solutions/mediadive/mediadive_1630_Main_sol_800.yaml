preparation_notes: "Use Wilkins Chalgrene Anaerobe Broth (Oxoid CM 643) and prepare\
  \ it anaerobically under 80% N2 + 20% CO2 gas. After autoclaving and cooling to\
  \ room temperature add per 10 ml the following sterile, anaerobic solutions: \n\
  The pH of the completed medium should be 6.8 - 7.0. For growth an agar plates, Columbia\
  \ sheep blood agar plates (BBL) may be used and incubated under an anaerobic atmosphere\
  \ containig 5 - 10% CO2.\n\nOriginal volume: 12 mL"
