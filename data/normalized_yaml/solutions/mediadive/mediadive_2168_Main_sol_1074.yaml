preparation_notes: 'Dissolve ingredients (except carbonate, yeast extract, pyruvate,
  vitamins, n-decane and reducing agents) and sparge medium with 80% N2 and 20% CO2
  gas mixture for 30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere
  into anoxic serum vials (e.g., Balch-type tubes or serum bottles) and autoclave.
  Add yeast extract, pyruvate, vitamins, n-decane and reducing agents from sterile
  anoxic stock solutions prepared under 100% N2 gas and carbonate from a sterile anoxic
  stock solution prepared under 80% N2 and 20% CO2 gas mixture. Solutions of vitamins
  and pyruvate should be sterilized by filtration. Adjust pH of complete medium to
  7.2 - 7.4.

  Note: Use 20% (v/v) as inoculum and incubate vials in an inverted position.


  Original volume: 1003 mL'
