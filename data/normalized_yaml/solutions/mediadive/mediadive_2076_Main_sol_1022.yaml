preparation_notes: 'Dissolve ingredients (except bicarbonate, C. sporogenes supernatant,
  magnesium chloride, calcium chloride, and vitamins), adjust pH to 7.0 - 7.5 and
  boil medium for 1 min, then cool to room temperature under 80% N2 and 20% CO2 gas
  mixture. Dissolve solid bicarbonate, adjust pH to 7.8, dispense the solution under
  80% N2 and 20% CO2 gas atmosphere into anoxic Hungate-type tubes or serum vials
  and autoclave. After autoclaving add the appropriate amount of sterile and anoxic
  supernatant of C. sporogenes and complete the medium by adding magnesium chloride,
  calcium chloride and vitamins (sterilized by filtration) from sterile anoxic stock
  solutions prepared under 100% N2 gas. The final pH of the medium should be 7.5 -
  8.0.

  It may be necessary to add 10 - 20 mg sodium dithionite per liter (e.g. from 5%
  (w/v) solution, freshly prepared under N2 gas and filter-sterilized), if the medium
  is not completely reduced after inoculation.

  Note: For transfers use 10% (v/v) inoculum.


  Original volume: 1004 mL'
