preparation_notes: 'Mix components except NaHCO3 and adjust pH to 6.5. Bring to a
  boil for 5-10 sec, then, cool down under a stream of N2-CO2 (80:20, v/v) and add
  NaHCO3 to the solution. Dispense 0.9 volume of the medium into culture vessels (e.g.,
  18 ml of the medium in 50 ml serum bottle) under a stream of N2-CO2 (80:20, v/v)
  and seal with butyl rubber stoppers. After autoclaving, stand the medium overnight.


  Original volume: 904 mL'
