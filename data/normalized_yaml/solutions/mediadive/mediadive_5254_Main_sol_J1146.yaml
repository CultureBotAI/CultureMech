preparation_notes: "Mix components and autoclave under a N2-CO2 (80:20, v/v) gas atmosphere.\
  \ After cooling, add the following solutions from anaerobic stocks (autoclaved or\
  \ filter-sterilized): \nAseptically and anaerobically distribute the medium into\
  \ culture vessels under a H2-CO2 (80:20, v/v) gas stream and seal with butyl stoppers.\
  \ Prior to inoculation, add per liter the following solutions (autoclaved and stored\
  \ under a N2 atmosphere): \nReadjust pH to 7.0 - 7.2, if necessary. Pressurize inoculated\
  \ culture vessels to 100 kPa H2-CO2 (80:20, v/v).\n\nOriginal volume: 1016 mL"
