preparation_notes: 'First dissolve ferric citrate in water by heating and adjust to
  pH 6.0, then add other medium ingredients except bicarbonate and vitamins. Sparge
  medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it anoxic, then
  add and dissolve bicarbonate and adjust pH to 6.8. Thereafter, dispense medium under
  80% N2 and 20% CO2 gas atmosphere into anoxic Hungate-type tubes or serum vials
  and autoclave. Add vitamins to the sterile medium from an anoxic stock solution
  prepared under 100% N2 gas and sterilized by filtration. Adjust pH of complete medium
  to 6.7 - 7.0, if necessary.

  Note: Use 5 - 10% (v/v) inoculum.


  Original volume: 1011 mL'
