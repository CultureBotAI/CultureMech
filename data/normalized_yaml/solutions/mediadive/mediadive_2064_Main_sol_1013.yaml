  incubated for 24 hours and wash off grown cells in 3 - 5 ml medium. The prey medium
  suspension should contain approx. 10<sup>7</sup> to 10<sup>9</sup> cells. Inoculate
  the complete medium immediately after preparation and incubate the suspension with
  shaking until a decrease in turbidity is visible.


