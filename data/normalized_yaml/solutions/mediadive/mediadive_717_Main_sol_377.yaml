preparation_notes: Dissolve ingredients except for sulfur, peptone, yeast extract,
  and sulfide, adjust the pH to 6.5 and sparge medium with 100% N2 gas for 30 - 45
  min to make it anoxic. Distribute medium under the same gas atmosphere into anoxic
  Hungate-type tubes or serum vials that already contain the appropriate amount of
  sulfur. Sterilize the medium by autoclaving at <b>110°C</b> for 20 min. After sterilization,
  add peptone and yeast extract from sterile stock solutions prepared under 100% N2
  gas atmosphere and sulfide from a neutralized stock solution.
