preparation_notes: 'Adjust to pH 9.0

  Prepare the medium omitting Na2CO3, NaHCO3, Na2S, Cysteine-HCl, CaCl2 x 2 H2O and
  MgCl2 x 6 H2O. Boil the medium and cool under nitrogen, add the Na2CO3 and NaHCO3
  and adjust the pH to 9.0 with 10 M KOH. Dispense into tubes or bottle fitted with
  rubber stoppers. Sterilize by autoclaving and add the Na2S (neutralized), Cysteine-HCl,
  CaCl2 x 2 H2O and MgCl2 x 6 H2O from sterile stock solutions.'
