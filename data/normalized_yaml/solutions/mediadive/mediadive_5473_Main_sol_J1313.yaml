preparation_notes: "Mix components thoroughly and autoclave under a N2-CO2 (9:1, v/v)\
  \ gas mixture. After cooling, aseptically and anaerobically add the following solutions\
  \ (autoclaved or *filter-sterilized): \nReadjust pH to 7.3, if necessary.\nMenadione\
  \ solution:\nAutoclave 100 mg menadione (vitamin K3) with 100 ml 5% NaHCO3 solution.\
  \ Remove insoluble residue by filtration. Store the solution under a N2-CO2 (8:2,\
  \ v/v) gas mixture.\n\nOriginal volume: 1002 mL"
