preparation_notes: Mix components except L-cysteine x HCl x H2O and Na2S x 9H2O and
  adjust pH to 7.2. Bring to a boil for 5-10 sec and cool down under a stream of N2-CO2
  (80:20, v/v). Distribute into culture vessels under the same gas mixture, seal with
  butyl rubber stoppers and autoclave. Separately autoclave L-cysteine x HCl x H2O
  and Na2S x 9H2O as 5% solutions under a N2 atmosphere. Prior to inoculation, add
  L-cysteine x HCl x H2O and Na2S x 9H2O solutions anaerobically.
