preparation_notes: "Dispense the medium into the culture vessels. For small volumes\
  \ serum bottles or Hungate tubes may be used. The gas phase to liquid ratio should\
  \ be about 1:10. Use a gas phase containing air, 20-30% methane and autoclave at\
  \ 121°C for 15 minutes. When the growth medium is cool the phosphate buffer is added.\n\
  Autoclave at 121°C for 15 min.\nAdd to the sterile medium from a filter sterilised\
  \ phosphate buffer: \nLiquid cultures should be grown with shaking.\nFinal pH of\
  \ the medium is 5.8."
