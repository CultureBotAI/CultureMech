preparation_notes: 'Dissolve ingredients (except vitamins, cysteine, and sulfide),
  sparge medium  with  80% H2 and 20% CO2 gas mixture to reach a pH below 6 (at least
  30 min), then dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials to 30% of their volume and autoclave. After sterilization add
  cysteine and sulfide from sterile anoxic stock solutions autoclaved under 100% N2
  gas atmosphere. Vitamins are prepared under 100% N2 gas atmosphere and sterilized
  by filtration. Adjust the pH of the final medium to 6.2.

  For incubation use sterile 80% H2 and 20% CO2 gas mixture at two atmospheres of
  pressure.


  Original volume: 1013 mL'
