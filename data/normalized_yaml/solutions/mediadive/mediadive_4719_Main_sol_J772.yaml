preparation_notes: "Mix components thoroughly, bring to a boil and cool down under\
  \ a H2-CO2 (4:1, v/v) gas stream. Distribute the medium into culture vessels (e.g.,\
  \ 10 ml of the medium in Balch tubes) under the same gas mixture, seal with butyl\
  \ rubber stoppers and autoclave. After cooling, add per liter the following solutions\
  \ from anaerobic stocks (autoclaved or *filter-sterilized): \nReadjust pH of the\
  \ medium to 7.2 - 7.4, if necessary. Pressurize the inoculated culture vessels to\
  \ 200 kPa H2-CO2 (4:1, v/v).\n\nOriginal volume: 1054 mL"
