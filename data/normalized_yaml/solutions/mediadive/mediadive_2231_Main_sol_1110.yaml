preparation_notes: 'Dissolve ingredients (except sulfur, carbonate, vitamins and sulfide),
  then sparge medium with 80% H2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type tubes
  or serum vials (to 20% of volume) that contain already the appropriate amount of
  sulfur. For sterilization heat cultivation vessels in a water bath to 90 - 100°C
  for 1 - 2 hours on each of three successive days. Add vitamins and sulfide from
  sterile anoxic stock solutions prepared under 100% N2 gas and carbonate from a sterile
  anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture. The vitamin
  solution should be sterilized by filtration. Adjust the pH of the complete medium
  to 7.0.

  After inoculation, pressurize culture vials to 1 bar overpressure with sterile 80%
  H2 and 20% CO2 gas mixture.


  Original volume: 1012 mL'
