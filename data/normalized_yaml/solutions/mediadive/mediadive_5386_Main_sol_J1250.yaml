preparation_notes: "Mix components thoroughly, adjust pH to 5.7 with HCl and autoclave.\
  \ After cooling, add the following solutions (filter-sterilized) to the medium:\
  \ \nAseptically distribute the medium into culture vessels (leave >80% volume gas\
  \ phase), and seal with butyl rubber stoppers. Then, add methane (filter-sterilized)\
  \ to the culture vessels to give a 30% concentration by volume in the gas phase\
  \ (overpressured). Check final pH of the medium to be 6.4-6.8.\n\nOriginal volume:\
  \ 1006 mL"
