preparation_notes: "Incubate all used glass ware and magnetic stirring rods in 0.1\
  \ M HCl and rinse 3x with double distilled water to remove residual detergents (always\
  \ check visual for soap bubbles).\nAutoclave the Basic-FWM and cool to room temperature.\
  \ This medium should be free of any precipitations!\nAseptically, add per L of BASIC-FWM\
  \ the following solutions from sterile stocks (do not store complemented FWM):\r\
  \n- Trace element solution (Nitrososphaera)\r\n- FeNaEDTA solution\r\n- NaHCO3 solution\r\
  \n- HEPES buffer solution\r\n- NH4Cl solution\r\n- Sodiumpyruvate solution\nAdjust\
  \ pH to 7.5."
