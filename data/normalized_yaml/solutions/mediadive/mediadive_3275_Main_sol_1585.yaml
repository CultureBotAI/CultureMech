preparation_notes: Dissolve ingredients except thiosulfate and adjust pH of medium
  to 6.5 -7.0. Dispense medium under air atmosphere into serum vials suitable for
  anaerobic cultivation (e.g., 20 ml medium in 100 ml bottles) and close with butyl
  rubber septa. After autoclaving complete medium with thiosulfate added from a stock
  solution sterilized by filtration and add 3% (v/v) sterile CO2 to the gas phase.
