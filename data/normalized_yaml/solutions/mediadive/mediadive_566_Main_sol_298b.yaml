preparation_notes: 'Dissolve ingredients except carbonate, glyoxalate, vitamins, cysteine
  and sulfide, then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45
  min to make it anoxic. Dispense medium in anoxic Hungate-type tubes or serum vials
  under the same gas atmosphere and autoclave. Add glyoxalate (sterilized by filtration),
  vitamins (sterilized by filtration), cysteine and sulfide from sterile anoxic stock
  solutions prepared under 100% N2 gas and carbonate from a sterile anoxic stock solution
  prepared under 80% N2 and 20% CO2 gas mixture. Prior to use adjust pH of complete
  medium to 7.2 - 7.5.

  Note: When growth has started, feed culture once or twice with the same amount of
  glyoxalate.


  Original volume: 1002 mL'
