preparation_notes: 'Dissolve ingredients (except carbonate, thiosulfate and vitamins),
  then sparge medium with 100% CO2 gas for 30 - 45 min to make it anoxic. Dispense
  medium under same gas atmosphere into anoxic Hungate-type tubes or serum vials up
  to a volume of 20% and autoclave. Add carbonate, thiosulfate and vitamins to the
  autoclaved medium from sterile anoxic stock solutions. Solutions of vitamins and
  thiosulfate are sterilized by filtration and stored under 100% N2 gas, whereas the
  stock solution of carbonate is prepared under 80% N2 and 20% CO2 gas mixture and
  autoclaved. Adjust pH of the complete medium to 6.7.

  After inoculation pressurize vessels to 0.5 bar overpressure with sterile 100% CO2
  gas and add sterile air in an amount that is equivalent to a volume of 20% of the
  headspace.


  Original volume: 1011 mL'
