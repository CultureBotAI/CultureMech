preparation_notes: 'Final pH 4.0-4.5.

  The medium is fairly weakly buffered so the pH should be checked before and after
  autoclaving. In the early stage of growth the strain may form aggregates which break
  as the culture ages. 10-30% methane is added to the gas phase. Adding 100 mg/litre
  KNO3 enhances growth.

  The strain should be grown with shaking.'
