preparation_notes: "Mix components, except NaHCO3, and adjust pH to 6.5. Bring to\
  \ a boil for 5-10 sec, cool down under a stream of a N2-CO2 (80:20 v/v) gas mixture\
  \ and add NaHCO3 to the solution. Distribute the medium into culture vessels (e.g.,\
  \ 20 ml medium in 60 ml serum bottle) under the same gas mixture and seal with butyl\
  \ rubber stoppers. After autoclaving, stand the medium overnight. Then, add per\
  \ liter the following solutions: \n\nOriginal volume: 1025 mL"
