preparation_notes: 'Dissolve ingredients (except thiosulfate, bicarbonate and vitamins),
  then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Adjust pH to 6.8 with NaOH, then dispense under same gas atmosphere into
  anoxic Hungate-type tubes or serum vials up to a volume of 20% and autoclave. Add
  thiosulfate, vitamins and bicarbonate to the autoclaved medium from sterile anoxic
  stock solutions. The stock solutions of thiosulfate and vitamins are sterilized
  by filtration and stored under 100% N2 gas, whereas the stock solution of bicarbonate
  is prepared under 80% N2 and 20% CO2 gas mixture and autoclaved. Adjust pH of the
  complete medium to 6.5.

  After inoculation add 1% (v/v) sterile O2 gas (e.g., by adding 1.50 ml sterile air
  to 5 ml medium in a Balch-type tube) and pressurize vials to 2 bar overpressure
  with sterile   80% N2 and 20% CO2 gas mixture.


  Original volume: 1011 mL'
