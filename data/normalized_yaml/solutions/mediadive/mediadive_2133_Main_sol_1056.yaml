preparation_notes: 'Dissolve ingredients (except carbonate, propionate, vitamins and
  sulfide) and sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to
  make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add propionate, vitamins (sterilized by filtration)
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas and carbonate
  from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture.
  Adjust pH of the complete medium to 7.0 - 7.2, if necessary.

  Prior to use add sterile 100% H2 gas to 0.5 bar overpressure.

  Note: Addition of 10 - 20 mg sodium dithionite per liter (e.g. from 5% (w/v) solution,
  freshly prepared under N2 and filter-sterilized) can be used to completely reduce
  the medium and may stimulate growth at the beginning.


  Original volume: 1003 mL'
