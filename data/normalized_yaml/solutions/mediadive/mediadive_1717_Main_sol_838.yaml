preparation_notes: 'First dissolve ferric citrate by heating the water under continuous
  stirring. After cooling to room temperature adjust the pH to 6.0, then add and dissolve
  the remaining ingredients, except carbonate, acetate and ascorbate. Sparge medium
  with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it anoxic, then dispense
  under the same gas atmosphere into anoxic Hungate-type tubes or serum vials and
  autoclave. After autoclaving add acetate and ascorbate from sterile anoxic stock
  solutions prepared under 100% N2 gas and carbonate from a sterile anoxic stock solution
  prepared under 80% N2 and 20% CO2 gas mixture. Prior to inoculation check the medium
  pH and adjust to 6.8, if necessary.


  Original volume: 1002 mL'
