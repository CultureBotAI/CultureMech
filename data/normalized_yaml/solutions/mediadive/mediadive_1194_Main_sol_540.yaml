preparation_notes: 'Dissolve ingredients (except bicarbonate, glucose, vitamins and
  reducing agents), then sparge medium with 80% N2 and 20% CO2 gas mixture for 30
  - 45 min to make it anoxic. Add solid bicarbonate and equilibrate pH to 6.8 with
  80% N2 and 20% CO2 gas mixture, then dispense under same gas atmosphere into anoxic
  Hungate-type tubes or serum vials and autoclave. Add glucose, vitamins, cysteine
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas atmosphere.
  Vitamins should be sterilized by filtration. Adjust pH of complete medium to 6.8
  - 7.0, if necessary.


  Original volume: 1015 mL'
