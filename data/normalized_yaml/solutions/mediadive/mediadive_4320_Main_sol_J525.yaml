preparation_notes: 'Dissolve ingredients except chalcopyrite in 500 ml distilled water,
  adjust pH to 0.8 with 10 N H2SO4 and autoclave. Pulp chalcopyrite in 500 ml distilled
  water and steam for 1 hr on each of 3 successive days. Combine the medium and the
  chalcopyrite concentrate.

  Comment: Chalcopyrite can be replaced with arsenopyrite or pyrite.'
