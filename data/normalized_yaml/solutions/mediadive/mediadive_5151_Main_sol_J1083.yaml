preparation_notes: "Mix components, except sulfur, and autoclave under a N2-CO2 (4:1,\
  \ v/v) gas mixture. After cooling, add the following solutions (filter-sterilized):\
  \ \nSteam sulfur for 3 hr on each of 3 successive days. Aseptically and anaerobically\
  \ distribute the medium and sulfur into culture vessels (e.g., 50 ml of the medium\
  \ and 0.04 g of sulfur in 120 ml serum bottle) under a N2-CO2 (4:1, v/v) gas mixture,\
  \ and seal with butyl rubber stoppers. Prior to use, anaerobically add per liter\
  \ the following solution from an anaerobic stock (autoclaved and stored under a\
  \ N2 atmosphere): \nAdjust pH to 6.0, if necessary.\n\nOriginal volume: 1021 mL"
