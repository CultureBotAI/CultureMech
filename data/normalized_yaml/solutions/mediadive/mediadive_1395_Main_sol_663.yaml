preparation_notes: 'Dissolve ingredients (except pyruvate, thiosulfate, vitamins,
  cysteine and sulfide), then sparge medium with 100% N2 gas for 30 - 45 min to make
  it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type tubes
  or serum vials and autoclave. Add pyruvate, thiosulfate, vitamins, cysteine and
  sulfide from sterile anoxic stock solutions prepared under 100% N2 gas. Stock solutions
  of pyruvate and vitamins are sterilized by filtration. Adjust medium pH to 7.5 by
  adding sterile anoxic 1 N NaOH.


  Original volume: 1007 mL'
