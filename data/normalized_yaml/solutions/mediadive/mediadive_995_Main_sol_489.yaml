preparation_notes: Dissolve ingredients (except cysteine and sulfide), adjust pH to
  7.0, bring medium to the boil, then cool to room temperature under 100% N2 gas.
  Dispense under same gas atmosphere into anoxic Hungate-type tubes or serum vials
  and autoclave. After sterilization add cysteine and sulfide from sterile anoxic
  stock solutions prepared under 100% N2 gas.
