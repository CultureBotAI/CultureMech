preparation_notes: 'Dissolve ingredients (except bicarbonate, acetate, butyrate, vitamins,
  and sulfide) and sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Add and dissolve bicarbonate, adjust pH to 7.0, then dispense
  medium under 80% N2 and 20% CO2 gas atmosphere into anoxic Hungate-type tubes or
  serum vials and autoclave. Add acetate, butyrate, vitamins, and sulfide from sterile
  anoxic stock solutions prepared under 100% N2 gas. The vitamin solution should be
  sterilized by filtration. Before use, check the complete medium''s pH and adjust
  it to 7.0 - 7.2, if necessary.


  Original volume: 1003 mL'
