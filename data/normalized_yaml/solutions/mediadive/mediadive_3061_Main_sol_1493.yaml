preparation_notes: 'Do not adjust the pH.

  For plates add 8g/l Gelrite or 15g Phytagel and 1g/L MgCl. A carbon source is not
  required because the organism degrades the polysaccharides in Gelrite or Phytagel

  For liquid medium use 0.8-2.0g/l Gelrite as carbon source (the medium remains liquid).
  Alternatively mannose (1g/l) may be used instead of Gelrite in liquid medium. Do
  not add mannose to solid media, which will inhibit growth.'
