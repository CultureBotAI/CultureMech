preparation_notes: 'Dissolve ingredients except thioglycolate and cellobiose, then
  sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic. Add thioglycolate
  and adjust pH of medium to 7.5 with 10 N KOH. Dispense medium under 100% N2 gas
  atmosphere into anoxic Hungate-type tubes or serum vials and autoclave at 121°C
  for 15 min. Add cellobiose from a sterile anoxic stock solution prepared under 100%
  N2 gas atmosphere and sterilized by filtration.

  Note: Bottled seawater from Biomaris GmbH can be used instead of filtered seawater.'
