preparation_notes: 'Dissolve ingredients (except bicarbonate and cysteine), adjust
  pH to 7.0 with NaOH and sparge medium with 80% N2 and 20% CO2 gas mixture for 30
  - 45 min. Add and dissolve solid bicarbonate and cysteine, dispense medium under
  same gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
  After autoclaving adjust pH of medium to 7.6 - 7.8 using a sterile anoxic stock
  solution of Na2CO3 (5% w/v) prepared under 80% N2 and 20% CO2 gas atmosphere.


  Original volume: 1004 mL'
