preparation_notes: Mix ingredients, except Na2S x 9H2O and L-cystine, and adjust pH
  to 6.0 with H2SO4. Fill the gas phase with N2, seal with butyl rubber stopper, and
  autoclave. Separately autoclave Na2S x 9H2O and L-cystine as 5% and 12% solutions,
  respectively, under a N2 atmosphere. Prior to inoculation, add the sterile Na2S
  x 9H2O and cystine solutions, and readjust pH to 6.0, if necessary. Pressurize the
  inoculated bottles to 300 kPa N2.
