preparation_notes: 'Mix ingredients, except NaHCO3 and Na2S x 9H2O, and bring to a
  boil for 5-10 sec. Cool down under a stream of N2 and add NaHCO3 to the medium.
  Anaerobically dispense the medium into culture vessels, seal with butyl rubber stoppers
  and autoclave. Separately autoclave 5% Na2S x 9H2O solution under a N2 atmosphere.
  Prior to inoculation, aseptically and anaerobically add the Na2S x 9H2O solution
  to the medium. Check final pH to be 7.2-7.4.


  Original volume: 1011 mL'
