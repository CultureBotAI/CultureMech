preparation_notes: 'Dissolve ingredients except carbonate, pyruvate, vitamins, cysteine
  and sulfide, then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45
  min to make it anoxic. Distribute medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. After autoclaving add pyruvate, vitamins, cysteine
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas atmosphere
  and carbonate from a sterile anoxic stock solution prepared under 80% N2 and 20%
  CO2 gas mixture. The pyruvate and vitamin solutions should be sterilized by filtration.
  Check pH of complete medium and adjust to 7.2, if necessary.


  Original volume: 1004 mL'
