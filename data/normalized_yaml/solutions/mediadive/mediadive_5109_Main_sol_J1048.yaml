preparation_notes: "Mix components, except NaHCO3, and adjust pH to 7.0. Bring to\
  \ a boil for 5-10 sec, cool down under a stream of N2-CO2 (80:20, v/v) and add NaHCO3\
  \ to the medium. Dispense the medium into culture vessels under a stream of N2-CO2\
  \ (80:20, v/v), seal with butyl rubber stoppers and autoclave. After autoclaving,\
  \ stand the medium overnight. Prior to use, add per liter the following solutions\
  \ (autoclaved and stored under a N2 atmosphere): \nComment: For strain JCM 30226,\
  \ supplement with 20 mM (final) tetramethylammonium as a substrate instead of methanol.\n\
  \nOriginal volume: 1042 mL"
