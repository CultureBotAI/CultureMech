preparation_notes: "Mix components except sulfur, adjust pH to 5.5 with H2SO4 and\
  \ autoclave under a N2 gas atmosphere. Steam sulfur for 3 hr on each of 3 successive\
  \ days. Aseptically distribute the medium and sulfur into culture vessels (e.g.,\
  \ 20 ml of the medium and 0.6 g sulfur in 120 ml serum bottles) under a stream of\
  \ a H2-CO4 (80:20, v/v) gas mixture and seal with butyl rubber stoppers. Prior to\
  \ inoculation, add per litter the following solution (autoclave and stored under\
  \ a N2 atmosphere): \nReadjust pH to 5.5, if necessary. Pressurize inoculated vessels\
  \ to 200kPa H2 -CO2 (80:20, v/v).\n\nOriginal volume: 1020 mL"
