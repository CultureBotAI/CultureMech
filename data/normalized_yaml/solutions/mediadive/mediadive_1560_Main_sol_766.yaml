preparation_notes: Prepare the medium without Na2S x 9 H2O and NaHCO3, boil and cool
  under N2. Add the NaHCO3 to the cooled medium and adjust the pH to 6.7. Dispense
  into Hungate tubes or serum bottles under N2 and autoclave. Reduce the medium before
  use from a sterile stock solution of neutralised Na2S x 9 H2O.
