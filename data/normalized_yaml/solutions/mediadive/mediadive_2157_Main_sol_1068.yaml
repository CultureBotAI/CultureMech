preparation_notes: 'Dissolve ingredients (except lactate, vitamins and reducing agents),
  adjust pH to 7.5 and sparge medium with 100% N2 gas for at least 30 - 45 min to
  make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add lactate, vitamins, sulfide and cysteine
  from sterile anoxic stock solutions prepared under 100% N2 gas. The vitamin solution
  should be sterilized by filtration. Adjust pH of the complete medium to 7.5, if
  necessary.


  Original volume: 1002 mL'
