preparation_notes: Prepare the medium and boil, cool under N2:CO2 (80:20 v/v). Dispense
  medium into Hungate tubes or serum bottles under N2:CO2 (80:20 v/v), autoclave.
  To the sterile medium add from sterile stock solutions 2% Na2S x 9 H2O (0.2 ml/10
  ml), 10% NaHCO3 (0.2 ml/10 ml), 1M glucose (0.2 ml/10 ml) and 1M sodium thiosulphate
  (0.2 ml/10 ml). Final pH 7.0
