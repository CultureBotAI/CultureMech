preparation_notes: Prepare the medium under 100% N2 and adjust final pH to 6.5. The
  medium, containing sulphur, is sterilized by steaming on three consecutive days
  for 3 h. Reduce the medium with a sterile Na2S stock solution to give a final concentration
  of 0.5 g/l.
