preparation_notes: "Mix components except NaHCO3 and bring to a boil for 5-10 sec.\
  \ Cool down under a stream of H2-CO2 (80:20, v/v) and add NaHCO3 to the medium.\
  \ Dispense the medium into culture vessels under a stream of H2-CO2 (80:20, v/v),\
  \ seal with butyl rubber stoppers and autoclave. Prior to inoculation, add per liter\
  \ the following solutions (autoclaved and stored under a N2 atmosphere): \nPressurize\
  \ inoculated vessels to 200 kPa with a H2-CO2 (80:20, v/v) gas mixture.\n\nOriginal\
  \ volume: 1022 mL"
