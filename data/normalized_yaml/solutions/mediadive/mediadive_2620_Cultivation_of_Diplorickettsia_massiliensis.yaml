preparation_notes: "Cultivation of XTC-2 (from Xenopus laevis) cells \nFilter-sterilize\
  \ (0.2 µm) and keep no longer than 4 weeks. Store at room temperature to facilitate\
  \ detection of contamination.\nPrepare a 25 cm<sup>2</sup> flask and seed cells\
  \ according to standard protocols. Incubate at 28 - 32°C in hermetic flasks. Cells\
  \ are easily detached mechanically, no enzyme is necessary. Medium should be changed\
  \ once a week. When a confluent layer has formed, infection can be carried out.\n\
  \nOriginal volume: 100 mL"
