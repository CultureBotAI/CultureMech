preparation_notes: "Mix components, except sulfur, bring to a boil and cool down under\
  \ a CO2 (100%) gas stream. While gassing, add the following components to the medium:\
  \ \nBubble CO2 for 3 - 4 min and check pH to be 6.5 - 6.8. Readjust pH to the range\
  \ if necessary. Autoclave under a CO2 gas atmosphere. Add the following solution\
  \ to the medium (separately autoclaved under N2): \nSteam sulfur for 3 hr on each\
  \ of 3 successive days. Aseptically and anaerobically distribute the medium into\
  \ culture vessels containing appropriate amount of sulfur (e.g., 10 ml of the medium\
  \ and 0.05 g sulfur in Hungate tubes) under a CO2 stream and seal with butyl rubber\
  \ stoppers.\n\nOriginal volume: 1030 mL"
