preparation_notes: 'Final pH 7.5

  Prepare and boil the medium in the absence NaHCO3. Cool under a stream of N2/CO2
  (80:20) and add the remaining components. Fill 10 ml of medium in 100 ml serum bottles
  (100 ml) under a stream of N2/CO2 (80:20) and autoclave at 121°C for 15 min. Add
  sterile 1.3 mM Na2S x 9 H2O and 1ml/l filter-sterilised vitamin solution (see below).
  Adjust the final ph to 7.5.'
