preparation_notes: 'pH 7.2

  Add the filter-sterilized heptadecane to the autoclaved medium. Solid medium is
  prepared by adding 20.0 g/l agar. Prepare slopes in screw cap bottles by adding
  the filter-sterilized heptadecane to the warm medium and carefully mixing so that
  the heptadecane is evenly distributed in the agar. Avoid excessive air bubble formation,
  and cool the agar slopes in a refrigerator or under an ice pack.'
