preparation_notes: "Mix components and adjust pH to 7.0. Bring to a boil for 5-10\
  \ sec, then, cool down under a N2-CO2 (80:20, v/v) gas stream. Dispense the medium\
  \ into culture vessels (e.g., 20 ml/100 ml serum bottle) under the same gas mixture,\
  \ seal with butyl rubber stoppers and autoclave. After cooling, add per liter the\
  \ following solutions aseptically and anaerobically (autoclaved or *filter-sterilized):\
  \ \nJust before use, replace the gas phase with a H2-CO2 (80:20, v/v) gas mixture,\
  \ and add per liter the following solution from sterile anaerobic stock (autoclaved\
  \ and stored under a N2 atmosphere): \nPressurize the inoculated culture vessels\
  \ to 200 kPa H2-CO2 (80:20, v/v).\n\nOriginal volume: 1022 mL"
