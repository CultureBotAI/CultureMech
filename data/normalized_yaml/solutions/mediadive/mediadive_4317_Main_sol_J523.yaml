preparation_notes: "Mix components thoroughly and autoclave. After cooling, add the\
  \ following solutions (filter-sterilized) to the medium: \nThen, distribute the\
  \ medium into culture vessels (leave >80% gas phase, by volume) and seal with butyl\
  \ rubber stoppers. Replace the gas phase with N2-CO2-CH4-O2 (40:15:40:5, by volume)\
  \ and pressurize to 100 kPa with the same gas mixture. Check final pH of the medium\
  \ to be around 6.0.\n\nOriginal volume: 1007 mL"
