preparation_notes: 'Dissolve sodium chloride, potassium hydrogenphosphate and ammonium
  chloride, then sparge solution with 80% N2 and 20% CO2 gas mixture for at least
  30 - 45 min to remove dissolved oxygen and to saturate the solution with CO2. Dispense
  solution in vials suitable for anaerobic cultures (e.g. Balch-type tubes) to 50%
  volume under air atmosphere. Close vials with butyl rubber septa to prevent free
  exchange of oxygen with the external atmosphere and autoclave. Add trace elements,
  calcium chloride, magnesium sulfate, thiosulfate, bicarbonate and vitamins from
  sterile stock solutions and adjust pH of the medium to 7.5 - 7.8 using a sterile
  stock solution of sodium carbonate (5% w/v).

  Note: Use at least 10% (v/v) as inoculum.


  Original volume: 1002 mL'
