  \ from an anaerobic stock [filter-sterilized and stored under N2-CO2 (4:1, v/v)]:\
  \ \nAseptically distribute the medium into culture vessels under a stream of N2-CO2\
  \ (4:1, v/v) and seal with butyl rubber stoppers. Prior to inoculation, add per\
  \ liter the following solution from an anaerobic stock (autoclave and store under\
  \ a N2 atmosphere): \n\nOriginal volume: 1034 mL"
