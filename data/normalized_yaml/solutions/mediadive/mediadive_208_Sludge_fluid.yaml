preparation_notes: Add 0.4% yeast extract to sludge from an anaerobic digester, and
  after gassing with nitrogen gas for a few minutes incubate it at 37°C for 24 hours.
  Then centrifuge the sludge at 13000 g and autoclave the resulting, clear supernatant
  in screw-capped vessels under nitrogen gas. The sludge fluid can be stored at 8-12°C
  in the dark.
