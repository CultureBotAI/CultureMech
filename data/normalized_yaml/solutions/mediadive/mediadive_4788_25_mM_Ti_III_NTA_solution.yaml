preparation_notes: 'To prepare anaerobic water, boil 1.0 L distilled water and cool
  down under a stream of oxygen-free N2 gas. Mix components under N2 gas. Adjust pH
  to 9.0 with NaOH. Slowly add 9.6 ml of 20% TiCl3 to the chelator solution. Keep
  the pH above 2.0 by the addition of anaerobic saturated Na2CO3 solution. Adjust
  pH to 7.0 with Na2CO3 solution, adjust pH to 7.0 and bring the final volume to 500
  ml with the anaerobic water. Filter-sterilize and keep the solution under a N2 gas
  atmosphere.


