preparation_notes: 'Dissolve all ingredients except carbonate, crotonate, vitamins,
  sulfide and cysteine, then sparge medium with 80% N2 and 20% CO2 gas mixture for
  30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere into anoxic
  Hungate-type tubes or serum vials and autoclave. Add crotonate, vitamins, sulfide
  and cysteine from sterile anoxic stock solutions prepared under 100% N2 gas and
  carbonate from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2
  gas atmosphere. Sterilize vitamins by filtration. Adjust pH of complete medium to
  7.0, if necessary.


  Original volume: 1012 mL'
