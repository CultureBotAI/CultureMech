preparation_notes: "Sparge medium with 100% N2 gas mixture for 20 min to make it anoxic.\n\
  Adjust pH to 6.5-6.8 with 1N H2SO4.\nFill 10 ml of medium in serum bottles (100\
  \ ml) under a protective H2/CO2 atmosphere and tightly stopper.\nAutoclave at 121\
  \ °C for 15 min.\nafter autoclaving add the following filter-sterilized solutions.\n\
  apply xx bar H2/CO2 (80%/20%) + yy % O2 \r\n(Note: strain specific conditions need\
  \ to be applied)\nFor more details on the medium see the original description (Huber\
  \ et al. System. Appl. Microbiol. 15:340-351 (1992))."
