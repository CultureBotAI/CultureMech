preparation_notes: "Mix components thoroughly and autoclave. After cooling, add the\
  \ following solutions (autoclaved) to the medium: \nAdjust pH to 6.8, if necessary.\
  \ Cultivate with methane or methanol as a substrate as described below:\nMethane:\
  \ Aseptically distribute the medium into sterile serum bottles (leave &; 80% gas\
  \ phase by volume) and seal with rubber stoppers. Replace the gas phase with an\
  \ air-methane gas mixture (75:25, v/v). Cultivate with shaking.\nMethanol: Aseptically\
  \ distribute the medium into culture vessels (e.g., 20 ml in 60 ml serum bottles),\
  \ supplement with 4.0 ml per liter filter-sterilized methanol and seal with rubber\
  \ stoppers.\n\nOriginal volume: 1016 mL"
