preparation_notes: Add syringic acid to 700 ml distilled water, add about 50 ml of
  5 N NaOH and adjust the pH to about 7.5 to dissolve it. Then make up to a volume
  of 1000 ml with water. Make the solution anoxic by sparging with 100% N2 gas, distribute
  in anoxic serum vials and autoclave at 121°C.
