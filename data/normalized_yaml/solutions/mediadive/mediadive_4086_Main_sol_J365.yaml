preparation_notes: 'Mix ingredients except CaCl2 x 2H2O, MgCl2 x 6H2O, sulfur and
  Na2S x 9H2O, adjust pH to 6.5 and autoclave. Separately autoclave CaCl2 x 2H2O and
  MgCl2 x 6H2O and add to the medium. Steam sulfur for 3 hr on each of 3 successive
  days. Autoclave neutralized 5% Na2S x 9H2O under a N2 atmosphere. Dispense the medium
  into culture vessels containing sulfur under a N2 atmosphere, and seal with butyl
  rubber stoppers. Prior to inoculation, add the sterile Na2S x 9H2O solution to the
  medium and readjust pH, if necessary.


  Original volume: 1020 mL'
