preparation_notes: 'Adjust pH to 7.3.

  Sterilize glucose and mannitol separately (in 50 ml H2O) and add to the medium after
  autoclaving. Calcium carbonate in the medium serves as a buffer. The calcium carbonate
  will settle in agar plates before the agar has set, producing an opaque layer in
  the bottom. As the strain grows and acid is produced this will react with the calcium
  carbonate, causing it to dissolve and form zones of clearing immediately below the
  colonies.'
