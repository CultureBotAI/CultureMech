preparation_notes: 'The chitin solution is prepared as follows: mix 20 g chitin (practical
  grade from crab shells) with 200 ml of 37% HCl (pre-cooled to 4°C) and stir for
  1 hr at 4°C. Pour the suspension into 1 litre of distilled water (pre-cooled to
  4°C) and filter through filter paper (Schleicher and Schüll Nr. 311853). Wash the
  residue five times with 500 ml distilled water and resuspend in 1 litre of distilled
  water. Neutralise the suspension with 10 ml of 5M KOH (final pH 6.5). Filter and
  wash with 3 litres of distilled water to remove KCl.


  Original volume: 1200 mL'
