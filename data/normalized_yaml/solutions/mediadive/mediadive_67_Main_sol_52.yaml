preparation_notes: 'Dissolve all ingredients (except ethanol, carbonate, vitamins,
  cysteine and sulfide) and sparge medium with 80% N2 and 20% CO2 gas mixture for
  30 - 45 min to make it anoxic. Add ethanol, then dispense medium under same gas
  atmosphere in Hungate-type tubes or serum vials and autoclave. After autoclaving,
  add carbonate from a sterile stock solution prepared under 80% N2 and 20% CO2 gas
  atmosphere and vitamins from an anoxic and filter-sterilized stock solution prepared
  under 100% N2 gas. Before inoculation, add cysteine and sulfide from sterile anoxic
  stock solutions prepared under 100% N2 gas. Adjust pH of medium to 6.8 - 7.0, if
  necessary.

  Note: If reduction of medium is not complete after inoculation, add 10 - 20 mg/l
  sodium dithionite from a 5% w/v solution freshly prepared under 100% N2 gas and
  filter sterilized.


  Original volume: 1023 mL'
