preparation_notes: 'Dissolve ingredients (except carbonate, vitamins, glucose and
  sulfide), sparge medium with 80% N2 and 20% CO2 gas for 30 - 45 min to make it anoxic.
  Dispense medium under same gas atmosphere into anoxic Hungate-type tubes or serum
  vials and autoclave. Add glucose, vitamins (sterilized by filtration) and sulfide
  from sterile anoxic stock solutions prepared under 100% N2 gas and carbonate from
  a sterile anoxic stock solution prepared under 80% N2 and 20% CO2. Adjust pH of
  complete medium to 7.2 - 7.4.


  Original volume: 1015 mL'
