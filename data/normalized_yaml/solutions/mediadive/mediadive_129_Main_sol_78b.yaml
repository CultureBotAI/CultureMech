preparation_notes: "Use lean beef or horse meat. Remove fat and connective tissue\
  \ before grinding. Mix meat, water and NaOH, then boil for 15 min with stirring.\
  \ Cool to room temperature, skim fat off surface, and filter, retaining both meat\
  \ particles and filtrate. To the filtrate add Casitone, yeast extract, hydrogen\r\
  \nphosphate and resazurin, then add water to a final volume of 700 ml. Sparge medium\
  \ with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it anoxic, then add\
  \ cysteine and adjust pH to 7.0.\r\nDispense medium under same gas atmosphere into\
  \ anoxic Hungate-type tubes containing meat particles (use ca. 7 ml liquid medium\
  \ for 1 - 2 g meat particles), then autoclave at 121°C for 20 min.\nIn some cases\
  \ (as indicated in the catalogue) the addition of Haemin and Vitamin K1 or Vitamin\
  \ K3 is necessary. Add to 1000 ml of medium after autoclaving:\n\nOriginal volume:\
  \ 1025 mL"
