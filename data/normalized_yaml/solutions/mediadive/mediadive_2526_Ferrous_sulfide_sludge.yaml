preparation_notes: 'Heat distilled water to 50°C in a 250 ml beaker with a stir bar
  present. While rapidly stirring the water, add the ferrous sulfate followed immediately
  by the sodium sulfide. The formed black FeS sludge is decanted into a glass bottle
  that can be stoppered. The FeS is allowed to settle for several hours and then the
  overlying water is decanted and replaced. This procedure is repeated at least five
  times to wash the FeS. After washing, the pH of the FeS solution should be close
  to neutrality. The FeS suspension can be kept in closed bottles or tubes under a
  nitrogen atmosphere for at least three months.


  Original volume: 100 mL'
