preparation_notes: 'Dissolve ingregients except bicarbonate, vitamins and sulfide,
  then sparge medium with 80% H2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic, then dispense under same gas atmosphere into serum vials to 30% of their
  volume and autoclave. Add vitamins and sulfide from sterile anoxic stock solutions
  prepared under 100% N2 gas and bicarbonate from a sterile anoxic stock solution
  prepared under 80% N2 and 20% CO2 gas mixture. Vitamins should be sterilized by
  filtration. Adjust pH of the complete medium to 6.5, if necessary.

  After inoculation pressurize vessels to 2 bar overpressure with sterile 80% H2 and
  20% CO2 gas mixture.


  Original volume: 1007 mL'
