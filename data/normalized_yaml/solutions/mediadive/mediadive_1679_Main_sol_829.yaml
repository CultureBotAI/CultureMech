preparation_notes: 'Dissolve ingredients (except sulfur, carbonate, vitamins, growth-stimulating
  factors and Na-dithionite), boil medium for 1 min, then cool to room temperature
  under 80% H2 and 20% CO2 gas atmosphere. Adjust pH to 6.0 and dispense under 80%
  H2 and 20% CO2 gas atmosphere into anoxic Hungate-type tubes or serum vials which
  contain already the appropriate amount of sulfur, only to 30% of their volume to
  allow for a large head space. Autoclave at a temperature of <b>110°C</b> for 20
  min! Add vitamins and growth-stimulating factors from sterile anoxic stock solutions
  prepared under 100% N2 gas and carbonate and Na-dithionite from sterile anoxic stock
  solution prepared under 80% N2 and 20% CO2 gas atmosphere. Vitamins and Na-dithionite
  are sterilized by filtration. Adjust pH of the complete medium to 6.0, if necessary.

  After inoculation use 1 bar overpressure of sterile 80% H2 and 20% CO2 gas mixture.


  Original volume: 1005 mL'
