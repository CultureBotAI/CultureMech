preparation_notes: 'Dissolve ingredients except bicarbonate, cysteine and sulfide.
  Sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic. Add and dissolve
  bicarbonate, adjust pH to 6.8 and dispense medium under 100% N2 gas atmosphere into
  anoxic Hungate-type tubes or serum vials and autoclave. Add cysteine and sulfide
  from sterile anoxic stock solutions prepared under 100% N2 gas. Prior to use check
  pH of complete medium and adjust to 6.8 - 7.0, if necessary.


  Original volume: 1003 mL'
