preparation_notes: 'Final pH 7.2 - 7.4

  Prepare the medium without yeast extract, Na2S x 9 H2O, NaHCO3, glucose and vitamin
  solution (prepared as anaerobic, sterile stock solutions). Boil the medium and cool
  under anaerobic gas mixture of N2:CO2 (80:20). Dispense medium into Hungate tubes
  or serum bottles using the same gas mixture. Autoclave. Add the remaining components
  to the medium once it has cooled and check the final pH.'
