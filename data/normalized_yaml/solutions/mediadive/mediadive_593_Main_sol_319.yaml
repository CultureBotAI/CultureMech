preparation_notes: 'Dissolve ingredients (except cysteine, magnesium chloride, calcium
  chloride and vitamins), bring medium to the boil, then cool to room temperature
  under 100% N2 gas atmosphere. Thereafter, add and dissolve cysteine, adjust pH to
  6.5 and dispense under same gas atmosphere into anoxic Hungate-type tubes or serum
  vials and autoclave. After sterilization add magnesium chloride and calcium chloride
  from sterile anoxic stock solutions autoclaved under 100% N2 gas and vitamins from
  a filter-sterilized stock solution prepared under N2 gas.

  Note: For agar medium add 20.00 g/l agar, 5.00 g/l CaCO3, and 2.00 g/l soluble starch.


  Original volume: 1013 mL'
