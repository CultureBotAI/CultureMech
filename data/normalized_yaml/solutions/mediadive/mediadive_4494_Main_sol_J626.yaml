preparation_notes: Mix ingredients except glucose, sulfur and Na2S x 9H2O, and autoclave
  under a N2 atmosphere. Separately autoclave glucose as a 20% solution and Na2S x
  9H2O as a 5% solution under a N2 atmosphere. Steam sulfur for 3 hr on each of 3
  successive days. Aseptically and anaerobically add glucose and sulfur to the medium.
  Prior to inoculation, add sterile Na2S x 9H2O solution and adjust pH to 7.5 with
  sterile 1 N H2SO4.
