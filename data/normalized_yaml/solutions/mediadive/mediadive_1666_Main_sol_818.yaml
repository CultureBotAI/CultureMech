preparation_notes: 'Dissolve ingredients except bicarbonate, nitrate, vitamins and
  acetate. Sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic, adjust
  pH to 7.0 - 7.4, then dispense under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add nitrate, vitamins and acetate from sterile
  anoxic stock solutions prepared under 100% N2 gas and bicarbonate from a sterile
  anoxic stock solution prepared under 80% N2 and 20% CO2 gas atmosphere. Vitamins
  should be sterilized by filtration. The pH of the complete medium should be adjusted
  to 7.4 - 7.8, if necessary.


  Original volume: 1003 mL'
