preparation_notes: "Mix components thoroughly and autoclave the medium under a N2:CO2\
  \ (80:20, v/v) gas atmosphere. After cooling, add the following solutions (filter-sterilized):\
  \ \nAdjust pH to 7.0-7.2, if necessary. Aseptically and anaerobically, distribute\
  \ the medium into culture vessels under the same gas mixture (e.g., 20 ml medium\
  \ in 60 ml-serum bottles) and seal with butyl rubber stoppers. Add per liter the\
  \ following solution (autoclaved and stored under a N2 atmosphere). \n\nOriginal\
  \ volume: 1025 mL"
