preparation_notes: 'Dissolve ingredients (except cysteine), boil medium for 1 min,
  then cool to room temperature under 100% N2 gas atmosphere. Dispense medium under
  the same gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
  Before inoculation, add cysteine and xylan from a sterile anoxic stock solution
  prepared under 100% N2 gas and adjust pH of complete medium to 7.0.


  Original volume: 1012 mL'
