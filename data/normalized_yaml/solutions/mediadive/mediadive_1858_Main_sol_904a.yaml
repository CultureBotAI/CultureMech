preparation_notes: Dissolve ingredients except glucose, sulfide and cysteine, adjust
  pH to 6.0 and sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic.
  Dispense medium under same gas atmosphere into anoxic Hungate-type tubes or serum
  vials (to 30% of volume) and autoclave. Add glucose, sulfide and cysteine from sterile
  anoxic stock solutions prepared under 100% N2 gas.
