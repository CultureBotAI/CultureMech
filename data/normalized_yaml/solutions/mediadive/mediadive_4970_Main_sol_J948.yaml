preparation_notes: "Mix ingredients, except NaHCO3, and bring to a boil for 5-10 sec.\
  \ Cool down under a stream of H2-CO2 (80:20, v/v), and add NaHCO3 to the medium.\
  \ Dispense the medium into suitable culture vessels (e.g., serum bottles, Hungate\
  \ tubes) under the same gas mixture, seal with butyl rubber stoppers and autoclave.\
  \ Allow to stand the autoclaved medium overnight. Prior to inoculation, add per\
  \ liter the following solutions aseptically and anaerobically (autoclaved and stored\
  \ under a N2 atmosphere): \nPressurize the inoculated culture vessels to 200 kPa\
  \ H2-CO2 (80:20, v/v).\n\nOriginal volume: 1040 mL"
