preparation_notes: 'Final pH ca. 3.8 (pH is not adjusted)

  Both liquid and solid media are prepared by autoclaving the medium without the addition
  of glacial acetic acid and absolute ethanol. Glacial acetic acid and absolute ethanol
  are sterilised either by filtration (use Teflon filters) or they may be autoclaved
  in completely closed screw cap glass bottles sealed with a Teflon coated septum.
  The preparation of solid media employs a double layer system similar to that described
  for Acetobacter europaeus medium (see medium 631). Substitute the components listed
  above and prepare a lower, 0.5% agar layer, which is then overlaid with a 1.0% agar
  layer as described in medium 631. Incubate in closed containers to keep the humidity
  high (> 90%).'
