preparation_notes: 'Infect cells with 1 ml of Diplorickettsia stock solution (thawed
  quickly to 37°C). Incubate for 1 h at room temperature. Cultivation temperature:
  28°C.

  Up to 100% of the cells should be infected after several days. The infection level
  is evaluated after 3 days by Cytospin and Gimenez staining. Cytopathic effects may
  be visible after 3-5 days. Specific PCRs can be performed to verify the presence
  of diplorickettsiae.


  Original volume: 100 mL'
