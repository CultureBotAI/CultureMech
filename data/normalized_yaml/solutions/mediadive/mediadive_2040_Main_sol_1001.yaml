preparation_notes: 'Add all basal medium ingredients without vitamins.

  Sparge medium with 80% N2 and 20% CO2 gas mixture for 10 min Bubble the medium with
  N2:CO2 (80:20) to make anoxic.

  Adjust pH to 6.8-7.0.

  Dispense into serum bottles (using 10ml medium in 100 ml bottles with N2:CO2 headspace).

  Autoclave at 121 °C for 15 min.

  After autoclaving, add the following solutions to a final volume of 10ml/L each.

  Note: This medium should not be exposed to direct sunlight! Store out of direct
  light.'
