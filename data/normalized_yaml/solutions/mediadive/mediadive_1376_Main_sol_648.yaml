preparation_notes: Dissolve DIFCO Marine Broth powder and resazurin, bring the medium
  to a boil, then cool to room temperature under 80% N2 and 20% CO2 gas atmosphere.
  Dispense the medium under the same gas atmosphere into anoxic Hungate-type tubes
  or serum vials and autoclave. Complete the medium by adding glucose, cysteine, and
  sulfide from sterile anoxic stock solutions prepared under 100% N2 gas and carbonate
  from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture.
  The pH of the complete medium should be around 6.6.
