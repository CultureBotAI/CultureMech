preparation_notes: "Mix components except sulfur, and autoclave under a N2-CO2 (4:1,\
  \ v/v) gas mixture. Steam sulfur for 3 hr on each of 3 successive days. Aseptically\
  \ distribute the medium into culture vessels containing appropriate amount of sulfur\
  \ while gassing with a N2-CO2 (4:1, v/v) gas mixture and seal with butyl rubber\
  \ stoppers. Add per liter the following solutions (autoclaved and stored under N2,\
  \ or *filter-sterilized and stored under N2-CO2, 4:1, v/v): \n\nOriginal volume:\
  \ 1063 mL"
