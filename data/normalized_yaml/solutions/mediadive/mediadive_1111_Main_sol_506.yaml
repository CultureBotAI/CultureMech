preparation_notes: 'Dissolve ingredients except carbonate, vitamins, cysteine and
  sulfide, then sparge medium with 80% H2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Add and dissolve carbonate, then dispense medium into anoxic
  Hungate-type tubes or serum vials to 30% of their volume under 80% H2 and 20% CO2
  gas atmosphere and autoclave. Add vitamins (sterilized by filtration), cysteine
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas. Prior
  to use check pH of complete medium and adjust to 5.8 - 6.0, if necessary.

  Note: After growth has started and the culture is becoming turbid add sterile 80%
  H2 and 20% CO2 gas mixture to 0.5 - 1 bar overpressure.


  Original volume: 1011 mL'
