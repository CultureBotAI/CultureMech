preparation_notes: 'Dissolve ingredients (except vitamins, carbonate, cellobiose and
  sulfide), then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Prior to inoculation add vitamins, cellobiose
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas and carbonate
  from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture.
  Stock solutions of vitamins and cellobiose should be sterilized by filtration. The
  pH of the complete medium should be at 7.1 - 7.3.


  Original volume: 1002 mL'
