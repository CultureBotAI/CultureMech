preparation_notes: 'Dissolve ingredients except bicarbonate, magnesium chloride, calcium
  chloride, vitamins, trimethylamine, cysteine and sulfide, then sparge medium with
  80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it anoxic. Add bicarbonate
  and equilibrate pH to 6.9 - 7.0, then distribute under the same gas atmosphere into
  anoxic Hungate-type tubes or serum vials and autoclave. Add magnesium chloride,
  calcium chloride, vitamins (sterilized by filtration), trimethylamine, cysteine
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas. Prior
  to use adjust pH of complete medium to 7.2, if necessary.


  Original volume: 1002 mL'
