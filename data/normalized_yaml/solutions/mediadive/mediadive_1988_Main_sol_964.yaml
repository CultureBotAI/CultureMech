preparation_notes: Dissolve ingredients (except sulfur, peptone, yeast extract, and
  sulfide), sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make
  it anoxic. Adjust pH to 7.2 - 7.4, then dispense medium under the same gas atmosphere
  into anoxic Hungate-type tubes or serum vials containing already the appropriate
  amount of sulfur and autoclave at <b>110°C</b> for 20 min. Add peptone, yeast extract
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas. The
  pH of the complete medium should be 7.5.
