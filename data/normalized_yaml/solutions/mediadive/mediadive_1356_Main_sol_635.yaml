preparation_notes: 'Dissolve ingredients (except cysteine and vitamins), sparge medium
  with 100% N2 gas for 30 - 45 min to make it anoxic. Then add cysteine, adjust pH
  to 7.0, dispense medium under the same gas atmosphere in anoxic Hungate-type tubes
  or serum vials, and autoclave. After sterilization, add vitamins from a sterile
  anoxic stock solution prepared under 100% N2 gas and sterilized by filtration. Check
  the pH of the complete medium and adjust to 7.0 if necessary.


  Original volume: 1006 mL'
