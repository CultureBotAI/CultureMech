preparation_notes: "Mix components thoroughly, and autoclave under a N2-CO2 (80:20,\
  \ v/v) gas atmosphere. After cooling, aseptically and anaerobically add the following\
  \ solutions (filter-sterilized): \nDistribute the medium into culture vessels (leave\
  \ >80% gas phase by volume) under a H2-CO2 (80:20, v/v) gas mixture, seal with butyl\
  \ rubber stoppers. Finally, add per liter the following solutions from anaerobic\
  \ stocks (autoclaved and stored under a N2 atmosphere): \nPressurize the inoculated\
  \ vessels to 200 kPa H2-CO2 (80:20, v/v).\n\nOriginal volume: 1012 mL"
