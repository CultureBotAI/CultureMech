preparation_notes: 'Dissolve ingredients except calcium and magnesium chloride and
  adjust pH of the medium to 7.2 with NaOH. After autoclaving add calcium and magnesium
  from sterile stock solutions.

  Before inoculation prepare a suspension of prey cells in 30-40 ml medium using a
  250 ml flask. Usually the resuspension of two overnight cultures of the prey strain
  on agar slants of DSMZ medium 54 will yield a final concentration of 10<sup>8</sup>
  to 10<sup>9</sup> cells per ml culture broth.'
