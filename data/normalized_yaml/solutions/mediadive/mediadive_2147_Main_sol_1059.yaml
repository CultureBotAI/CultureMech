preparation_notes: 'Dissolve ingredients (ecxept carbonate, hydrogencarbonate, sulfur,
  yeast extract and acetate), then sparge medium with 100% N2 gas for 30 - 45 min
  to make it anoxic. Add solid carbonate and bicarbonate, adjust pH to 9.0 - 9.2,
  and dispense under 100% N2 gas atmosphere into anoxic Hungate-type tubes or serum
  vials containing already the appropriate amount of sulfur. Sterilize medium by autoclaving
  at <b>110°C</b> for 20 min. Add yeast extract and acetate from sterile anoxic stock
  solutions prepared under 100% N2 gas.


  Original volume: 1002 mL'
