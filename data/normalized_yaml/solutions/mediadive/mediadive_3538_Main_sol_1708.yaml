preparation_notes: 'Add after autoclaving 0.25/50 ml of sterile Na2S x 9 H2O (stock
  solution 12 g/l)

  Dissolve ingredients (except bicarbonate, trace elements, resazurin, cysteine and
  sulfide) and sparge medium with N2 for 30 - 45 min to make it anoxic. Then add and
  dissolve L-cysteine and bicarbonate, adjust pH to 6.8 and dispense medium under
  N2 gas atmosphere into anoxic Hungate-type tubes or serum vials to 30% of their
  volume and autoclave.

  The reducing agent is autoclaved separately under 100% N2 gas atmosphere as concentrated
  solutions in tightly closed tubes. Trace elements are prepared under 100% N2 gas
  atmosphere and sterilized by filtration. Appropriate volumes of the stock solutions
  are injected into the sterile medium with hypodermic syringes. Adjust pH of the
  complete medium to 6.8 - 7.0, if necessary.'
