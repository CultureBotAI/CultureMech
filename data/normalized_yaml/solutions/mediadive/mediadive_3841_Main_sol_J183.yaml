preparation_notes: Mix ingredients, except yeast extract, sulfur and Na2S x 9H2O,
  and autoclave under a N2 atmosphere. Separately autoclave yeast extract as a 10%
  solution and Na2S x 9H2O as a 5% solution under a N2 atmosphere. Steam sulfur for
  3 hr on each of 3 successive days. Aseptically and anaerobically add the yeast extract
  solution and sulfur to the medium. Prior to inoculation, add the sterile Na2S x
  9H2O solution, and adjust pH to 5.5 with sterile 1 N H2SO4.
