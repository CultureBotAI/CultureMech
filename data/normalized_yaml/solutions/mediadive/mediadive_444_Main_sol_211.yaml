preparation_notes: 'Dissolve ingredients (except glucose, vitamins and sulfide), adjust
  pH to 6.0, sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic. Dispense
  under same gas atmosphere into Hungate-type tubes or serum vials and autoclave.
  After sterilization add glucose and sulfide from anoxic stock solutions autoclaved
  under 100% N2 gas and vitamins from a filter-sterilized anoxic stock solution prepared
  under 100% N2. Adjust pH of complete medium to 6.0 - 6.5, if necessary.


