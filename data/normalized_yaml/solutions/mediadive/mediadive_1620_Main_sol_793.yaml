preparation_notes: 'Dissolve ingredients except carbonate, vitamins, and sulfide,
  then sparge medium with 100% CO2 gas for 30 - 45 min to make it anoxic. Dissolve
  carbonate and adjust pH to 6.7, then dispense medium under the same gas atmosphere
  into anoxic Hungate-type tubes or serum vials and autoclave. Add vitamins and sulfide
  from sterile anoxic stock solutions prepared under 100% N2 gas. Vitamins should
  be sterilized by filtration.


  Original volume: 1006 mL'
