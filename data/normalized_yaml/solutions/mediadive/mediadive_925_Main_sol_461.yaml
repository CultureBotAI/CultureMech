preparation_notes: 'Dissolve and autoclave the phosphates separately. Add the vitamin
  solution and trace element solution after autoclaving. After mixing, pH should be
  7.5.

  Rehydrate and cultivate the lyophilized cells in complex medium recommended for
  the specific strain (e.g. medium 1, 220 or 535) first. After this reactivation,
  cultivate on mineral medium 461 with the appropriate carbon source.'
