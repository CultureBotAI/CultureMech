preparation_notes: 'Dissolve ingredients (except bicarbonate, vitamins, cysteine and
  sulfide) and sparge medium for 30 - 45 min with 80% H2 and 20% CO2 gas mixture to
  make it anoxic. Add and dissolve bicarbonate and adjust pH to 6.8, then distribute
  under same gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
  After sterilization add cysteine and sulfide from sterile anoxic stock solutions
  autoclaved under 100% N2 gas atmosphere. Vitamins are prepared under 100% N2 gas
  atmosphere and sterilized by filtration. Adjust pH of complete medium to 6.5. For
  incubation use sterile 80% H2 and 20% CO2 gas mixture at two atmospheres of pressure.


  Original volume: 1001 mL'
