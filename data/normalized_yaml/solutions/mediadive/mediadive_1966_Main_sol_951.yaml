  tubes (5ml medium) or 100ml serum bottles (10ml medium) sealed with rubber stoppers.

  Sterilize by autoclaving. After autoclaving add the methanol (filter sterilised)
  and the vitamin solution (filter sterilised) from sterile stock solutions.'
