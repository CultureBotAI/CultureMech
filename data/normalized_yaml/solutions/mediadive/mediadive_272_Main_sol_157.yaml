preparation_notes: Dissolve ingredients (except cysteine and sulfide), sparge medium
  with 100% N2 gas for 30 - 45 min to make it anoxic. Dispense medium under same gas
  atmosphere into anoxic Hungate-type tubes or serum vials and autoclave. Add cysteine
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas and adjust
  pH of complete medium to 7.0 - 7.2, if necessary.
