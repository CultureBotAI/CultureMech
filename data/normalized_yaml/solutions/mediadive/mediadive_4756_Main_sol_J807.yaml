preparation_notes: 'Mix ingredients except NaHCO3, L-cysteine x HCl x H2O and Na2S
  x 9H2O, and adjust pH to 7.0. Bring to a boil for 5-10 sec, then, cool down under
  a stream of H2-CO2 (80:20, v/v) and add NaHCO3. Dispense the medium into suitable
  culture vessels (e.g., 5 ml in Hungate tubes) under the same gas mixture and seal
  with butyl rubber stoppers. After autoclaving, stand the medium overnight. Separately
  autoclave L-cysteine x HCl x H2O and Na2S x 9H2O as 5% solutions, respectively,
  under a N2 atmosphere. Prior to inoculation, aseptically and anaerobically add L-cysteine
  x HCl x H2O and Na2S x 9H2O solutions. Readjust pH to 6.7, if necessary. Pressurize
  the inoculated bottles to 150 kPa H2-CO2 (80:20, v/v).


  Original volume: 1021 mL'
