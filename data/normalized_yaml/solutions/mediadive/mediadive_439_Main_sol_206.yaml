preparation_notes: 'Dissolve ingredients (except yeast extract, lactate, vitamins
  and sulfide) and sparge medium for 30 - 45 min with 100% N2 gas to make it anoxic.
  Distribute under same gas atmosphere in anoxic Hungate-type tubes or serum vials
  and autoclave. After sterilization add yeast extract, lactate, vitamins (sterilized
  by filtration) and sulfide from sterile anoxic stock solutions prepared under 100%
  N2 gas. Before use, neutralize the sodium sulfide solution by dropwise addition
  of 2 N H2SO4 (see medium 29). Adjust pH of complete medium to 6.8 - 7.0.


  Original volume: 1017 mL'
