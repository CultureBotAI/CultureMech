preparation_notes: Dissolve Columbia agar base in 70% artificial seawater and add
  additional 2 g agar per liter. Autoclave and mix solution with 4% horse or sheep
  blood after cooling to 50°C. Add 1% glucose, 2 mM FeCl3 and 0.1% cysteine, mix well
  and pour plates. Rehydrate pellets of freeze-dried ampoules in liquid medium 220
  or 215.
