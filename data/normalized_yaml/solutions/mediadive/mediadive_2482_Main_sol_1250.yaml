preparation_notes: 'Dissolve ingredients (except phosphates, vitamins, fructose and
  cysteine) and sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Prepare a phosphate buffer stock solution with
  KH2PO4 (25% w/v) and Na2HPO4, adjust pH of the buffer to 5.8. Prior to inoculation
  add phosphate buffer, vitamins, fructose and cysteine from sterile anoxic stock
  solutions prepared under 100% N2 gas. Vitamins and D-fructose should be sterilized
  by filtration. The pH of the complete medium should be at 5.8.


  Original volume: 1003 mL'
