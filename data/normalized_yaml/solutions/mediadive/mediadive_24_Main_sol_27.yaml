preparation_notes: 'Adjust pH to 6.8.

  Boil the medium for a few minute. Bubble the medium with nitrogen gas and fill 10
  ml in 15 ml tubes with a rubber septum under a stream of nitrogen gas. Autoclave
  at 121°C for 15 min. Sterile syringes are used to inoculate and remove samples.

  Incubate in the light using a tungsten lamp.'
