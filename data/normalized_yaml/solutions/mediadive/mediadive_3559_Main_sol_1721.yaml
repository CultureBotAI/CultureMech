preparation_notes: 'Prepare the medium under an atmosphere of H2/CO2 (80:20) without
  adding NaNO3, Na2S2O3 x 5 H20 and NaHCO3 in serum bottles and seal the serum tubes
  with butyl rubber stoppers. Steam medium for 3 hours on each of 3 successive days.
  To the sterile medium add, from filter sterilised stock solutions, NaNO3, Na2S2O3
  x 5 H20 and NaHCO3.

  Increase the 80% H2 + 20% CO2 gas phase pressure to 0.3 MPa.

  Adjust pH strain-specifically.'
