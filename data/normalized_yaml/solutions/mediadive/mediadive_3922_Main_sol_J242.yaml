preparation_notes: 'Mix ingredients, except NaHCO3, L-Cysteine x HCl x H2O and Na2S
  x 9H2O, and bring to a boil for 5-10 sec. Cool down under a stream of H2-CO2 (80:20),
  and add NaHCO3 to the medium. Dispense the medium into suitable culture vessels
  (e.g., 20 ml of the medium in 120 ml serum bottles) under a stream of H2-CO2 (80:20)
  and seal with butyl rubber stoppers. Separately autoclave cysteine x HCl and Na2S
  x 9H2O as 5% solutions, respectively, under a N2 atmosphere. Prior to inoculation,
  aseptically and anaerobically add the cysteine x HCl and Na2S x 9H2O solutions.
  Pressurize the inoculated vessels to 200 kPa H2-CO2 (80:20).


  Original volume: 1020 mL'
