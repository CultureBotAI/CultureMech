preparation_notes: 'Dissolve ingredients (except bicarbonate, vitamins, cysteine and
  sulfide), sparge medium with 80% H2 and 20% CO2 gas mixture for 30 - 45 min to make
  it anoxic. Add and dissolve bicarbonate and adjust pH to 7.0, then dispense medium
  under 80% H2 and 20% CO2 gas atmosphere into anoxic Hungate-type tubes or serum
  vials to 30% of their volume and autoclave. After sterilization add cysteine and
  sulfide from sterile anoxic stock solutions autoclaved under 100% N2 gas atmosphere.
  Vitamins are prepared under 100% N2 gas atmosphere and sterilized by filtration.
  Adjust pH of final medium to 6.8 - 7.0.

  For incubation use sterile 80% H2 and 20% CO2 gas mixture at two atmospheres of
  pressure.

  Note: If the medium is being used without overpressure then adjust pH with a small
  amount of sterile anoxic 1 N HCl, if necessary.


  Original volume: 1013 mL'
