preparation_notes: 'Dissolve ingredients (except bicarbonate, glucose, vitamins and
  reducing agents), then sparge medium with 100% CO2 gas for 30 - 45 min to make it
  anoxic. Add solid bicarbonate, adjust pH to 6.8 - 7.0 and dispense medium under
  100% CO2 gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
  Add glucose, vitamins (sterilized by filtration), cysteine and sulfide from sterile
  anoxic stock solutions prepared under 100% N2 gas. The final pH of the medium should
  be 7.0.


  Original volume: 1002 mL'
