preparation_notes: Prepare the liquid medium without Staley´s vitamin solution and
  glucose. Adjust to pH 4.8 - 5.5. Dispense the medium into serum bottles. The gas
  phase is air:CO2 (95:5) and the liquid:gas phase should be 1:9. Sterilize by autoclaving.
  After autoclaving add the Staley´s vitamin solution (filter sterilised) and glucose
  (autoclaved) from sterile stock solutions.
