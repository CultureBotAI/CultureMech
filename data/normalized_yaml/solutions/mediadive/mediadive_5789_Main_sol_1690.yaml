preparation_notes: 'Dilute stock solution with MilliQ water (1+19 v/v), add 4 g CaCO3
  per litre.

  Autoclave at 120 °C for 21 min.

  Cool down to room temperature.

  After autoclaving add sterile solutions:

  Check pH 7.6-8.0

  Complete medium can be stored at 4°C.

  Incubate at 42°C without shaking. Activity and growth can be followed by measuring
  the depletion of ammonium or the production of nitrite and/or nitrate. Higher ammonium
  concentrations are inhibitive. For that reason our recommendation is follow nitrite
  content. As soon as nitrite has been produced and is depleting again (to form nitrate)
  another dose of ammonium can be added. Incubation time may be up to several weeks.
  We checked the nitrite content (absence/presence) every 5-7 days and added ammonium
  chloride about every 2-3 weeks. Don''t expose cultures to intense light.'
