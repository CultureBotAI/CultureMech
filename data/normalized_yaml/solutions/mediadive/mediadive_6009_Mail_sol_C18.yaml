preparation_notes: "This medium is standard BG11 but omitting NaNO3.\nMake up to 1\
  \ litre with deionized water. Adjust pH to 7.1 with 1M NaOH or HCl. For agar add\r\
  \n15.0 g per litre of Bacteriological Agar (Thermo Scientific&trade;\r\n Oxoid&trade;\
  \ Agar No.1). Autoclave at\r\n15 psi for 15 minutes.\nDue to precipitation, larger\
  \ volumes require stocks of citric acid and ammonium ferric citrate to be autoclaved\
  \ separately in 100ml deionized water or alternatively they can be autoclaved separately\
  \ in test tubes and added to sterile medium in the airflow cabinet."
