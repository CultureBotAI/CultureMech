preparation_notes: 'Add gellan gum and boil to dissolve. Then add the remaining ingredients
  (except magnesium chloride, yeast extract and vitamins), adjust the pH value to
  5.0 to 5.3 and fill the medium under an air atmosphere into tubes of the Hungate
  type or similar vials up to 30% their volume. After autoclaving add magnesium chloride,
  yeast extract and vitamins from steril stock solutions. Vitamins should be sterilized
  by filtration.

  Note: Incubation with shaking may improve cell yield.


  Original volume: 1002 mL'
