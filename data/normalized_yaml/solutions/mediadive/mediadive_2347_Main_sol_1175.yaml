preparation_notes: 'pH 10.0

  Prepare the medium without Na2CO3, NaHCO3, Na2S x 9 H2O, cellulobiose or yeast extract.
  Boil the medium in a water bath and cool under a stream of nitrogen. Add the Na2CO3
  and NaHCO3 to the cooled medium (the pH should be about 10.0) and dispense the medium
  into Hungate tubes or serum bottles under a stream of nitrogen. Seal the tubes under
  nitrogen gas and autoclave. To the cooled medium at the appropriate amounts of Na2S
  x 9 H2O, cellulobiose and yeast extract from sterile, anaerobic stock solutions
  (10% Na2S x 9 H2O, 5% cellulobiose, 10% yeast extract).'
