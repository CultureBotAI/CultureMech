preparation_notes: 'Dissolve ingredients except methanol, bicarbonate, cysteine and
  sulfide. Adjust pH of medium to 7.2 and sparge with 100% N2 gas for 30 - 45 min
  to make it anoxic. Then dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes to 30% v/v of their volume and autoclave. Add methanol (from 15% v/v stock
  solution), cysteine and sulfide from sterile anoxic stock solutions prepared under
  100% N2 gas and bicarbonate from a sterile anoxic stock solution prepared under
  80% N2 and 20% CO2 gas mixture. Prior to use check pH of complete medium and adjust
  to 7.6, if necessary.

  After inoculation, add sterile 80% H2 and 20% CO2 gas mixture to 0.5 bar overpressure.
  After growth becomes visible overpressure of 80% H2 and 20% CO2 gas mixture can
  be increased to 1 bar.

  Note: Use 10% (v/v) as inoculum.


  Original volume: 1004 mL'
