preparation_notes: 'Dissolve ingredients (except vitamins and sulfide), adjust pH
  to 7.0 and sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic. Dispense
  medium under same gas atmosphere into anoxic Hungate-type tubes or serum vials and
  autoclave. After sterilization add sulfide from a sterile anoxic stock solution
  autoclaved under100% N2 gas. Vitamins are prepared under 100 N2 gas and sterilized
  by filtration. Adjust pH of complete medium to 7.0, if necessary.


  Original volume: 1011 mL'
