preparation_notes: Dissolve NaOH in 300 ml distilled water. While stirring vigorously,
  slowly add HEPES until completely dissolved. Fill up to 450 ml with distilled water.
  If 1 ml of this solution is added to 100ml of the medium (containing all additive
  but HEPES), pH should be around 7.6 at 30C. Otherwise, adjust pH of the HEPES solution
  with 10 N NaOH or conc. HCl. Finally fill up to 500 ml with distilled water.
