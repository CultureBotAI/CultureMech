preparation_notes: 'Dissolve ingredients (except carbonate, vitamins, cysteine and
  sulfide), then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. After autoclaving add vitamins, cysteine and
  sulfide from sterile anoxic stock solutions prepared under 100% N2 gas and carbonate
  from a sterile stock solution prepared under 80% N2 and 20% CO2 gas atmosphere.
  The vitamin solution should be sterilized by filtration. Adjust pH of the complete
  medium to 7.3 - 7.5, if necessary.


  Original volume: 1003 mL'
