preparation_notes: "Dissolve ingredients except carbonate, cellobiose, vitamins, cysteine\
  \ and sulfide, then sparge medium with\r\n80% N2 and 20% CO2 gas mixture for 30\
  \ – 45 min to make it anoxic. Dispense medium under the same gas atmosphere into\
  \ anoxic Hungate-type tubes and autoclave. Add cellobiose, vitamins, cysteine and\
  \ sulfide from sterile anoxic stock solutions prepared\r\nunder 100% N2 gas and\
  \ carbonate from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2\
  \ gas mixture. Cellobiose and vitamins have to be sterilized by filtration. Prior\
  \ to use adjust pH of complete medium to 7.2 - 7.4. Cellulose (MN 300, Whatman CF\
  \ II, Kleenex tissue paper, or HCl treated cotton) can be used as an alternative\
  \ to cellobiose.\n\nOriginal volume: 1001 mL"
