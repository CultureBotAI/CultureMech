preparation_notes: 'Add components except L-cysteine x HCl x H2O and FeCl2 x 4H2O
  to distilled water, bring volume to 1.0 L and adjust pH to 7.0. Distribute the medium
  into appropriate culture vessels (e.g., 20 ml of the medium in 120 ml serum bottles)
  under a H2-CO2 (4:1, v/v) gas mixture, sparge with the same gas mixture for 10 -
  15 min, seal with butyl rubber stoppers and autoclave. Separately autoclave concentrated
  (100- or 200-fold) L-cysteine x HCl x H2O and FeCl2 x 4H2O solutions under a N2
  gas atmosphere. Prior to inoculation, add the sterile L-cysteine x HCl x H2O and
  FeCl2 x 4H2O solutions. Pressurize the inoculated vessels to 100 kPa H2-CO2 (4:1,
  v/v) and cultivate without shaking.


  Original volume: 20 mL'
