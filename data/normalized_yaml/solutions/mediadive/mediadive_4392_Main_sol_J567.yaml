preparation_notes: 'Adjust pH to 5.5 with NaOH. Distribute the medium into culture
  vessels (e.g., 8 ml of the medium into the Balch tubes) under a stream of a H2-CO2
  (80:20, v/v) gas mixture, seal with butyl rubber stoppers and autoclave. After cooling,
  replace the gas phase with H2-CO2-O2 (79:15:6, v/v) gas mixture. Pressurize the
  inoculated culture vessels to 170 kPa with the same gas mixture.


  Original volume: 1011 mL'
