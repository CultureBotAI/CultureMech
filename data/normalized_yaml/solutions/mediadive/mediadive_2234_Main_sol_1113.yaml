preparation_notes: Dissolve the agarose in water by boiling. Add the Leptospira base
  and dissolve completely. Autoclave at 121°C for 15 min. Allow the medium to cool
  to 50-55°C. Warm the Leptospira Enrichment to approximately 25°C and add to the
  warm medium. Mix uniformly and dispense aseptically into sterile tubes as requested.
  Final pH is 7.5 at 25°C.
