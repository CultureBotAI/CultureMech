preparation_notes: 'Boil potatoes for 20 min. Strain through a fine sieve. Add glucose,
  NaCl and agar, and boil until dissolved. Do not use new potatoes. Adjust pH to 5.4
  - 5.6.

  Comment: Commercial potato dextrose agar (BD-Difco or Oxoid) supplemented with NaCl
  can be used.'
