preparation_notes: 'Sparge medium with 80% N2 and 20% CO2 gas mixture to make anoxic.

  Bring to the boil.

  Cool down under N2 atmosphere.

  Add bicarbonate.

  Adjust pH to 6.8.

  Dispense into appropriate vessels, e.g. Hungate tubes, under N2 atmosphere

  Autoclave at 121 °C for 15 min.

  After autoclaving or before use add the following filter-sterilzed solutions (to
  the given final concentrations).

  Note: When the iron is added to the medium a white floculant precipitate may appear.
  In the initial stages of growth the precipitate turns orange/brown as the ferrous
  ions are oxidised to ferrihydrite.'
