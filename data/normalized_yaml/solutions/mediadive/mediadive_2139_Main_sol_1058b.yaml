preparation_notes: 'Dissolve sodium chloride, potassium hydrogenphosphate and ammonium
  chloride, then sparge solution with 80% N2 and 20% CO2 gas mixture for at least
  30 - 45 min to remove dissolved oxygen and to saturate the solution with CO2. Dispense
  solution under air atmosphere in Erlenmeyer flasks to 10% of volume, close with
  screw caps and autoclave. Add trace elements, calcium chloride, magnesium chloride,
  thiosulfate, bicarbonate and vitamins from sterile stock solutions and adjust pH
  of the medium to 7.5 using a sterile stock solution of sodium carbonate (5% w/v).
  Incubate with shaking.

  Note: Use at least 10% (v/v) as inoculum.


  Original volume: 1002 mL'
