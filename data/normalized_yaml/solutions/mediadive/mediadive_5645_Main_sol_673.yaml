preparation_notes: 'Prepare the medium anaerobically under 100% nitrogen. The following
  constituents are prepared separately and added to the autoclaved mineral salt solution:
  Yeast extract (20 ml of 10% w/v solution)-boiled for a few minutes not autoclaved;
  sulfur (10 g)-sterilized by steaming for 3 h on each of three successive days; Na2S
  x 9 H2O (10 ml of 3% w/v solution)-autoclaved under nitrogen atmosphere.

  Adjust final pH to 7.2.'
