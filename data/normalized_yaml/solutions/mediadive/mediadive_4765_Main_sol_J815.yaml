preparation_notes: "Mix components and autoclave. After cooling, add the following\
  \ solution (autoclaved) to the medium: \nTo complete medium, adjust pH to 3.0 with\
  \ sterile 1 N HCl solution. Then, distribute 20 ml-aliquots of the medium into sterile\
  \ 120 ml-serum bottles and seal with butyl rubber stoppers. Add 100 ml methane gas\
  \ (filter-sterilized) into the head space of the culture bottle through a syringe.\n\
  \nOriginal volume: 1002 mL"
