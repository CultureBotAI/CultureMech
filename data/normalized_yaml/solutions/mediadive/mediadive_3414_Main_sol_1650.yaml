preparation_notes: 'Adjust pH 7.0-7.2.

  Dispense the medium into sterile bottles. Fill 6 ml medium in 15 ml tubes, fill
  the headspace with a mixture of N2/CO2 (80:20) and seal the bottles with butyl rubber
  stoppers . Autoclave at 121°C for 15 min. Add following solutions aseptically: 1
  M Bicarbonate solution (see below) 30 ml, Vitamin solution (see below) 1 ml, 1 M
  acetate solution (see below) 1 ml. Adjust pH 7.0-7.2'
