preparation_notes: 'Dissolve ingredients except carbonate, hydrogenphosphate, vitamins,
  acetate, thiosulfate and yeast extract, then sparge medium with 80% H2 and 20% CO2
  gas mixture for 30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere
  into anoxic Hungate-type tubes or serum vials and autoclave. Add hydrogenphosphate,
  vitamins, acetate, thiosulfate and yeast extract from sterile anoxic stock solutions
  prepared under 100% N2 gas and carbonate from a sterile anoxic stock solution prepared
  under 80% N2 and 20% CO2 gas mixture. Stock solutions of thiosulfate and vitamins
  should be sterilized by filtration. The pH of the complete medium should be at 6.5
  - 6.8.


  Original volume: 1003 mL'
