preparation_notes: "Mix components except L-cysteine x HCl x H2O and FeSO4 x 7H2O.\
  \ Bring to a boil for a few seconds and cool down under a N2 atmosphere. While gassing\
  \ with N2, add L-cysteine x HCl x H2O and FeSO4 x 7H2O to the solution, distribute\
  \ into culture vessels (e.g., 18 ml in 50 ml serum bottles) under a N2 atmosphere,\
  \ then, seal butyl rubber stoppers and autoclave. Aseptically and anaerobically\
  \ add per liter (final) the following sterile solutions (autoclaved or *filter-sterilized)\
  \ from anaerobic stocks: \nAdjust pH of the medium to 7.3 - 7.7, if necessary.\n\
  \nOriginal volume: 1024 mL"
