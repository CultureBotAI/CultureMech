preparation_notes: Adjust pH to 7.8 (with NaOH) before autoclaving. To the sterile
  medium, from sterile stock solutions, add 10 ml KH2PO4 (50 g/l), 5 ml CaCl2 (100
  g/l), 2 ml FeCl2/MnCl2 (FeCl2 x 4 H2O, 20 g/l and MnCl2 x 4 H2O, 20 g/l), and glucose
  to a final concentration of 2 g/l.
