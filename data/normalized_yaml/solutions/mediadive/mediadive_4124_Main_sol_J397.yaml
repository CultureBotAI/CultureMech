preparation_notes: 'Mix ingredients, except capronic acid, Trace vitamins, vitamin
  B12, NaHCO3, and Na2 x 9H2O, and autoclave under a N2-CO2 (4:1, v/v) atmosphere.
  Add capronic acid to 10 ml distilled water and adjust pH to 7.5 with NaOH. Filter-sterilize
  the capronic acid solution, Fatty acid mixture and Trace vitamins with vitamin B12,
  and store under a N2 atmosphere. Filter-sterilize 5% NaHCO3 solution and store under
  a N2-CO2 (4:1, v/v) atmosphere. Add the capronic acid solution, Fatty acid mixture,
  Trace vitamins and 5% NaHCO3 solution to the medium. Prior to inoculation, add a
  5% Na2S x 9H2O solution (anaerobically autoclaved) to the medium. Adjust pH of the
  medium to 6.7 - 6.9, if necessary.


  Original volume: 1032 mL'
