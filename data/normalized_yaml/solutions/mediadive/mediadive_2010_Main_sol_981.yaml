preparation_notes: 'Dissolve ingredients (except carbonate, yeast extract, malic acid,
  vitamins and cysteine) and sparge medium with 80% N2 and 20% CO2 gas mixture for
  30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere into anoxic
  Hungate-type tubes or serum vials and autoclave. Prior to inoculation add yeast
  extract, malic acid, vitamins (sterilized by filtration), and cysteine from sterile
  anoxic stock solutions prepared under 100% N2 gas and carbonate from a sterile anoxic
  stock solution prepared under 80% N2 and 20% CO2 gas mixture. The pH of the complete
  medium should be 6.2.


  Original volume: 1003 mL'
