  \ distribute the medium into culture vessels (e.g., 20 ml in 120 ml serum bottles)\
  \ under a H2-CO2 (4:1, v/v) gas mixture, and seal with butyl rubber stoppers. Pressurize\
  \ inoculated bottles to 200 kPa H2-CO2 (4:1, v/v).\nComment: For JCM 34026, use\
  \ 1.0 L of MJ(-N) synthetic seawater and omit distilled water.\n\nOriginal volume:\
