preparation_notes: 'Dissolve ingredients except carbonate, yeast extract, vitamins,
  cysteine and sulfide. Sparge medium with 80% N2 and 20% CO2 gas mixture for 30 -
  45 min to make it anoxic. Dispense medium under same gas atmosphere into anoxic
  Hungate-type tubes to 30% of their volume and autoclave. Add vitamins (sterilized
  by filtration), yeast extract, cysteine and sulfide from sterile anoxic stock solutions
  prepared under 100% N2 gas and carbonate from a sterile anoxic stock solution prepared
  under 80% N2 and 20% CO2 gas mixture. Prior to use check pH of completed medium
  and adjust to 7.0 - 7.2, if necessary.

  After inoculation add sterile 80% N2 and 20% CO2 gas mixture to 1 bar overpressure.


  Original volume: 1012 mL'
