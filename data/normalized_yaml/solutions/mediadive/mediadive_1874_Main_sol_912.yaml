preparation_notes: 'Dissolve ingredients (except bicarbonate, rumen fluid, vitamins,
  cysteine and sulfide) and sparge medium with 80% N2 and 20% CO2 gas mixture for
  30 - 45 min to make it anoxic. Add bicarbonate, adjust pH to 7.2, distribute medium
  under 80% N2 and 20% CO2 gas atmosphere into anoxic Hungate-type tubes or serum
  vials and autoclave. After sterilization add rumen fluid, vitamins, cysteine and
  sulfide from sterile anoxic stock solutions prepared under 100% N2 gas atmosphere.
  Vitamins should be sterilized by filtration. Check pH of complete medium and adjust
  to 7.2, if necessary.


  Original volume: 1003 mL'
