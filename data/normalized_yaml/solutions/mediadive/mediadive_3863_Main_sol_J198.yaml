preparation_notes: 'Mix ingredients, except NaHCO3, Trace vitamins, Na2S x 9H2O and
  L-cysteine x HCl x H2O, and autoclave under a H2-CO2 (80:20) atmosphere. Filter-sterilize
  NaHCO3 as 8% solution and Trace vitamins while gassing with N2. Separately autoclave
  Na2S x 9H2O and L-cysteine x HCl x H2O as 5% solutions under a N2 atmosphere. Aseptically
  and anaerobically add the NaHCO3 solution and Trace vitamins to the medium under
  a H2-CO2 (80:20) atmosphere. Prior to inoculation, add sterile the Na2S x 9H2O and
  L-cysteine x HCl solutions, and adjust pH to 7.4. Pressurize inoculated bottles
  to 200 kPa H2-CO2 (80:20).


  Original volume: 1019 mL'
