preparation_notes: 'Dissolve ingredients (except xylose, vitamins and thioglycolate)
  and adjust pH to 5.5 - 6.0. Sparge medium with 100% N2 gas for 30 -45 min to make
  it anoxic and dispense under the same gas atmosphere into anoxic Hungate-type tubes
  or serum vials to 30% of their volume. Seal vials with gas tight butyl rubber closures.
  Autoclave at 121°C for 15 min. Before inoculation add xylose, vitamins and thioglycolate
  from anoxic stock solutions prepared under 100% N2 gas and sterilized by filtration.
  Then add sterile air (with hypodermic syringe through the rubber closure) to 1%
  (v/v) O2 concentration in the gas phase.


  Original volume: 1008 mL'
