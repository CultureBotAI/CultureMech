preparation_notes: 'Dissolve ingredients except bicarbonate, vitamins, thioglycolate
  and ascorbic acid, then sparge medium with 100% N2 gas for 30 - 45 min to make it
  anoxic. Dispense medium under the same gas atmosphere into anoxic Hungate-type tubes
  or serum vials and autoclave. Add vitamins, thioglycolate and ascorbic acid from
  anoxic stock solutions prepared under 100% N2 gas and sterilized by filtration and
  bicarbonate from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2
  gas mixture. Prior to use adjust pH of complete medium to 7.0, if necessary.


  Original volume: 1011 mL'
