preparation_notes: 'Dissolve ingredients except trimethylamine, coenzyme M and sulfide.
  Adjust pH to 7.5 and sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic;
  then dispense medium under same gas atmosphere into anoxic Hungate-type tubes or
  serum vials and autoclave. Add trimethylamine, coenzyme M and sulfide from sterile
  anoxic stock solutions prepared under 100% N2 gas. Adjust pH of complete medium
  to 7.5, if necessary.


