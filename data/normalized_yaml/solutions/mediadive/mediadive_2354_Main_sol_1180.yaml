preparation_notes: 'Final pH of the medium: 8.5-9.0

  Dispense the medium into the culture vessels. For small volumes serum bottles or
  Hungate tubes may be used. The gas phase to liquid ratio should be about 10:1. Use
  a gas phase containing air, 50% methane and autoclave at 121°C for 15 minutes. When
  the growth medium is cool the NaHCO3, the Na2CO3 and phosphate buffer are added.

  Liquid cultures should be grown with shaking.

