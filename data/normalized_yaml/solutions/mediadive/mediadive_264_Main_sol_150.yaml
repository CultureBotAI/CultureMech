preparation_notes: Dissolve ingredients except yeast extract and sulfur. Adjust pH
  with 6 N H2SO4 to 1.5 - 2.5. Yeast extract (10% w/v in distilled water) is autoclaved
  separately. For sterilization of the sulfur place it in screw-capped tubes or bottles,
  wet with a few drops of water and heat for 3 hours to 90 - 100°C in a water bath
  on each of three successive days. Before use, aseptically layer the sulfur onto
  the surface of the autoclaved liquid basal medium.
