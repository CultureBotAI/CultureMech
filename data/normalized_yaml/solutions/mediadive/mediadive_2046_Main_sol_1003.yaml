preparation_notes: "Place 1000 ml of anaerobic water (CO2 water) in a flask. Add the\
  \ following compounds: \nAdd solutions A, B, and Trace mineral solution (see recipes\
  \ below):\npH the media to 6.0 and gas the flask containing the media with CO2 for\
  \ 20 min at least. Gas first culture tube in rack and place 5 ml of media in previous\
  \ tube. Place stopper on loaded culture tube, crimp tube cap onto stopper. Autoclave\
  \ the medium for 20 min., 121°C. Add 1 ml of O2 to each tube before inoculation.\
  \ After the inoculation the tubes are pressurized with H2 (138 KP)."
