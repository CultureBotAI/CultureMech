preparation_notes: Suspend dry baker's yeast (SIGMA YSC-1) in distilled water and
  allow cells to autolyse for 48 h at 55°C. Thereafter, cell debris are removed by
  centrifugation (3.700 x g for 30 min) and the amber-colored supernatant is stored
  in aliquots at -20°C.
