preparation_notes: We recommend that liquid media be made by autoclaving the Na2CO3
  separately, otherwise the high pH will cause ammonia to be lost. When making media
  solidified with agar (20 g/l) the agar should also not be autoclaved with the Na2CO3
  otherwise the agar will be hydrolysed. When mixing the ingredients for solid media
  cool all components to about 55°C otherwise hydrolysis of the agar may occur.
