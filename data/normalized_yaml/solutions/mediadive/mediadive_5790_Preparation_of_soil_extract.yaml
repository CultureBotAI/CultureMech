preparation_notes: "Fill 300ml garden soil in a 1 l laboratory flask and fill up with\
  \ H2Odist to 700 ml\r\n(The soil should not contain too much humus and not too much\
  \ clay – avoid soil\r\ncontaminated with fertilizers, herbicides or fungicides)\n\
  Shake vigorously\nAutoclave for 1 h at 121 °C and let cool down\nAfter 24 h autoclave\
  \ for a second time (for 1 h at 121 °C)\nRemove bigger particles and debris by centrifugation\n\
  Filter through Whatmanfilter 595 (1/2, 320 mm) to remove residual particles\nFilter\
  \ sterilize (PES membrane, pore size 0,22 µm)\nStore at 4°C – 10°C\n\nOriginal volume:\
  \ 700 mL"
