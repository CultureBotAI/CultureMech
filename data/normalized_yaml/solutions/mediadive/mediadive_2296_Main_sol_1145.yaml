preparation_notes: "Each of the solutions (A, B, and C) is prepared with anaerobic\
  \ double distilled water.\nThe medium is prepared anaerobically under nitrogen gas\
  \ and dispensed into Hungate tubes or serum bottle sealed with rubber septa. The\
  \ medium to gas phase ratio should be about 1:10 (v:v). \r\nSterilise the medium\
  \ by heating at 100° C for 3 hours on three consecutive days (e.g., in a water bath).\n\
  Add  4% O2 for microaerophilic conditions."
