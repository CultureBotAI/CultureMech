preparation_notes: 'Dissolve ingredients (except cysteine and thiosulfate), bring
  medium to the boil then cool to room temperature under 100% N2 gas atmosphere. Add
  cysteine and adjust pH to 7.5, then dispense medium under 100% N2 gas atmosphere
  into anoxic Hungate-type tubes or serum vials and autoclave. Before inoculation,
  add thiosulfate from a sterile anoxic stock solution prepared under 100% N2 gas
  and sterilized by filtration. Adjust pH of complete medium to 7.5, if necessary.


  Original volume: 1010 mL'
