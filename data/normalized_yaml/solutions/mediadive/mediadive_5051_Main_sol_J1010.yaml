preparation_notes: "Adjust pH to 7.0 - 7.8.\nPrepare the medium anaerobically under\
  \ a N2-CO2 (4:1, v/v) gas mixture. Distribute the medium into culture vessels (e.g.,\
  \ 5.0 ml in Hungate tubes) under the same gas mixture, seal with butyl rubber stoppers\
  \ and autoclave. After autoclaving, add per 5.0 ml the following solutions from\
  \ anaerobic stocks (autoclaved or *filter-sterilized and stored under a N2 atmosphere):\
  \ \n\nOriginal volume: 1047 mL"
