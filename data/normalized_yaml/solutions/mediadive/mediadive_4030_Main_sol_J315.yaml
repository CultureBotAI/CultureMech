preparation_notes: 'Mix ingredients except cysteine x HCl x H2O, NaHCO3 and Trace
  vitamins, and autoclave under a N2-CO2 (80:20) atmosphere. Filter-sterilize NaHCO3
  as a 10% solution and Trace vitamins while gassing with CO2. Separately autoclave
  L-cysteine x HCl x H2O as a 5% solution under a CO2 atmosphere. Aseptically and
  anaerobically add NaHCO3 and Trace vitamins to the medium under a N2-CO2 (80:20)
  atmosphere. Prior to inoculation, add the sterile L-cysteine x HCl x H2O solution.


  Original volume: 1020 mL'
