preparation_notes: "Mix components thoroughly and adjust pH to 7.5. Distribute the\
  \ medium in culture vessels (e.g., 10 ml in Balch-type tubes), flush with N2 and\
  \ seal with butyl rubber stoppers. Autoclave. After cooling, add per liter the following\
  \ solution (autoclaved or *filter-sterilized): \nAfter inoculation, add sterile\
  \ pure acetylene gas, made from calcium carbide and water, to the gas phase (the\
  \ first time, 0.5% volume of the gas phase: the next day, 1.0% volume: increase\
  \ each day until 2.5% volume is reached).\n\nOriginal volume: 1027 mL"
