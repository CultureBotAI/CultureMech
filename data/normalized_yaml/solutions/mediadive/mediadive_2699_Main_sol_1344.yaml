preparation_notes: 'pH 8.3

  Mix ingredients vitamin B12, vitamin mixture, bicarbonate solution and neutralized
  sulfide solution. Dispense the medium into suitable culture vessels under a stream
  of nitrogen gas, seal with butyl rubber stoppers and autoclave at 121°C for 15 min.
  Separately autoclave neutralized sulfide solution under a N2 atmosphere. Sterilize
  Vitamin B12 solution, vitamin mixture, bicarbonate solution by filtration. Prior
  to inoculation, aseptically and anaerobically add vitamin B12 solution, vitamin
  mixture, bicarbonate solution and neutralized sulfide solution.'
