preparation_notes: 'Dissolve ingredients (except calcium chloride, bicarbonate, glucose,
  vitamins, cysteine and sulfide), adjust pH to 7.0 and sparge medium with 100% N2
  gas for 30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere
  into anoxic Hungate-type tubes or serum vials and autoclave. After sterilization
  add calcium chloride, glucose, cysteine and sulfide from sterile anoxic stock solutions
  autoclaved under 100% N2 gas atmosphere. Add bicarbonate from a sterile anoxic stock
  solution prepared under 80% N2 and 20% CO2 gas mixture. Vitamins are prepared under
  100% N2 gas and sterilized by filtration. The pH of the complete medium should be
  at 7.0.

  Note: Supplementation of medium with 10.00 g/l MOPS buffer (pH 6.9 - 7.0; 10% (w/v)
  anoxic stock solution) may enhance the buffer capacity of the medium.


  Original volume: 1002 mL'
