preparation_notes: Suspend atrazine (2-chloro-4(ethylamino)-6-(isopropylamino)-1,3,5-triazine)
  in methanol (10 mg/ml). Shortly sonicate to reduce particle size. Add stock suspension
  to medium 465 without nitrogen source (omit ammonium sulphate and calcium nitrate),
  replace calcium nitrate by calcium chloride) but with 1 g/l glucose as the carbon
  source. Final concentration of atrazine is 50-100 mg/l.
