preparation_notes: 'Final pH 9.5

  Prepare the medium without the Na2CO3, which can be sterilised separately by autoclaving.
  10 ml/l sterile methanol is added to the cooled medium. When preparing liquid media
  cool the mineral salts solution and Na2CO3 to room temperature before mixing. When
  preparing agar add 2.0 % agar to the mineral salts solution and autoclave. Cool
  the Na2CO3 stock solution and agar to 50-55°C before mixing.'
