preparation_notes: 'Dissolve ingredients (except carbonate, benzoate, crotonate, vitamins
  and sulfide) and sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add benzoate, crotonate, vitamins and sulfide
  form sterile anoxic stock solutions prepared under 100% N2 gas and carbonate from
  a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture. The
  crotonate and vitamin solutions should be sterilized by filtration. Adjust pH of
  the complete medium to 7.0 - 7.2.

  After inoculation pressurize the vessels with sterile 80% N2 and 20% CO2 gas mixture
  to 0.7 bar overpressure.


  Original volume: 1003 mL'
