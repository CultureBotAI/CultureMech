preparation_notes: 'Dissolve ingredients except for carbonate, Na-syringate solution,
  vitamins, and cysteine, bring to the boil and cool to room temperature under 80%
  N2 and 20% CO2 gas atmosphere. Thereafter, dispense under the same gas atmosphere
  in anoxic Hungate-type tubes or serum vials and autoclave. Add Na-syringate solution,
  vitamins, and cysteine from sterile anoxic stock solutions prepared under 100% N2
  gas and carbonate from a sterile anoxic stock solution prepared under 80% N2 and
  20% CO2 gas atmosphere. Vitamins should be sterilized by filtration. The pH of the
  completed medium should be at 7.4.

  Note: After growth has been started add an additional amount of Na-syringate to
  reach a final concentration of 2.00 g/l.


  Original volume: 1006 mL'
