preparation_notes: 'Prepare the medium by mixing 250 ml of solution A (without vitamins
  added) with 650 ml distilled water. Gas with air:CO2 (95:5 v/v), and fill the medium
  into serum bottles so that the gas to liquid ratio is about 5:1 (v/v). Gas the serum
  bottles with air:CO2 (95:5 v/v), seal the bottles as for anaerobic work and autoclave.
  To the cooled medium add (using a syringe) 10ml NaHCO3/ 90ml medium and 0.5ml sterile
  vitamin solution to 100ml of the resulting medium. Final pH 7.9.


  Original volume: 1050 mL'
