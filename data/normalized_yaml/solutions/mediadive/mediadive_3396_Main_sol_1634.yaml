preparation_notes: 'Adjust pH to 11.0 with NaOH.

  Fill into screw-cap tubes, leaving 60% headspace.

  Sparge medium with 100% N2 gas mixture to make it anoxic.

  Autoclave at 121 °C for 20 min.

  After autoclaving, cool down and add from sterile stock solutions while stirring:

  Add 30% air.

  Note: Some precipitate will form.'
