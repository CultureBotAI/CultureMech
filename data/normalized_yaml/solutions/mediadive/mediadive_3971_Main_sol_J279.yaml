  ml serum bottles under a stream of a H2-CO2 (4:1, v/v) gas mixture and seal with
  butyl rubber stoppers. Autoclave and stand the bottles overnight. Add 15 ml filter-sterilized
  air and pressurize the gas phase to 200 kPa with a H2-CO2 (4:1, v/v) gas mixture.


