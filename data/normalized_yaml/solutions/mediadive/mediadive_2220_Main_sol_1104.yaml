preparation_notes: 'Dissolve sodium chloride and hydrogenphosphate, then sparge solution
  with 100% N2 gas for 30 -45 min to make it anoxic. Add and dissolve carbonates,
  then dispense under 100% N2 gas atmosphere into anoxic Hungate-type tubes or serum
  vials containing already the appropriate amount of sulfur, only to 30% of their
  volume to allow for a large headspace. Sterilize medium by heating cultivation vessels
  in a water bath to 90 - 100°C for 1- 2 hours on each of 3 successive days. After
  sterilization add ammonium chloride, magnesium chloride, trace elements, yeast extract,
  ethanol, acetate, thiosulfate, vitamins and sulfide from sterile anoxic stock solutions
  prepared under 100% N2 gas. The stock solutions of thiosulfate and vitamins should
  be sterilized by filtration. Adjust pH of the complete medium to 9.5.

  After inoculation, add sterile 100% H2 gas to 0.5 bar overpressure.


  Original volume: 1004 mL'
