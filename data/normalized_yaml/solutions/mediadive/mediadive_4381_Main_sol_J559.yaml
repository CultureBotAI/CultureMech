preparation_notes: Mix ingredients except Na2S x 9H2O and distribute the medium into
  culture vessels under a stream of a N2-CO2 (4:1, v/v) gas mixture. Add Na2S x 9H2O
  as a 5% solution, adjust pH to 6.0 and seal with butyl rubber stoppers. Autoclave
  at 110C for 1 hr. Prior to cultivation, replace the gas phase with a H2-CO2 (4:1,
  v/v) gas mixture. Pressurize the inoculated bottles to 200 kPa H2-CO2 (4:1, v/v).
