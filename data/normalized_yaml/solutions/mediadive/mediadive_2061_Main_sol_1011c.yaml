preparation_notes: 'Dissolve ingredients (except carbonate, pyruvate, lactate, yeast
  extract, thiosulfate, vitamins and dithionite), then sparge medium with 80% H2 and
  20% CO2 gas mixture for 30 - 45 min to make it anoxic. Dispense medium under same
  gas atmosphere into anoxic Hungate-type tubes or serum vials up to a volume of 20%
  and autoclave. Add pyruvate, lactate, yeast extract, thiosulfate and vitamins to
  the autoclaved medium from sterile anoxic stock solutions prepared under 100% N2
  gas and carbonate and dithionite from sterile anoxic stock solutions prepared under
  80% N2 and 20% CO2 gas mixture. Solutions of vitamins, thiosulfate and dithionite
  are sterilized by filtration. Adjust pH of the complete medium to 6.7.

  After inoculation pressurize vessels to 2 bar overpressure with sterile 80% H2 and
  20% CO2 gas mixture.


  Original volume: 1012 mL'
