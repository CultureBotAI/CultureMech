preparation_notes: "Mix components thoroughly, bring to a boil for several seconds,\
  \ and cool down under a stream of N2-CO2 (80:20, v/v). Distribute the medium into\
  \ culture vessels (e.g., 5 ml in the Hungate tube) under the same gas mixture, seal\
  \ with butyl rubber stoppers and autoclave. Add per liter the following sterile\
  \ solutions from anaerobic stocks (autoclaved or filter-sterilized): \nPrior to\
  \ inoculation, replace the gas phase with a gas mixture of H2-CO2 (80:20, v/v),\
  \ and add per liter the following solution (autoclaved and stored under a N2 atmosphere):\
  \ \nPressurize the inoculated culture vessels to 200 kPa H2-CO2 (80:20, v/v).\n\n\
  Original volume: 1050 mL"
