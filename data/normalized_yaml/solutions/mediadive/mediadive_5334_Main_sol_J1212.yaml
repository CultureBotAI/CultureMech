preparation_notes: "Mix components, except L-cysteine x HCl x H2O, and heat the medium\
  \ to 60C with stirring. Bubble the medium with O2-free CO2 vigorously, then add\
  \ L-cysteine x HCl x H2O to reduce the medium. Dispense the medium into culture\
  \ vessels (e.g., 10 ml in Balch type tubes) under a stream of CO2, seal with butyl\
  \ rubber stoppers and autoclave. Aseptically and anaerobically add per liter the\
  \ following solution (autoclaved and stored under a N2 atmosphere): \n\nOriginal\
  \ volume: 1020 mL"
