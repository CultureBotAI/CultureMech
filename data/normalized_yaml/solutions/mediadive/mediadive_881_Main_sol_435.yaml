preparation_notes: 'Adjust pH to 6.5.

  Dissolve peptone, yeast extract and cysteine in 800 ml of distilled water. Adjust
  pH to 6.5 with NaOH. Add agar and dissolve by heating.

  Add 2 g/l activated charcoal to the agar base solution before autoclaving. After
  autoclaving, cool to 45°C and add sterilized serum.'
