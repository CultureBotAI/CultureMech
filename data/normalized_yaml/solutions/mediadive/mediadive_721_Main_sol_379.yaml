preparation_notes: Prepare bicarbonate and sulfide as separate solutions. Sterilize
  all solutions by autoclaving. After cooling mix all three solutions, adding the
  sulfide last. Adjust pH to 7.0 and dispense in completely filled screw-capped tubes
  or bottles. Incubate at 500 - 1000 Lux light intensity.
