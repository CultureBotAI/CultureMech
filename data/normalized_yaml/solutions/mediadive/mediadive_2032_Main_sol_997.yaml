preparation_notes: To prepare the medium, all compounds of DMJ seawater were dissolved
  in 1 liter of distilled deionized water, and the pH was adjusted to around 7.0 with
  NaOH at room temperature prior to autoclaving. After autoclaving, filter-sterilized
  NaNO3 solution (100 g/l), NaHCO3 solution (100 g/l), Na2S solution (100 g/l); pH
  7.5) and trace vitamin solution were added. Then the tubes were tightly sealed with
  butyl rubber stoppers under a gas phase of 80% H2 + 20% CO2 (300 kPa).
