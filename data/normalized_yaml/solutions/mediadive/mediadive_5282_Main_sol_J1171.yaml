preparation_notes: "Mix components thoroughly. For preparation of solid medium, add\
  \ 15.0 g/L agarose. Autoclave and, after cooling to 60C, add the following solutions\
  \ (autoclaved or *filter-sterilized): \nAdjust pH to 6.5 - 7.0 with 0.2 N H2SO4\
  \ solution (autoclaved). Cultivate under an air containing 10% (v/v) methane in\
  \ gas tight flasks or jars leaving &; 80% gas phase by volume.\nTrace element solution:\
  \ \nVitamins solution: \n\nOriginal volume: 3006 mL"
