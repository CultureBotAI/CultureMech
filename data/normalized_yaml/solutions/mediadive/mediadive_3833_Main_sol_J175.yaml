preparation_notes: Mix ingredients except yeast extract, sulfur and Na2S x 9H2O, and
  autoclave under a H2-CO2 (80:20) atmosphere. Separately autoclave yeast extract
  as a 10% solution and Na2S x 9H2O as a 5% solution under a N2 atmosphere. Steam
  sulfur for 3 hr on each of 3 successive days. Aseptically and anaerobically add
  the yeast extract solution and sulfur to the medium under a H2-CO2 (80:20) atmosphere.
  Prior to inoculation, add the sterile Na2S x 9H2O solution and adjust pH to 2.5
  with sterile 1 N H2SO4. Pressurize inoculated bottles to 100 kPa H2-CO2 (80:20).
