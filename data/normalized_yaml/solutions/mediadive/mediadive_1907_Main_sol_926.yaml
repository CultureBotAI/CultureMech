preparation_notes: 'Prepare the medium anaerobically under nitrogen. Do not adjust
  the pH.

  Prepare separate anaerobic stock solutions of, Casamino acids(10%), Yeast extract
  (10%), and glycine (2M = 150 g/l). A 0.5M polysulphide solution is prepared by dissolving
  12.0 g Na2S x 9 H2O in oxygen free water, followed by adding 1.6 g sulphur - the
  solution will be dark yellow.


  Original volume: 2000 mL'
