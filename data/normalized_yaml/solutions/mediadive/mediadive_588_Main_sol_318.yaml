preparation_notes: 'Dissolve ingredients except bicarbonate, vitamins, methanol, cysteine
  and sulfide, then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45
  min to make it anoxic. Dispense medium under the same gas atmosphere into anoxic
  Hungate-type tubes or serum vials to 30% of their volume and autoclave. Add vitamins
  (sterilized by filtration), methanol (50% v/v solution), cysteine and sulfide from
  sterile anoxic stock solutions prepared under 100% N2 gas and bicarbonate from a
  sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture. Prior
  to use adjust pH of complete medium to 6.8, if necessary.


  Original volume: 1021 mL'
