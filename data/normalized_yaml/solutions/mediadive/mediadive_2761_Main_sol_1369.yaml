  Autoclave and add the vitamin B12 from a filter-sterilised stock solution and the
  NaHCO3 (autoclaved in sealed, half full vessels), Na2S x 9 H2O, Na2CO3 from sterile
  stock solutions. The final pH of the medium should be 9.0-9.5.'
