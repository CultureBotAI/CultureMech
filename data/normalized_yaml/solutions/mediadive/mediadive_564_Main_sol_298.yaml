preparation_notes: 'Dissolve ingredients except carbonate, 2,3-butanediol and sulfide,
  then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Dispense medium in anoxic Hungate-type tubes or serum vials under the same
  gas atmosphere and autoclave. Add 2,3-butanediol and sulfide from sterile anoxic
  stock solutions prepared under 100% N2 gas and carbonate from a sterile anoxic stock
  solution prepared under 80% N2 and 20% CO2 gas mixture. Prior to use adjust pH of
  complete medium to 7.2 - 7.5.

  Note: Addition of 10 - 20 mg sodium dithionite per liter (e.g. from 5% (w/v) solution
  freshly prepared under N2 and filter-sterilized) may stimulate growth of some strains
  at the beginning.


  Original volume: 1001 mL'
