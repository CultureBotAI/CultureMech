preparation_notes: 'Dissolve in 1 liter, boil under N2, add 0.5 g of L-cysteine and
  adjust pH to 6.4 (should be pH 5.5 after autoclaving). Disperse in tubes and bottles
  (leave 50% of container volume as gas phase). Change to gas mixture N2/CO2; 80/20%)
  and autoclave for 20 minutes at 121°C.

  To 100 ml sterile medium add aseptically '
