preparation_notes: 'Dissolve ingredients except sulfur and sulfide, then sparge medium
  with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it anoxic. Dispense
  medium under same gas atmosphere into serum vials (e.g., 20 ml medium per 100 ml
  bottle) that contain already the appropriate amount of sulfur. After closing pressurize
  bottles to 2 bar overpressure using 80% H2 and 20% CO2 gas mixture, than heat at
  100°C for 1.5 hours on each of 3 successive days. Before use add sulfide from a
  sterile anoxic stock solution prepared under 100% N2 gas atmosphere. Adjust pH of
  complete medium to 6.0, if necessary. Incubate without shaking.


  Original volume: 1018 mL'
