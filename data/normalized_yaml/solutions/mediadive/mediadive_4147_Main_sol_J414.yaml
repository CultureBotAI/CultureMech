preparation_notes: 'Dissolve KH2PO4, K2HPO4, NH4Cl and Na2S2O3 x 5H2O in 500 ml distilled
  water. Separately dissolve CaCl2 x 2H2O, MgCl2 x 6H2O and Trace metal solution in
  460 ml distilled water. Autoclave both solutions, mix them after cooling, and add
  40 ml filter-sterilized 5% NaHCO3 solution to the medium. Adjust pH to 7.0 with
  HCl, if necessary.


  Original volume: 1 mL'
