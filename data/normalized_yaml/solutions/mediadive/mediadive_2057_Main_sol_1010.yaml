preparation_notes: 'Dissolve ingredients (except dihydrogenphosphate, ammonium chloride,
  carbonate, lactate, vitamins and sulfide), then sparge medium with 80% N2 and 20%
  CO2 gas mixture for 30 - 45 min to make it anoxic. Dispense medium under same gas
  atmosphere into anoxic Hungate-type tubes or serum vials and autoclave. Add dihydrogenphosphate,
  ammonium chloride, lactate, vitamins and sulfide form sterile anoxic stock solutions
  prepared under 100% N2 gas and carbonate from a sterile anoxic stock solution prepared
  under 80% N2 and 20% CO2 gas atmosphere. The vitamin solutions should be sterilized
  by filtration. Adjust pH of the complete medium to 7.2 - 7.5, if necessary.


  Original volume: 1004 mL'
