preparation_notes: 'Dissolve ingredients except bicarbonate and sulfide, then sparge
  medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it anoxic. Add
  bicarbonate, adjust pH to 6.5 and dispense medium under 80% N2 and 20% CO2 gas atmosphere
  into anoxic serum vials (e.g., 20 ml medium per 100 ml bottle), pressurize bottles
  up to 2 bar overpressure, then autoclave. Before use, release excess pressure and
  reduce the medium with sulfide from a sterile anoxic stock solution prepared under
  100% N2 gas.

  After inoculation, add 2 bar overpressure of sterile 80% H2 and 20% CO2 gas mixture.


  Original volume: 1012 mL'
