preparation_notes: 'Adjust pH to 7.0 and filter-sterilize. Keep the solution under
  a N2 atmosphere.

  To complete the medium, add 0.1 volume of Solution B to the culture vessels containing
  Solution A. Prior to inoculation, aseptically and anaerobically add 0.01 volume
  of L-cysteine x HCl x H2O and Na2S x 9H2O solutions to the medium (3% solutions,
  autoclaved and stored under a N2 atmosphere).

  Comment: For strain JCM 10971, incubate with a 10% inoculum.


  Original volume: 100 mL'
