preparation_notes: 'Add 1 N NaOH to distilled water and make the solution anoxic by
  sparging with 100% N2 gas. Then dissolve the Na-dithionite and filter-sterilize
  the solution into anoxic Hungate tubes. The final pH of the solution should be between
  9 and 10. Store the prepared solution in a dark and cool place. Prepare only small
  amounts of stock solution, as Na-dithionite decomposes rapidly.


  Original volume: 10 mL'
