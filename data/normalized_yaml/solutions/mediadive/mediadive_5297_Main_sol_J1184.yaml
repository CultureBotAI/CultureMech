preparation_notes: "Mix components thoroughly and adjust pH to 4.0. Bring to a boil\
  \ and cool under a N2 gas stream. Distribute the medium into culture vessels (e.g.,\
  \ 10 ml of the medium in the Hungate tubes) under a N2 atmosphere, seal with butyl\
  \ rubber stoppers and autoclave. After cooling, aseptically and anaerobically add\
  \ per liter the following solutions (autoclaved or *filter-sterilized and stored\
  \ under a N2 atmosphere): \n\nOriginal volume: 1044 mL"
