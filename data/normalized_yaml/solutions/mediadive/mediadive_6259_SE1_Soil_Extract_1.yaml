preparation_notes: "Site selection for a good soil is very important and for most\
  \ purposes a soil from undisturbed\r\ndeciduous woodland is best. Sites to avoid\
  \ are those showing obvious signs of man's activity\r\nand particular care should\
  \ be taken to avoid areas where fertilizers, crop sprays or other toxic\r\nchemicals\
  \ may have been used.\nA rich loam with good crumb structure should be sought. Stones,\
  \ roots and larger\r\ninvertebrates should be removed during an initial sieving\
  \ through a 1 cm mesh. The sieved\r\nsoil should be spread to air dry and handpicked\
  \ for smaller invertebrates and roots. It should\r\nbe turned periodically and picked\
  \ over again. When dry sieve through a finer mesh (2-4 mm)\r\nand store in an airtight\
  \ container away from light and heat.\nSoil is  prepared  as  above.  Air­-dried\
  \  soil and  twice  its  volume  of  supernatant\r\ndistilled water are autoclaved\
  \ together at 15 psi for 2 hours and left to cool.  The \r\nsupernatant is then\
  \ decanted and filtered through Whatman No 1 filter paper, then\r\ndistributed to\
  \ containers in volumes suitable for making up batches of media. The \r\naliquots\
  \ and their containers are autoclaved for an appropriate length of time (e.g.\r\n\
  1 litre or less for 15 minutes) and are then kept in a cool place (e.g. a refrigerator)\
  \ \r\nuntil required."
