preparation_notes: 'Dissolve ingredients except cysteine and sulfide, sparge medium
  with 80% H2 and  20%  CO2 gas mixture for 30 - 45 min to make it anoxic, then distribute
  under same gas atmosphere into Hungate-type tubes or serum vials to 30% of their
  volume and autoclave. Add cysteine and sulfide from sterile anoxic stock solutions
  prepared under 100% N2 gas atmosphere. Adjust pH of complete medium to 6.5.

  After inoculation pressurize cultivation vessels to one bar overpressure with sterile
  80% H2 and 20% CO2 gas mixture.


  Original volume: 1018 mL'
