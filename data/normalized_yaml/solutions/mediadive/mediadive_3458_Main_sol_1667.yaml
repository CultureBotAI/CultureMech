preparation_notes: 'Dissolve all ingredients except carbonate, vitamins and sulfide,
  then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type tubes
  or serum vials and autoclave. Add vitamins and sulfide from sterile anoxic stock
  solutions prepared under 100% N2 gas and carbonate from a sterile anoxic stock solution
  prepared under 80% N2 and 20% CO2 gas atmosphere. Vitamins should be sterilized
  by filtration. Adjust pH of complete medium to 6.8 - 7.2, if necessary.


  Original volume: 1002 mL'
