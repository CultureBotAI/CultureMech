preparation_notes: 'Add components except acetate and APM salts solutions to distilled
  water, bring volume to 1.0 L and adjust pH to 6.8. Distribute the medium into culture
  vessels under a N2-CO2 (4:1, v/v) gas mixture, sparge with the same gas mixture
  for 10 - 15 min, seal with butyl rubber stoppers and autoclave. Separately autoclave
  acetate and APM salts solutions under a N2 gas atmosphere and add to the medium
  anaerobically.


  Original volume: 50 mL'
