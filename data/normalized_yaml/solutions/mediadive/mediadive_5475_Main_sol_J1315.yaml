preparation_notes: "Mix components thoroughly, except NaHCO3, and adjust pH to 7.0.\
  \ Bring to a boil for a seconds, cool down under a stream of N2-CO2 (80:20, v/v)\
  \ and add NaHCO3 to the medium. Dispense the medium into culture vessels (e.g.,\
  \ 20 ml in 120 ml serum bottles) under a H2-CO2 (80:20, v/v) gas mixture, seal with\
  \ butyl rubber stoppers and autoclave. Aseptically and anaerobically add per liter\
  \ the following solutions (autoclaved or filter-sterilized, and stored under N2):\
  \ \nPressurize inoculated bottles to 100 KPa H2-CO2 (80:20, v/v).\n\nOriginal volume:\
  \ 1030 mL"
