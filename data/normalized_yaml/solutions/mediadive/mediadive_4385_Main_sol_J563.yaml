preparation_notes: Dissolve ingredients except NaHCO3 in distilled water, boil for
  5 min, then cool to room temperature while gassing with 100% CO2. Add NaHCO3, equilibrate
  the medium with NaOH to pH 6.9. Distribute 10 ml amounts in anaerobic Hungate tubes
  under CO2 and autoclave.
