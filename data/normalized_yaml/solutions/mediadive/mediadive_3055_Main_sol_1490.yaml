preparation_notes: 'Dissolve ingredients (except carbonate, thiosulfate, magnesium
  chloride, cysteine and sulfide), then sparge medium with 80% H2 and 20% CO2 gas
  mixture for 30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere
  into anoxic Hungate-type tubes or serum vials to 30% of their volume and autoclave.
  Add magnesium chloride, cysteine and sulfide from sterile anoxic stock solutions
  prepared under 100% N2 gas and carbonate from a sterile anoxic stock solution prepared
  under 80% N2 and 20% CO2 gas mixture. Adjust pH of the complete medium to 6.8 -
  7.0, if necessary.

  After inoculation pressurize cultivation vials to 1 bar overpressure with sterile
  80% H2 and 20% CO2 gas mixture.


  Original volume: 1001 mL'
