preparation_notes: 'Dissolve ingredients (except carbonate, fatty acid mixture and
  cysteine), bring medium to the boil, then cool to room temperature under 100% CO2
  gas atmosphere. Add solid carbonate, fatty acid mixture and cysteine and adjust
  pH to 6.0. Dispense medium under 100% CO2 gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Adjust pH of complete medium to 6.0, if necessary.


  Original volume: 1004 mL'
