preparation_notes: "Mix components thoroughly. Gas with N2-CO2 (4:1, v/v) to establish\
  \ pH 6.5. Dispense the medium in culture vessels (e.g., 20 ml in 30 ml serum bottles)\
  \ under the same gas mixture, seal with butyl rubber stoppers and autoclave. After\
  \ cooling add per liter the following solution (filter-sterilized): \nPrior to inoculation,\
  \ add filter-sterilized 5% H2 and 5% air to the gas phase (by volume). Incubate\
  \ statically. Replenish H2 and air every two days.\nModified trace vitamins: \n\n\
  Original volume: 2002 mL"
