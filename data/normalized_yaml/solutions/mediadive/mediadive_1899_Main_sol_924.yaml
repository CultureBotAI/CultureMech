preparation_notes: 'Dissolve ingredients (except bicarbonate, acetate, formate, vitamins
  and reducing agents), then sparge medium with 80% N2 and 20% CO2 gas mixture for
  30 - 45 min to make it anoxic. Add solid bicarbonate, adjust pH to 6.8 - 7.0, dispense
  medium under 80% N2 and 20% CO2 gas atmosphere into anoxic serum bottles and autoclave.
  Add acetate, formate, vitamins (sterilized by filtration), cysteine and sulfide
  from sterile anoxic stock solutions prepared under 100% N2 gas. The pH of the complete
  medium should be 7.2.


  Original volume: 1011 mL'
