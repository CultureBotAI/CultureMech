preparation_notes: Mix ingredients except Na2S x 9H2O and adjust pH to 6.9 with H2SO4.
  Sterilize by filtration under H2-CO2 (80:20) gas mixture. Neutralize Na2S x 9H2O
  solution and autoclave under a N2 atmosphere. Aseptically and anaerobically add
  the sterile Na2S x 9H2O solution to the medium under a H2-CO2 (80:20) atmosphere
  and readjust pH to 6.9, if necessary. Pressurize inoculated bottle to 200 kPa H2-CO2
  (80:20).
