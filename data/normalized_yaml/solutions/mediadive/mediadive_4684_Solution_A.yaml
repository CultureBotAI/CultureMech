preparation_notes: "First dissolve iron(III) citrate in 800 ml distilled water and\
  \ adjust pH to 7.0 with 10 N NaOH. Then, add the remaining minerals, bring volume\
  \ to 970 ml and autoclave under a N2 atmosphere. Add aseptically and anaerobically\
  \ the following filter-sterilized solutions: \nDistribute the medium into sterile\
  \ culture vessels (e.g., 50 ml per 120 ml bottle) under a N2-CO2 (4:1, v/v) gas\
  \ mixture, and seal with sterile butyl rubber stoppers. Then add per 50 ml the following\
  \ solutions from anaerobic stocks: \nCheck the final pH of the medium to be around\
  \ 7.0.\n\nOriginal volume: 36 mL"
