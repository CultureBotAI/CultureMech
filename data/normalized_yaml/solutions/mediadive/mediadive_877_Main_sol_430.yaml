preparation_notes: 'Dissolve and bring to the boil.

  Allow to cool down to room temperature under N2 gas phase. Then add bicarbonate.

  Adjust pH to 8.5.

  Dispense into appropriate vessels, e.g. Hungate tubes, under N2 atmosphere.

  Autoclave at 121 °C for 15 min.

  After autoclaving add sterile-filtered vitamin and sulfide solutions.'
