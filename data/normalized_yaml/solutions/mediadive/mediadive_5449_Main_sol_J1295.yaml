preparation_notes: "Solution A:\nAdjust pH to 6.5-7.0.\nSolution B: \nSeparately autoclave\
  \ Solutions A and B, and combine after cooling. Cultivate under a static culture\
  \ condition or a N2 atmosphere. For preparation of solid medium, add 10.0 g gellan\
  \ gum in Solution A (900 ml). After autoclaving, mix the two solutions while being\
  \ hot (60 to 70 C) and pour into test tubes or petri dishes."
