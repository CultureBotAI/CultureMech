preparation_notes: 'Dissolve ingredients (except glucose and cysteine), boil medium
  for 1 min, then cool to room temperature under a N2 gas atmosphere. Add cysteine
  and adjust pH to 7.0. Thereafter, dispense into culture vessels under a N2 gas atmosphere
  and autoclave. After autoclaving, add glucose from a sterile, anoxic stock solution
  prepared under a N2 gas atmosphere.


  Original volume: 1040 mL'
