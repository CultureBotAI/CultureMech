preparation_notes: 'Adjust pH to 7.5 before autoclaving. Sterilize separately a 10%
  (w/v) solution of Na2S x 9 H2O; add the following amount of this solution to the
  medium after autoclaving (= shortly before using the medium).

  Note: For small volumes, such as 5 mL agar slants, you can use the respective volume
  of a sterile neutralized 3% Na2S x 9 H2O solution (e.g., 50µL/5 mL = 0.3g/L)'
