preparation_notes: "Use lean beef or horse meat. Remove fat and connective tissue\
  \ before grinding. Mix meat, water and NaOH, then boil for 15 min with stirring.\
  \ Cool to room temperature, skim fat off surface, and filter, retaining both meat\
  \ particles and filtrate. To the filtrate add water to a final volume of 1000 ml,\
  \ and then add: \nTo make medium anoxic boil it, cool under 100% N2 gas atmosphere,\
  \ add 0.5 g/l L-cysteine hydrochloride and adjust pH to 7.0. Dispense under same\
  \ gas atmosphere 7 ml medium into Hungate-type tubes (for strains demanding meat\
  \ particles put those first into the tube (use 1 part meat particles to 4 or 5 parts\
  \ fluid)). Autoclave at 121°C for 30 min. For agar slants use 15.0 g agar per 1000.0\
  \ ml medium.\nIn some cases (as indicated in the catalogue) the addition of Haemin\
  \ and Vitamin K1 or Vitamin K3 is necessary. Add to 1000 ml of medium after autoclaving:\
  \  and either  or "
