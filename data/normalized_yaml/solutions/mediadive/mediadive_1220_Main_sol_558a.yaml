preparation_notes: 'Dissolve ingredients (except glucose, yeast extract, vitamin solution
  and reducing agents), adjust pH to 5 - 6 using HCl and sparge medium with 100% N2
  gas for 30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere
  into anoxic Hungate-type tubes or serum vials and autoclave. After autoclaving add
  glucose, yeast extract, vitamin solution, cysteine and sulfide from sterile anoxic
  stock solutions prepared under 100% N2 gas. The vitamin solution should be sterilized
  by filtration. Adjust pH of complete medium to 5.0 - 6.0, if necessary.


  Original volume: 1011 mL'
