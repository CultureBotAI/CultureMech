preparation_notes: 'Dissolve ingredients except cysteine and sulfide, then sparge
  medium with 100% N2 gas for 30 - 45 min to make it anoxic. Dispense medium under
  same gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
  Add cysteine and sulfide from sterile anoxic stock solutions prepared under 100%
  N2 gas. Prior to use check pH of complete medium and adjust to 7.3 - 7.5, if necessary.


  Original volume: 1012 mL'
