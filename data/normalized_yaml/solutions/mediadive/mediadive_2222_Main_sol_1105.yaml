preparation_notes: 'Dissolve in this order in 1L preferably MilliQ water. Sterilize
  in closed bottles at 120°C 20 min. After cooling, usually there will be some precipitate
  on the bottom. That´s why it is handy to have another empty 1L bottle to decant
  clear top solution into it.

  After sterilization add from concentrated steril stock solutions:

  Trace metals, MgSO4 x 7 H2O and Na2S2O3 x 5 H2O solution you can autoclave

  Vitamin B12 and Isobutyramide solution you have to filter-sterilize'
