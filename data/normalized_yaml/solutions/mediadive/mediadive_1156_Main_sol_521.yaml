preparation_notes: 'Dissolve ingredients (except bicarbonate, vitamins, pyruvate and
  sulfide), then sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic.
  Dispense medium under same gas atmosphere into anoxic Hungate-type tubes or serum
  vials and autoclave. Complete the medium by adding vitamins, pyruvate and sulfide
  from sterile anoxic stock solutions prepared under 100% N2 gas atmosphere and bicarbonate
  from a sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture.
  Stock solutions of vitamins and pyruvate are sterilized by filtration. Adjust pH
  of the complete medium to 6.8 - 7.0.

  Note: Prior to inoculation 10-20 mg/l sodium dithionite (added from a 5% w/v solution
  freshly prepared under N2 and filter-sterilized) can be added to the medium to stimulate
  growth at the beginning.


  Original volume: 1012 mL'
