  \ the same gas mixture (e.g., 20 ml in 60 ml-serum bottles) and seal with butyl\
  \ rubber stoppers. Prior to use, add per liter the following solution to reduce\
  \ the medium (autoclaved and stored under N2): \nComment:\nFor cultivation of JCM\
  \ 31104, use 1 M sodium lactate solution instead of 1 M glycerin solution (final\
  \ 10 mM).\n\nOriginal volume: 1016 mL"
