preparation_notes: 'Dissolve ingredients except iron, lactate and carbonate, adjust
  pH to 6.0 with NaOH and sparge medium with 100% N2 gas for 30 - 45 min to make it
  anoxic. Dispense medium under same gas atmosphere into anoxic Hungate-type tubes
  or serum vials containing 1 - 2 g iron powder or an iron nail. Autoclave for 30
  min at 105°C. Before use add lactate from a sterile anoxic stock solutions prepared
  under 100% N2 gas and carbonate from a sterile anoxic stock solution prepared under
  80% N2 and 20% CO2 gas atmosphere. Final medium pH should be 7.2.


  Original volume: 1001 mL'
