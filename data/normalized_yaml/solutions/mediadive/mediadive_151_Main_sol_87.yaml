preparation_notes: 'Adjust pH to 8.2.

  Boil the medium under a stream of nitrogen gas for a few minutes and distribute
  10 ml medium into 15 ml hungate tubes. Bubble each tube with nitrogen gas and close
  immediately with a rubber septum and screw tight.

  Autoclave at 121 °C for 15 min.

  After autoclaving inject 0.1 ml of neutralized sulfide solution (0.03% end concentration)
  to each tube.


  Original volume: 1056 mL'
