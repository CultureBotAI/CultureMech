preparation_notes: Dissolve ingredients except carbonate, maltose and DTT, then sparge
  medium with 100% N2 gas for 30 - 45 min to make it anoxic. Dispense medium under
  same gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave
  at 121°C for 20 minutes. Add maltose and DTT from sterile anoxic stock solutions
  prepared under 100% N2 gas and sterilized by filtration and carbonate from a sterile
  stock solution prepared under 80% N2 and 20% CO2 gas atmosphere. Check pH of complete
  medium and adjust to 7.4, if necessary.
