preparation_notes: 'Dissolve ingredients (except carbonate, crotonate, coenzyme M,
  vitamins and sulfide), then sparge medium with 80% N2 and 20% CO2 gas mixture for
  30 - 45 min to make it anoxic. Dispense medium under same gas atmosphere into Hungate-type
  tubes or serum vials (e.g., 5 ml medium in Balch-type tubes) and autoclave. Add
  crotonate, coenzyme M, vitamins and sulfide from sterile anoxic stock solutions
  prepared under 100% N2 gas and carbonate from a sterile anoxic stock solution prepared
  under 80% N2 and 20% CO2 gas mixture. Stock solutions of crotonate, coenzyme M and
  vitamins should be sterilized by filtration. Adjust pH of the complete medium to
  7.0 - 7.2.

  Note: Use 10% (v/v) as inoculum.


  Original volume: 1022 mL'
