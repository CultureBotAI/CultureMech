preparation_notes: 'Mix ingredients except NaHCO3, Trace vitamins and Na2S x 9H2O,
  and autoclave under a N2-CO2 (90:10) atmosphere. Filter-sterilize NaHCO3 as an 8.4%
  solution and Trace vitamins while gassing with N2. Separately autoclave Na2S x 9H2O
  as 5% solution under a N2 atmosphere. Aseptically and anaerobically add NaHCO3 and
  Trace vitamins to the medium under a N2-CO2 (90:10) atmosphere. Prior to inoculation,
  add the sterile Na2S x 9H2O solution, and adjust pH to 7.5 - 8.0.


  Original volume: 1002 mL'
