preparation_notes: "Prepare the following primary stocks solutions first.\nTo prepare\
  \ the final stock solution, Using the primary stocks as shown below, make up to\r\
  \n1 litre of deionised water.\nDispense the final stock solution into 10ml aliquots.\
  \ Autoclave at 15 psi for 15 minutes.\nFinally, to use add 20 ml per litre to sterile\
  \ 30 ppt filtered seawater (950mls filtered seawater:\r\n30mls deionised water)\n\
  For 1/2 strength Modified Provasoli add 10 ml sterile stock per litre of sterile\
  \ 30 ppt filtered\r\nseawater (950mls filtered seawater: 40mls deionised water)\n\
  For agar add 15g per litre Bacteriological Agar."
