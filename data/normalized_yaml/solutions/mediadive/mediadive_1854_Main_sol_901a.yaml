preparation_notes: 'Dissolve ingredients except yeast extract, vitamins and sulfide.  Adjust
  pH to 4.5 with H2SO4 and sparge medium with 100% CO2 gas for 30 - 45 min to make
  it anoxic. Dispense medium under the same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add yeast extract, vitamins (sterilized by filtration),
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas. The
  sulfide stock solution (3% w/v) should be neutralized before use (see medium 28).
  The pH of the complete medium should be at 4.5.


  Original volume: 1017 mL'
