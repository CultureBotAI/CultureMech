preparation_notes: "OTEB-medium is available from Anaerobe Systems (http://www.anaerobesystems.com)\n\
  The following text was taken from the above page: \r\n\r\n- ORAL TREPONEME ENRICHMENT\
  \ BROTH (OTEB)\r\n\r\n- Products: AS-603 Oral Treponeme Enrichment Broth (OTEB)\
  \ 10 tubes / pkg\nIntended Use: OTEB is an enriched medium for the isolation, cultivation\
  \ and maintenance of Treponemes found as part of the oral flora.\nOTEB is a complex\
  \ peptone-yeast extract medium containing volatile fatty acids and serum for a source\
  \ of long chain fatty acids. Volatile fatty acids and serum are necessary nutrients\
  \ for recovery of Treponemes from the oral flora. Inoculation of the medium can\
  \ be done using a gassing cannula or inside an anaerobic chamber. This medium is\
  \ prepared, stored and dispensed under oxygen-free conditions to prevent the formation\
  \ of oxidized products prior to use.\nFinal pH 7.0 +/- 0.2 at 25 degrees C.\nFinal\
  \ volume 7.0 ml +/- 0.7."
