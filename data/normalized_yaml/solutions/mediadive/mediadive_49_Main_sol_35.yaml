preparation_notes: 'Dissolve all ingredients, except the sulfur and adjust the pH
  to 4.2, then autoclave. For sterilization place the sulfur in screw-capped tubes
  or bottles, wet with a few drops of water and heat for 3 hours to 90 - 100°C in
  a water bath on each of three successive days. Before use, aseptically layer the
  sulfur onto the surface of autoclaved liquid basal medium.

  Note: Incubate statically without shaking.'
