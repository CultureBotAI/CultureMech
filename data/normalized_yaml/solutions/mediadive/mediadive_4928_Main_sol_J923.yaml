preparation_notes: "Mix components thoroughly and adjust pH to 5.0 with HCl. Bring\
  \ to a boil for 5 min, then, cool down under a stream of a N2-CO2 (80:20, v/v) gas\
  \ mixture. Distribute the medium into Balch-type culture tubes (5 ml each) under\
  \ the same gas mixture, seal with thick blue butyl rubber stoppers and autoclave.\n\
  To complete the medium, replace the gas phase with H2-CO2 (80:20, v/v) gas mixture,\
  \ and add the following solutions to each of the culture tubes (containing 5 ml\
  \ medium) from sterile anaerobic stocks (autoclaved or *filter-sterilized): \nCheck\
  \ the final pH of the medium to be about 5.1. Pressurize inoculated tubes to 70\
  \ kPa H2-CO2 (80:20, v/v).\n\nOriginal volume: 1011 mL"
