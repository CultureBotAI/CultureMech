preparation_notes: Prepare the medium anaerobically under nitrogen. Adjust to pH 5.5
  - 6.5 with 1M H3PO4. Dispense into serum bottles or Hungate tubes (under a nitrogen
  atmosphere) that can be sealed with rubber stoppers.
