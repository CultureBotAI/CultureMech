preparation_notes: 'Boil the medium for few minutes. Fill in tubes with rubber stoppers
  under nitrogen gas. Sterilize at 121°C for 15 min.

  Prepare NaHCO3, Na2CO3 and sulfide as separate sterile stock solution, Vitamin B12
  and Biotin as filter-sterilized stock solution and add to sterile medium after autoclaving.
  Adjust pH to 9 - 9.5 .

  To control anoxic conditions, add resazurin to a final concentration of 0.002%.'
