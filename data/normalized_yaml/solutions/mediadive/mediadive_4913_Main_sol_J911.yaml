preparation_notes: "Mix components thoroughly, bring to a boil and cool down under\
  \ a stream of N2-CO2 (4:1, v/v) gas mixture. Distribute the medium into culture\
  \ vessels (e.g., 5 ml in the Hungate tubes) under the same gas mixture, seal with\
  \ butyl rubber stoppers and autoclave. Aseptically and anaerobically, add per liter\
  \ the following solutions (filter-sterilized): \nPrior to inoculation, replace the\
  \ gas phase with a H2-CO2 (4:1, v/v) gas mixture and add per liter the following\
  \ solution from an anaerobic stock (autoclaved and stored under a N2 gas atmosphere):\
  \ \nPressurize the inoculate culture vessels to 150 kPa H2-CO2 (4:1, v/v).\n\nOriginal\
  \ volume: 1041 mL"
