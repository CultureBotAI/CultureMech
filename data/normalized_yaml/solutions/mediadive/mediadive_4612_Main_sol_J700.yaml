preparation_notes: "Mix components thoroughly. Distribute the medium into culture\
  \ vessels (e.g., 20 ml medium in 50 ml serum bottles) under a N2-CO2 (4:1, v/v)\
  \ gas mixture, seal with butyl rubber stoppers and autoclave. After cooling, add\
  \ per liter the following solutions (*filter-sterilized or autoclaved, and stored\
  \ anaerobically) to the medium: \nPressurize the culture vessels to 200 kPa N2-CO2\
  \ (4:1, v/v) . Check final pH to be 6.0-6.5.\nComment: MJ(-N) synthetic seawater\
  \ can be replaced with commercially available synthetic seawater such as Jamarin\
  \ S (Jamarin Laboratory). Addition of rumen fluid clarified (10.0 ml/L, see Medium\
  \ No. 266) may stimulate growth. For strain JCM 15506, incubate with a 5-10% inoculum.\n\
  \nOriginal volume: 1015 mL"
