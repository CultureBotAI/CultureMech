preparation_notes: 'Adjust pH to 6.5 with NaOH, bring to boil for 5 min, then cool
  to room temperature under H2 + CO2 (80% + 20%) gas mixture. Add 0.85 g NaHCO3 per
  liter and equilibrate the pH to c. 6.5 by further gassing.

  Dispense in serum bottles (10 ml/30 ml bottle), seal and heat the bottles for one
  hour at 85°C on each of three successive days.

  Before inoculation, add from anaerobic stock solutions 0.02% yeast extract (for
  mixotrophic growth only) and neutralized Na2S x 9 H2O solution, 10% (w/v). After
  inoculation, pressurize to 1 bar H2 + CO2 overpressure.

  Prepare medium, then add per liter:'
