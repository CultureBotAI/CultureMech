preparation_notes: 'Dissolve ingredients except cysteine, maltose and vitamins. Sparge
  medium with 100% N2 gas for 30 - 45 min to make it anoxic, then add and dissolve
  cysteine and adjust pH to 6.8 with NaOH. Dispense medium under 100% N2 gas atmosphere
  into anoxic Hungate-type tubes or serum vials and autoclave. Add maltose and vitamins
  after autoclaving from anoxic stock solutions prepared under 100% N2 gas and sterilized
  by filtration.


