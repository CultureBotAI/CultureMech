preparation_notes: 'Firstly, dissolve NaHCO3 in 80 ml distilled water. Then, add NTA
  and FeCl3 x 6H2O to the solution and bring volume to 100 ml with distilled water.
  Adjust pH to 7.0 with NaOH. Filter-sterilize and store under a N2 atmosphere.

  Comment:

  100 mM Fe NTA solution can be replaced with Iron(III)citrate solution (see Medium
  No. 1014, autoclaved and stored under N2).'
