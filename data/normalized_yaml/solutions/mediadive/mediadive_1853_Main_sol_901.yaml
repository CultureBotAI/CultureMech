preparation_notes: 'Dissolve ingredients except sulfur, yeast extract, vitamins and
  sulfide. Adjust pH to 3.5 with H2SO4 and sparge medium with 100% CO2 gas for 30
  - 45 min to make it anoxic. Dispense medium under same gas atmosphere into anoxic
  Hungate-type tubes or serum vials containing the appropriate amount of sulfur. Heat
  vessels containing medium to 90°C for 1 hour on each of 3 succesive days. Add yeast
  extract, vitamins (sterilized by filtration) and sulfide from sterile anoxic stock
  solutions prepared under 100% N2 gas. The sulfide stock solution (3% w/v) should
  be neutralized before use (see medium 29). The pH of the complete medium should
  be at 3.5 - 3.8.


  Original volume: 1017 mL'
