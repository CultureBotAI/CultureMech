preparation_notes: 'Mix ingredients except NaHCO3, adjust pH to 6.8 and add NaHCO3
  to the medium. Dispense the medium (9 ml) into 26-ml anaerobic pressure tubes under
  a stream of oxygen-free N2-CO2 (80:20) and seal. After autoclaving, aseptically
  and anaerobically add 0.2 ml APM salts solution and 0.1 ml Sulfide stock solution
  and 0.1 ml Galactose stock solution.


