preparation_notes: Dissolve ingredients, sparge medium with 100% N2 gas for 30 - 45
  min to make it anoxic. Adjust pH to 7.1 with Na2CO3 (5% w/v), if necessary. Then
  dispense medium under the same gas atmosphere into anoxic Hungate-type tubes or
  serum vials and autoclave.
