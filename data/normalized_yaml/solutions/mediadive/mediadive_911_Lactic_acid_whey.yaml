preparation_notes: Adjust 10% skim milk to pH 5.5 with lactic acid and heat at 100°C
  for 30 minutes. Remove precipitate by filtration. For preparing broth medium, adjust
  filtrate to pH 7.0 with 2 N NaOH and heat at 100°C for 30 minutes. Remove precipitate
  by filtration. Adjust filtrate to pH 5.5 with 2 N HCl.
