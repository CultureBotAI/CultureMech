preparation_notes: "Add components to distilled water and bring volume to 1.0 L. Adjust\
  \ pH to 9.6 with 6N HCl. Autoclave. After cooling, aseptically add the following\
  \ solutions (autoclaved or *filter-sterilized): \nTo complete the medium, aseptically\
  \ and anaerobically distribute the medium into culture vessels under an argon gas\
  \ stream, and seal with butyl rubber stoppers. Then, add per liter the following\
  \ solutions (autoclaved or *filter-sterilized): \n\nOriginal volume: 24 mL"
