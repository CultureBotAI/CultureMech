preparation_notes: 'Dissolve ingredients (except carbonate, vitamins, cysteine, and
  DTT) and sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min to make
  it anoxic. Dispense medium under the same gas atmosphere into anoxic Hungate-type
  tubes or serum vials to 30% of their volume and autoclave. Add vitamins (sterilized
  by filtration), cysteine, and DTT from sterile anoxic stock solutions prepared under
  100% N2 gas and carbonate from a sterile anoxic stock solution prepared under 80%
  N2 and 20% CO2 gas mixture. The pH of the complete medium should be 7.0.

  After inoculation pressurize vials to 1 bar overpressure with sterile 100% H2 gas.


  Original volume: 1004 mL'
