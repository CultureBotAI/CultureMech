preparation_notes: 'Dissolve ingredients (except carbonate, vitamins and sulfide)
  and sparge medium with 80% H2 and 20% CO2 gas mixture for 30 - 45 min to make it
  anoxic. Then dispense medium under 80% H2 and 20% CO2 gas atmosphere into anoxic
  Hungate-type tubes or serum vials to 30% of their volume and autoclave. Add vitamins
  and sulfide from sterile anoxic stock solutions prepared under 100% N2 gas (vitamins
  are sterilized by filtration) and carbonate from a sterile anoxic stock solution
  prepared under 80% N2 and 20% CO2 gas mixture. Adjust pH of the complete medium
  to 6.8 - 7.0, if necessary.

  After inoculation, pressurize culture vessels with sterile 80% H2 and 20% CO2 gas
  mixture to 1 bar overpressure.


  Original volume: 1003 mL'
