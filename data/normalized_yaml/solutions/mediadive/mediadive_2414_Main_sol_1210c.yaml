preparation_notes: 'Dissolve ingredients except sulfur, carbonate, hydrogen phosphate,
  thiosulfate, and vitamins, then sparge medium with 80% N2 and 20% CO2 gas mixture
  for 30 - 45 min to make it anoxic. Dispense medium under the same gas atmosphere
  into anoxic Hungate-type tubes or serum vials containing already the appropriate
  amount of sulfur and autoclave at <b>110°C</b> for 20 min. Add hydrogen phosphate,
  thiosulfate, and vitamins from sterile anoxic stock solutions prepared under 100%
  N2 gas and carbonate from a sterile anoxic stock solution prepared under 80% N2
  and 20% CO2 gas mixture. Stock solutions of thiosulfate and vitamins should be sterilized
  by filtration. The pH of the complete medium should be 6.5 - 6.8.


  Original volume: 1003 mL'
