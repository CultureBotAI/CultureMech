preparation_notes: 'Dissolve ingredients except carbonate, trimethylamine and sulfide,
  then sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic. Distribute
  medium under the same gas atmosphere into anoxic Hungate-type tubes or serum vials
  and autoclave. Before use add trimethylamine and sulfide from sterile anoxic stock
  solutions autoclaved under 100% N2 gas and carbonate from a sterile anoxic stock
  solution prepared under 80% N2 and 20% CO2 gas mixture. Adjust pH of the complete
  medium to 8.5 with a sterile anoxic stock solution of Na2CO3 (5% w/v).


  Original volume: 1010 mL'
