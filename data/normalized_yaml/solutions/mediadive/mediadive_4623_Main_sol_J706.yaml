preparation_notes: "Mix ingredients and adjust pH to 7.2. Distribute the medium into\
  \ culture vessels (e.g., 4.7 ml of the medium in the Hungate tubes) under a N2-CO2\
  \ (4:1, v/v) gas mixture, seal with butyl rubber stoppers and autoclave.\nTo complete\
  \ the medium, add the following stock solutions [Filter-sterilize NaHCO3 solution\
  \ and store under a N2-CO2 (4:1, v/v) gas mixture. The other solutions are autoclaved\
  \ and stored anaerobically under a N2 atmosphere] to the medium (per 4.7 ml of the\
  \ medium): \n\nOriginal volume: 941 mL"
