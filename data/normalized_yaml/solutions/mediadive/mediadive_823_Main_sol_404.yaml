preparation_notes: 'Dissolve ingredients (except bicarbonate, methanol, vitamins,
  cysteine and sulfide), then sparge medium with 80% H2 and 20% CO2 gas mixture for
  30 - 45 min to make it anoxic. Add and dissolve bicarbonate and adjust pH to 7.0,
  then distribute under 80% H2 and 20% CO2 gas atmosphere into anoxic Hungate-type
  tubes or serum vials to 30% of their volume and autoclave. After sterilization add
  methanol (50% v/v), vitamins, cysteine and sulfide from sterile anoxic stock solutions
  prepared under 100% N2 gas atmosphere. Vitamins are sterilized by filtration. Adjust
  pH of complete medium to 7.0 - 7.2.

  After inoculation, pressurize culture bottles with sterile 80% H2 and 20% CO2 gas
  mixture to 2 bar overpressure.


  Original volume: 1004 mL'
