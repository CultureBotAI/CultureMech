preparation_notes: Add L-cystine to 50 ml of 1 N HCl and mix thoroughly. Add the remaining
  components and bring volume to 950 ml. Adjust pH to 7.6-7.8. After autoclaving and
  then cooling to 50C, aseptically add 50.0 ml of horse blood. Mix thoroughly and
  pour into sterile petri dishes or distribute into sterile tubes.
