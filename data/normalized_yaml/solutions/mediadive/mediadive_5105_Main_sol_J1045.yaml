preparation_notes: "Mix components, adjust pH 7.2 and autoclave. Cool medium under\
  \ a N2-CO2 (4:1, v/v) gas stream and add anaerobically the following solution (filter-sterilized).\
  \ \nAseptically and anaerobically distribute the medium into culture vessels under\
  \ the same gas mixture and seal with butyl rubber stoppers. Readjust pH to 7.0 -\
  \ 7.2.\n\nOriginal volume: 1004 mL"
