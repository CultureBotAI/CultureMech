preparation_notes: Dissolve dehydrated RCM medium (available from BD BBL, OXOID, or
  MERCK) and SIGMA Sea Salts (30.0 g/l) in distilled water and add 0.5 ml/l Na-resazurin
  solution (0.1% w/v). Bring to a boil and cool to room temperature while sparging
  with 100% N2 gas. Dispense the medium under the same gas atmosphere into anoxic
  Hungate-type tubes or serum vials and autoclave for 15 min at 121°C. Adjust the
  pH of the complete medium to 6.8.
