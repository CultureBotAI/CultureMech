preparation_notes: "Mix components and autoclave under a N2 atmosphere. After cooling,\
  \ anaerobically add the following sterile solutions (autoclaved or *filter-sterilized)\
  \ from anaerobic stocks: \nTo complete the medium, adjust pH to 7.0 with sterile\
  \ HCl solution, dispense into culture vessels leaving 40 to 50% volume of gas phase\
  \ (e.g., 30 ml of the medium in a 50 ml serum bottle) and seal with butyl rubber\
  \ stoppers. Replace the gas phase with a N2-CO2-H2 (8:1:1, v/v) gas mixture. Finally\
  \ add the following filter-sterilized chlorosolvent (per liter): \n\nOriginal volume:\
  \ 1006 mL"
