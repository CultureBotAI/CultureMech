preparation_notes: "Mix components thoroughly and adjust pH to 5.0. Bring to a boil\
  \ and cool under a N2 gas stream. Distribute the medium into culture vessels (e.g.,\
  \ 5 ml of the medium in the Hungate tubes) under the same gas atmosphere, seal with\
  \ butyl rubber stoppers, and autoclave. After cooling, replace the gas phase with\
  \ a H2-CO2 (4:1, v/v) gas mixture and add per liter the following solution (freshly\
  \ prepared and filter-sterilized): \nPressurize the inoculated culture vessels to\
  \ 100 kPa H2-CO2 (4:1, v/v).\n\nOriginal volume: 1043 mL"
