preparation_notes: 'Dissolve ingredients except bicarbonate, carbonate, vitamins,
  cysteine and sulfide. Sparge medium with 100% N2 gas for 30 - 45 min to make it
  anoxic, then dissolve carbonate and bicarbonate and adjust pH of medium to 8.5 using
  HCl. Dispense medium under 100% N2 gas atmosphere into anoxic Hungate-type tubes
  or serum vials and autoclave. Prior to inoculation add vitamins, cysteine and sulfide
  from sterile anoxic stock solutions prepared under 100% N2 gas. Vitamins should
  be sterilized by filtration.


  Original volume: 1011 mL'
