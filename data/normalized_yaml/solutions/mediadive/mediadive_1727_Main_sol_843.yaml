preparation_notes: 'Dissolve ingredients (except carbonate, sugar mix, yeast autolysate,
  vitamins, co-factors, and DTT), sparge medium with 80% N2 and 20% CO2 gas mixture
  for 30 - 45 min to make it anoxic. Distribute under same gas atmosphere into anoxic
  Hungate-type tubes or serum vials to 30% of their volume (e.g., 4.5 ml per Hungate-type
  tube) and autoclave. After sterilization add carbonate from a sterile anoxic stock
  solution prepared under 80% N2 and 20% CO2 gas atmosphere and sugar mix, yeast autolysate,
  vitamins, co-factors and DTT from sterile anoxic stock solutions prepared under
  100% N2 gas atmosphere and sterilized by filtration.  Check pH of complete medium
  and adjust to 7.2 - 7.4, if necessary.

  Note: Basal medium and yeast autolysate have to be prepared freshly and cannot be
  stored for longer periods.


  Original volume: 1003 mL'
