preparation_notes: Add 2 g/l activated charcoal to the columbia agar base solution
  before autoclaving. Add 4% horse blood after cooling to 50°C. Swirl agar during
  suspending. To prevent dry agar surface, spread about 1 ml of sterile medium or
  water over the agar plates and briefly allow to soak into the agar before inoculation.
  Incubate Neisseria strains in a humid microaerobic atmosphere. Rehydrate pellets
  of freeze-dried ampoules in liquid medium 220, 215 or 1.
