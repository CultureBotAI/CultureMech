preparation_notes: "Mix components thoroughly and autoclave under a N2-CO2 (4:1, v/v)\
  \ gas mixture. After cooling, add the following solutions from anaerobic stocks\
  \ (autoclaved or *filter-sterilized): \nThen, aseptically distribute the medium\
  \ into culture vessels under a stream of H2-CO2 (4:1, v/v) and seal with butyl rubber\
  \ stoppers. Prior to inoculation, add per liter the following solution from an anaerobic\
  \ stock (autoclave and store under a N2 atmosphere): \nPressurize inoculated culture\
  \ vessels to 200 kPa H2-CO2 (4:1, v/v).\n\nOriginal volume: 1009 mL"
