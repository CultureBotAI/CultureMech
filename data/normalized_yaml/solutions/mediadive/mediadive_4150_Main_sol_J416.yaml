preparation_notes: 'Mix components, except L-cysteine x HCl x H2O, and adjust pH to
  6.5. Distribute the medium into appropriate culture vessels (e.g., 20 ml of the
  medium in 120 ml serum bottles) under a N2 atmosphere, seal with butyl rubber stoppers
  and autoclave. Separately autoclave concentrated (100- or 200-fold) L-cysteine x
  HCl x H2O solution under a N2 atmosphere. Prior to inoculation, add the sterile
  L-cysteine x HCl x H2O solution. Pressurize the inoculated vessels to 100 kPa N2.

  Comment: For strain JCM 12418, inoculate with a 10% inoculum.


  Original volume: 1020 mL'
