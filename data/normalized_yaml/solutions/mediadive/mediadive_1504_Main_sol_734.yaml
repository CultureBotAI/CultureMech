preparation_notes: 'Dissolve ingredients (except carbonate, MOPS buffer, vitamins
  and DTT), bring medium to the boil, then cool to room temperature under 80% H2 and
  20% CO2 gas mixture. Dispense under same gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Add MOPS buffer adjusted to pH 7.2, vitamins
  and DTT from anoxic stock solutions prepared under 100% N2 gas and sterilized by
  filtration and carbonate from a sterile anoxic stock solution prepared under 80%
  N2 and 20% CO2 gas mixture. Adjust pH of complete medium to 7.2, if necessary.


  Original volume: 1003 mL'
