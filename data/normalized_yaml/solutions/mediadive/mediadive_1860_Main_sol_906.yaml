preparation_notes: 'Dissolve ingredients except calcium chloride, thiosulfate and
  sulfide. Sparge medium with 100% N2 gas for at least 30 - 45 min to make it anoxic,
  then dispense medium under same gas atmosphere into anoxic Hungate-type tubes or
  serum vials and autoclave. Add calcium chloride, thiosulfate and sulfide from sterile
  anoxic stock solutions prepared under 100% N2 gas. The pH of the complete medium
  should be at 6.7 - 6.8.


  Original volume: 1001 mL'
