preparation_notes: Dissolve ingredients (except cysteine and glucose) and sparge medium
  with 100% N2 gas for 30 - 45 min to make it anoxic. Add cysteine and adjust pH to
  7.0, then dispense medium under 100% N2 gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. After autoclaving add glucose or any other substrate
  from sterile anoxic stock solutions prepared under 100% N2 gas atmosphere. Adjust
  pH of complete medium to 6.8 - 7.0, if necessary.
