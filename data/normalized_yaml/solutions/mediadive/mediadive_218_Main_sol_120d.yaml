preparation_notes: 'Dissolve ingredients (except carbonate, vitamins, methanol, cysteine
  and sulfide) and sparge medium with 80% N2 and 20% CO2 gas mixture for 30 - 45 min
  to make it anoxic. Dispense medium under 80% N2 and 20% CO2 gas atmosphere into
  anoxic Hungate-type tubes or serum vials to 30% of their volume and autoclave. Methanol
  (50% v/v stock solution) and the reducing agents are each autoclaved separately
  under 100% N2 gas atmosphere as concentrated solutions in tightly closed tubes.
  Carbonate is prepared under 80% N2 and 20% CO2 gas mixture and autoclaved separately.
  Vitamins are prepared under 100% N2 gas atmosphere and sterilized by filtration.
  Appropriate volumes of the stock solutions are injected into the sterile medium
  with hypodermic syringes. Adjust pH of the complete medium to 6.8 - 7.0, if necessary.


  Original volume: 1024 mL'
