preparation_notes: 'Dissolve ingredients (except cysteine, glucose and vitamins),
  sparge medium with   100% N2 gas for 30 - 45 min to make it anoxic. Add cysteine
  and adjust pH to 6.0, then dispense medium under 100% N2 gas atmosphere into anoxic
  Hungate-type tubes or serum vials and autoclave. Prior to inoculation add glucose
  and vitamins from sterile anoxic stock solutions prepared under 100% N2 gas. The
  vitamin solution should be sterilized by filtration. Adjust pH of complete medium
  to 6.0, if necessary.


  Original volume: 1002 mL'
