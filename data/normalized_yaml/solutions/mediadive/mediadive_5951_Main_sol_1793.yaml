preparation_notes: 'Filter-sterilize (0.2 µm) and keep no longer than 4 weeks. Store
  at room temperature to facilitate detection of contamination.

  Prepare a 25 cm2 flask and seed cells according to standard protocols. Incubate
  at 37°C plus 5% CO2. When a confluent layer has formed, infection can be carried
  out.

  Exchange medium with Infection Medium (as above with the addition of cycloheximide)
  and add 500 - 1000 µl of EB stock solution (thawed quickly to 37°C).

  Centrifuge for 1 h onto the cell layer at 1000 x g at >20°C.

  Incubate at 37°C + 5% CO2. Control cells daily and look for inclusions. Not all
  Chlamydiae form well-visible inclusions, ultimately, immunofluorescence or in situ-hybridization
  techniques are necessary to visualize inclusions.


  Original volume: 607 mL'
