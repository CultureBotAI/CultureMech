preparation_notes: "Mix components thoroughly and distribute the medium into culture\
  \ vessels (e.g., 20 ml medium in 100 ml serum bottles or 5.0 ml medium in Hungate\
  \ tubes) under a stream of H2-CO2 (80:20, v/v), seal with butyl rubber stoppers\
  \ and autoclave. Allow to stand the autoclaved medium overnight. Add per liter the\
  \ following solution from a sterile anaerobic stock (filter-sterilized and stored\
  \ under a N2 atmosphere): \nPrior to inoculation, add per liter the following solutions\
  \ aseptically and anaerobically (autoclaved and stored under a N2 atmosphere): \n\
  Comments: For strain JCM 19935, replace trimethylamine with yeast extract (final\
  \ 0.1 g/L) and pressurize to 100 kPa H2-CO2 (80:20, v/v). For strain JCM 19936,\
  \ prepare the medium without trimethylamine. Pressurize inoculated culture vessels\
  \ to 100 kPa H2-CO2 (80:20, v/v).\n\nOriginal volume: 1033 mL"
