preparation_notes: Prepare the medium anaerobically, under nitrogen, omitting the
  CaCl2, MgCl2, KNO3, tryptone, yeast extract, vitamins and sucrose. The pH should
  be 6.8. Dispense the medium into vessels suitable for anaerobic growth (Hungate
  tubes or serum bottles) under an atmosphere of nitrogen and autoclave. To the sterile,
  cooled medium add, from sterile stock solutions the CaCl2, MgCl2, KNO3, tryptone,
  yeast extract, vitamins and sucrose. The CaCl2, MgCl2, KNO3, tryptone, yeast extract,
  and sucrose stock solutions should be autoclaved, while the vitamin solution is
  sterile filtered. This strain grows anaerobically in the presence of nitrate, but
  aerobic growth has been reported provided the oxygen concentration does not exceed
  16% (v/v). Under anaerobic conditions a redox agent, such as sulphide is not required.
