preparation_notes: Dissolve ingredients (except cysteine) and sparge medium for 30
  - 45 min with 100% N2 gas to make it anoxic. Add cysteine and adjust pH to 7.2 -
  7.4, then distribute medium under 100% N2 gas atmosphere into anoxic Hungate-type
  tubes or serum vials and autoclave. Final pH of the medium should be about 7.2.
