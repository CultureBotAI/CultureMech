preparation_notes: 'Adjust pH to 7.3.

  Mix ingredients, except L-cysteine x HCl x H2O, and bring to the boil while gassing
  with N2-H2 (95:5) gas mixture. When the color turns from blue to reddish pink, add
  L-cysteine x HCl x H2O during continuous gassing and boiling. Anaerobically dispense
  the medium in tubes under a N2-H2 (95:5) atmosphere. Stopper the tubes and autoclave.


  Original volume: 1006 mL'
