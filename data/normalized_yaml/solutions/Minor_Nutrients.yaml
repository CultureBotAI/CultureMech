notes: 'Minor Nutrients solution for Snow Algae Medium and related cold-adapted algae
  culture.

  Provides comprehensive micronutrient mixture including trace metals for psychrophilic
  algae.


  Preparation: Add components to approximately 950 mL deionized water in the order

  listed while stirring continuously. Bring to 1 L total volume.


  Storage: Refrigerator temperature (4°C).


  Final stock concentrations: H3BO3 (1.01 mM), MnSO4·H2O (1.01 mM),

  ZnSO4·7H2O (0.08 mM), (NH4)6Mo7O24·4H2O (0.01 mM), Co(NO3)2·6H2O (0.04 mM),

  KBr (0.13 mM), NiSO4(NH4)SO4·6H2O (0.09 mM), VOSO4·2H2O (0.01 mM),

  Al2(SO4)3·K2SO4·24H2O (0.04 mM)


  Note: This formulation includes a broader range of trace elements including Ni,
  V, and Al

  which may be beneficial for cold-adapted algae species.

  '
