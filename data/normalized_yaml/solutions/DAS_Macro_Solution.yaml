notes: 'DAS Macro Solution for Dasycladales Seawater Medium.

  DAS = Dasycladales-specific formulation for marine algae.

  Provides macronutrients (nitrogen and phosphorus) for marine algae culture.


  Preparation: This is a composite solution made from two component stocks:

  - Component 1: 0.70 M sodium nitrate (NaNO3) stock solution

  - Component 2: 0.02 M disodium phosphate heptahydrate (Na2HPO4·7H2O) stock solution


  Autoclave both component stocks separately before preparing the DAS Macro Solution.

  Aseptically add 10 mL of NaNO3 stock + 30 mL of Na2HPO4·7H2O stock.

  Total volume: 40 mL. Swirl gently to mix.


  Usage: Add 40 mL per 3 L of medium.


  Final concentrations in medium: NaNO3 (2.3 mM), Na2HPO4·7H2O (0.2 mM)


  Storage: Refrigerator temperature (4°C).

  '
