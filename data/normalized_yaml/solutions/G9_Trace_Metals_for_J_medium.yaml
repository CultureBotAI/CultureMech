notes: 'G9 Trace Metals solution for J Medium (UTEX).

  Provides essential micronutrients for freshwater algae culture.


  Preparation: Add components to approximately 900 mL deionized water in the order

  listed while stirring continuously. Bring to 1 L total volume.


  Storage: Refrigerator temperature (4°C).


  Final stock concentrations: H3BO3 (0.053 mM), MnSO4·H2O (8.6 µM),

  ZnSO4·7H2O (1 µM), (NH4)6Mo7O24·4H2O (0.065 µM), CuSO4·5H2O (0.2 µM),

  Co(NO3)2·6H2O (0.52 µM), KI (0.06 µM)

  '
