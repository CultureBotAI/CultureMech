notes: 'Macro Component 2 for J Medium (UTEX).

  Second of two macronutrient stock solutions for J Medium.

  Provides magnesium, iron, and EDTA chelator for metal bioavailability.


  Preparation: Add components to approximately 850 mL deionized water in the order

  listed while stirring continuously. Adjust pH to 7.5 with NaOH or HCl.

  Bring to 1 L total volume.


  Storage: Refrigerator temperature (4°C).


  Final stock concentrations: Na2EDTA·2H2O (0.12 mM), MgSO4·7H2O (0.41 mM),

  MgCl2·6H2O (0.24 mM), FeCl3·6H2O (0.02 mM)


  Note: EDTA chelates iron and trace metals, improving their bioavailability and

  preventing precipitation in the alkaline pH range of the medium.

  '
