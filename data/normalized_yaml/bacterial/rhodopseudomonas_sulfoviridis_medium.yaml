preparation_steps:
- step_number: 1
  action: MIX
  description: Incubate in the light using a tungsten lamp.
- step_number: 2
  action: ADJUST_PH
  description: Adjust pH to 6.8.
- step_number: 3
  action: ADJUST_PH
  description: To medium add 0.1% sodium malate and 0.05% sodium thiosulfate (). Adjust
    pH to 6.8 and sterilize at 121°C for 15 min. The liquid medium is sterilized in
    rubber stoppered or screw-capped bottles under anaerobic conditions (Ref. 3365).
    After sterilization neutralized sterile sodium sulfide solution is added to a
    final concentration of 0.03% (see medium 27).
applications:
- Microbial cultivation
