preparation_steps:
- step_number: 1
  action: FILTER_STERILIZE
  description: 'Mix meat, water and NaOH, and bring to a boil with stirring. Cool
    to room temperature, skim fat off surface, and filter, retaining both meat particles
    and filtrate. To the filtrate add sufficient distilled water to restore volume
    to 1000 ml. To this filtrate add:'
- step_number: 2
  action: HEAT
  description: 'Boil and cool medium under 80% N2, 10% H2, 10% CO2, and add:'
- step_number: 3
  action: POUR_PLATES
  description: Adjust medium for final pH 7.0. Anaerobically dispense 7 ml into tubes
    containing meat particles (use 1 part meat to 5 parts fluid) under the same gas
    phase.
- step_number: 4
  action: STORE
  description: Store solution in brown bottle under refrigeration. Discard after one
    month.
- step_number: 5
  action: AUTOCLAVE
  description: Autoclave at 121°C for 15 min.
applications:
- Microbial cultivation
