preparation_steps:
- step_number: 1
  action: MIX
  description: Prepare the basal medium under nitrogen.
- step_number: 2
  action: AUTOCLAVE
  description: NaHCO3 solution (autoclaved in sealed, half full vessels under CO2),
    Na2S x 9H2O solution (autoclaved) and vitamin B12 solution (filter sterilised)
    is added to the autoclaved medium and the final pH adjusted to 6.6 - 7.4.
