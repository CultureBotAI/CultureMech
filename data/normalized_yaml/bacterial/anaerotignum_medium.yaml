  description: Dissolve ingredients (except bicarbonate and cysteine), adjust pH to
    7.0, then sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic. Add
    and dissolve bicarbonate and cysteine, then dispense medium under 100% N2 gas
    atmosphere into anoxic Hungate-type tubes or seruim vials and autoclave. Adjust
    pH of complete medium to 7.0 - 7.2, if necessary.
