    a filter sterilised stock solution (see below). The medium may be solidified by
    adding 15.0 g/l agar.
- step_number: 2
  action: MIX
  description: pH 3.0-4.0
- step_number: 3
  action: FILTER_STERILIZE
  description: Filter sterilise.
