preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: 'Mix components except NaHCO3 and adjust pH to 6.5. Bring to a boil
    for 5-10 sec, then, cool down under a stream of N2-CO2 (80:20, v/v) and add NaHCO3
    to the solution. Dispense the medium into culture vessels under a stream of N2-CO2
    (80:20, v/v), seal with butyl rubber stopper and autoclave. After autoclaving,
    stand the medium overnight. Aseptically and anaerobically add per liter the following
    solutions from sterile anaerobic stocks (autoclaved or *filter-sterilized):'
applications:
- Microbial cultivation
