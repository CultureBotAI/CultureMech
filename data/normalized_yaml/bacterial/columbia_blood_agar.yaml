preparation_steps:
- step_number: 1
  action: STORE
  description: Columbia agar base supplemented with 4% horse blood. Rehydrate pellets
    of freeze-dried ampoules in liquid medium 545, 215 or 1 (see below). For rehydration
    of Helicobacter and Campylobacter spp., use medium 215 (brain heart infusion).
- step_number: 2
  action: ADJUST_PH
  description: Adjust pH to 7.3.
- step_number: 3
  action: MIX
  description: The same as Caso Bouillon (Merck or Oxoid, Germany).
- step_number: 4
  action: ADJUST_PH
  description: Adjust pH to 7.0.
