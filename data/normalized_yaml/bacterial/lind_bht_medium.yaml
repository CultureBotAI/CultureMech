    (autoclaved or *filter-sterilized):'
- step_number: 2
  action: AUTOCLAVE
  description: 'Then, aseptically distribute the medium into culture vessels under
    a stream of H2-CO2 (4:1, v/v) and seal with butyl rubber stoppers. Prior to inoculation,
    add per liter the following solution from an anaerobic stock (autoclave and store
    under a N2 atmosphere):'
- step_number: 3
  action: MIX
  description: Pressurize inoculated culture vessels to 200 kPa H2-CO2 (4:1, v/v).
