preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: 'Mix components thoroughly and distribute the medium into culture vessels
    (e.g., 20 ml medium in 100 ml serum bottles or 5.0 ml medium in Hungate tubes)
    under a stream of N2-CO2 (80:20, v/v), seal with butyl rubber stoppers and autoclave.
    Allow to stand the autoclaved medium overnight. Add per liter the following solution
    from a sterile anaerobic stock (filter-sterilized and stored under a N2 atmosphere):'
- step_number: 2
  action: AUTOCLAVE
  description: 'Prior to inoculation, add per liter the following solutions aseptically
    and anaerobically (autoclaved and stored under a N2 atmosphere):'
- step_number: 3
  action: MIX
  description: 'Comment: For strain JCM 32479, replace trimethylamine with sodium
    lactate (final 0.55 g/L) and yeast extract (1.0 g/L).'
