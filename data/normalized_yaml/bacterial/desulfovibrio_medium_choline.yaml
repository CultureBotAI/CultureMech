preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Dissolve ingredients of solution A, bring to the boil, then cool to
    room temperature while sparging with 100% N2 gas. Add solutions B and C, adjust
    pH to 7.8 with NaOH, and distribute under 100% N2 gas in anoxic Hungate-type tubes.
    During distribution continuously swirl the medium to keep the grey precipitate
    suspended. Autoclave 15 min at 121°C. Check medium pH after autoclaving and adjust
    to 6.8 - 7.0, if necessary.
