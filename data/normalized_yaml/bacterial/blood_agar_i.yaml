preparation_steps:
- step_number: 1
  action: HEAT
  description: Sterilize blood agar No 2 (Oxoid). After autoclaving cool to 50°C,
    then add 40 ml/l of sterile horse blood.
- step_number: 2
  action: STORE
  description: Rehydrate pellets of freeze-dried ampoules in liquid medium 220 or
    1. For rehydration of Helicobacter and Campylobacter spp., use medium 215 (brain
    heart infusion).
- step_number: 3
  action: ADJUST_PH
  description: Adjust pH to 7.0.
- step_number: 4
  action: MIX
  description: For Bacillus strains the addition of 10.0 mg MnSO4 x H2O is recommended
    for sporulation.
- step_number: 5
  action: ADJUST_PH
  description: Adjust pH to 7.3. Medium is identical with Tryptone Soya Agar (Oxoid
    CM 131).
