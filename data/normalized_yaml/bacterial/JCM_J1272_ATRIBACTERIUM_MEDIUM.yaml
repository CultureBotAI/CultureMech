preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: 'Mix components thoroughly and adjust pH to 7.0 with NaOH. Distribute
    the medium into culture vessels (e.g., 10.0 ml in 25 ml serum bottles/Balch tubes)
    under a stream of N2, seal with butyl rubber stoppers and autoclave. After cooling,
    aseptically add per liter the following solutions (autoclaved or *filter-sterilized
    and stored anaerobically):'
- step_number: 2
  action: MIX
  description: 'Solution A:'
- step_number: 3
  action: ADJUST_PH
  description: Adjust pH to 6.0 with KOH.
- step_number: 4
  action: HEAT
  description: 'Comment: Consistent growth in serum tubes requires pretreatment of
    butyl rubber stoppers by boiling in 1% sodium sulfide solution (1 hr) followed
    by boiling in distilled H2O (1 hr, twice).'
applications:
- Microbial cultivation
