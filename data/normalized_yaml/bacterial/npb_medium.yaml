- step_number: 2
  action: HEAT
  description: Inoculate the cells to 5 ml of NPB medium, and incubate at 30°C with
    shaking (160 strokes per min.). Cell turbidity at 660 nm after 4 days of cultivation
    will be 0.4-0.5. On NPB agar plate, colony formation is observed after 3-4 days
