preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: Adjust pH to 11.0 with NaOH.
- step_number: 2
  action: MIX
  description: Fill into screw-cap tubes, leaving 60% headspace.
- step_number: 3
  action: MIX
  description: Sparge medium with 100% N2 gas mixture to make it anoxic.
- step_number: 4
  action: AUTOCLAVE
  description: Autoclave at 121 °C for 20 min.
- step_number: 5
  action: COOL
  description: 'After autoclaving, cool down and add from sterile stock solutions
    while stirring:'
- step_number: 6
  action: MIX
  description: Add 30% air.
- step_number: 7
  action: MIX
  description: 'Note: Some precipitate will form.'
applications:
- Microbial cultivation
