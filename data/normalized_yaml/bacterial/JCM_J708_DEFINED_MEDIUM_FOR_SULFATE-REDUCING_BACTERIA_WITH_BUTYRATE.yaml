preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: 'Mix ingredients and adjust pH to 7.5. Distribute the medium into culture
    vessels under a N2-CO2 (95:5, v/v) gas mixture, seal with butyl rubber stoppers
    and autoclave. Anaerobically and aseptically add per liter the following solutions
    (autoclaved or *filter-sterilized) to the medium:'
- step_number: 2
  action: ADJUST_PH
  description: Readjust pH of the medium to 7.5, if necessary.
- step_number: 3
  action: MIX
  description: For preparation of solid medium, add 15.0 g/L agar (BD-Difco).
