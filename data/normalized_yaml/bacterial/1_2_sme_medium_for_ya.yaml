preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: 'Mix components thoroughly, boil for a few seconds and cool down under
    a stream of a N2-CO2(4:1, v/v) gas mixture. After cooling, add the following components
    and adjust pH to 7.0:'
- step_number: 2
  action: AUTOCLAVE
  description: Dispense the medium into culture vessels anaerobically under the same
    gas mixture, seal with butyl rubber stoppers and autoclave.
- step_number: 3
  action: MIX
  description: '<I>Modified Wolfe''s minerals (10 x): </I>'
- step_number: 4
  action: ADJUST_PH
  description: Adjust pH to 1.0 with 1 N H2SO4.
