preparation_steps:
- step_number: 1
  action: MIX
  description: Grow prey bacteria on agar plates using the medium indicated below.
    Use one plate of a 24-hour-old culture and wash off grown cells in 5 ml sterile
    water.
- step_number: 2
  action: AUTOCLAVE
  description: Prepare HEPES buffer, adjust pH to 7.2, and autoclave. After cooling
    to room temperature add 5 ml cell suspension of the host organism to 50 ml HEPES
    buffer and mix. The prey medium suspension should contain approx. 10<sup>7</sup>
    to 10<sup>9</sup> cells. Inoculate the complete medium immediately after preparation
    and incubate the suspension with shaking until a decrease in turbidity is visible.
