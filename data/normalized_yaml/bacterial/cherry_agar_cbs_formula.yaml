preparation_steps:
- step_number: 1
  action: DISSOLVE
  description: Dissolve 20.0 g agar in 800 ml water and sterilize. Add 200 ml cherry
    extract, distribute in presterilized tubes and sterilize for 5 min at 120°C.
- step_number: 2
  action: MIX
  description: Final pH 3.8 - 4.6.
- step_number: 3
  action: MIX
  description: Add 1 l water to 200.0 g pulp of sour stone cherries.
- step_number: 4
  action: HEAT
  description: Heat to boiling and simmer gently for 2 h . Strain through cloth and
    sterilize at 110°C for 30 minutes .
