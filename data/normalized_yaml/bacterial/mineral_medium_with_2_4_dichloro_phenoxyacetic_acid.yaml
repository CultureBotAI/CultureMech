preparation_steps:
- step_number: 1
  action: MIX
  description: To medium 442 add 0.05% 2,4-D as carbon source instead of toluene,
    sterilized by filtration.
- step_number: 2
  action: ADJUST_PH
  description: Adjust pH to 7.0.
- step_number: 3
  action: MIX
  description: One drop of toluene is evaporated in a desiccator so that the atmosphere
    is saturated. 0.1% succinate may be added to the medium as additional carbon source.
