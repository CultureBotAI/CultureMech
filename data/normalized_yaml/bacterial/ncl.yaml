preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: "Make up 1 litre of PJ (Main sol. C 76) with deionized water. Bring\
    \ 500 ml of PJ (Main sol. C 76) to the boil then\r\nadd cereal leaves. Continue\
    \ to boil for 5 minutes. Allow to cool to room temperature then\r\nrestore volume\
    \ to 500 ml with deionized water. Filter through GF/C paper and decant back\r\n\
    into the rest of the PJ (Main sol. C 76). Mix well and autoclave at 15 psi for\
    \ 15 minutes."
