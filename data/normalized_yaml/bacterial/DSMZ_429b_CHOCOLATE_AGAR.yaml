preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Mix autoclaved Columbia agar base solution with 10% horse or sheep
    blood, keep at 80°C for 10 min. Mix well and pour plates after cooling to 50°C.
    Rehydrate pellets of freeze-dried ampoules in liquid medium 220, 215 or 1.
- step_number: 2
  action: ADJUST_PH
  description: Adjust pH to 7.0.
- step_number: 3
  action: MIX
  description: For Bacillus strains the addition of 10.0 mg MnSO4 x H2O is recommended
    for sporulation.
- step_number: 4
  action: ADJUST_PH
  description: Adjust pH to 7.3. Medium is identical with Tryptone Soya Agar (Oxoid
    CM 131).
