preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: 'Mix ingredients and distribute into culture vessels under a N2 atmosphere,
    seal with butyl rubber stoppers, and autoclave. Separately autoclave or *filter-sterilize
    the following solutions under a N2 atmosphere and add to the medium (per liter):'
- step_number: 2
  action: ADJUST_PH
  description: Adjust pH of the medium to 7.0 with sterile NaOH, if necessary.
- step_number: 3
  action: ADJUST_PH
  description: Dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH solution.
    Then proceed to add minerals. Adjust final pH to 7.0.
