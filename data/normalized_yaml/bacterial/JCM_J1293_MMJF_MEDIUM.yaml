preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: 'Mix components and adjust pH to 6.5. Distribute the medium into culture
    vessels under a N2-CO2 (4:1, v/v) gas mixture, seal with butyl rubber stoppers
    and autoclave. After cooling, aseptically and anaerobically add per liter the
    following solution (filter-sterilized):'
- step_number: 2
  action: MIX
  description: Check final pH of the medium to be 6.5.
- step_number: 3
  action: ADJUST_PH
  description: Dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH solution.
    Then proceed to add minerals. Adjust final pH to 7.0.
