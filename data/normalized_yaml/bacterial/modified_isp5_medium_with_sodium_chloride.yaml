preparation_steps:
- step_number: 1
  action: MIX
  description: Prepare medium 993 supplemented with NaCl (10 %). pH should be 7.2.
- step_number: 2
  action: POUR_PLATES
  description: Sterilize in flasks for pouring into Petri dishes. Seven standard 90
    mm dishes containing 25 ml per dish.
- step_number: 3
  action: HEAT
  description: The pH of trace salts solution is about 7.0-7.4. Do not adjust if it
    is within this range. Liquefy agar by steaming at 100°C for 15-20 minutes.
- step_number: 4
  action: POUR_PLATES
  description: Sterilize in flasks for pouring into Petri dishes. Seven standard 90
    mm dishes containing 25 ml per dish.
