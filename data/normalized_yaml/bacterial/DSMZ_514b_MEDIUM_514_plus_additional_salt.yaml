preparation_steps:
- step_number: 1
  action: MIX
  description: Use medium 514 to which is added NaCl at the concentration indicated
    (i.e. "514 + 6% NaCl" indicates use medium 514 to which 60 g/l NaCl has been added;
    see strain dependant modifications).
- step_number: 2
  action: MIX
  description: Final pH 7.6. The medium may be solidified by adding 15 - 20 g/l agar.
- step_number: 3
  action: HEAT
  description: Final pH should be 7.6 ± 0.2 at 25°C. If using the complete medium
    from Difco add 37.40 g to 1 litre water.
- step_number: 4
  action: MIX
  description: 'Note: M.514 refers to Bacto Marine Broth Difco 2216 (BD 279110). Other
    brands (even if they refer to Difco2216) have not been tested and might not support
    growth for some strains.'
applications:
- Microbial cultivation
