preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: 'Mix components, except methanol, and bring to a boil for 5-10 seconds.
    Cool down under a stream of N2-CO2 (80:20, v/v), add methanol to the medium and
    adjust pH to 7.0 with HCl. Dispense the medium into suitable culture vessels (e.
    g. 20 ml of the medium in 120 ml serum bottles) under the same gas mixture, seal
    with butyl rubber stoppers and autoclave. Aseptically and anaerobically add per
    liter the following solutions (autoclaved or *filter-sterilized and stored under
    an anaerobic gas atmosphere):'
- step_number: 2
  action: ADJUST_PH
  description: Dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH solution.
    Then proceed to add minerals. Adjust final pH to 7.0.
