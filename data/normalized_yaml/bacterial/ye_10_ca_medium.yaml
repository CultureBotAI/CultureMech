    \ medium 1462) to 20 ml of medium and inoculate with 1 ml of a liquid culture\
    \ of DSM 25223 or transfer some material with an inoculation loop from the lysis\
    \ zone of a double layer agar plate. Incubate with shaking (ca. 150 rpm) for approximately\
    \ 48 h."
