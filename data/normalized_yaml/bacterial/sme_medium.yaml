preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: Reduction of the medium by addition of 20 ml Na2S (2.5%); then adjust
    pH to 5.5 with sulfuric acid.
- step_number: 2
  action: MIX
  description: 'Gas phase: H2/CO2=80/20 (250 kPa).'
- step_number: 3
  action: MIX
  description: After autoclaving add 0.04% yeast extract.
- step_number: 4
  action: HEAT
  description: Incubation at 90°C for 1-2 days.
