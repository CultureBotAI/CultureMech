preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: Adjust pH to 6.0.
- step_number: 2
  action: ALIQUOT
  description: aliquot 5 mL medium into 50 mL serum bottles
- step_number: 3
  action: MIX
  description: add 10% CO2 to gasphase (air)
- step_number: 4
  action: AUTOCLAVE
  description: Autoclave at 121 °C for 15 min.
- step_number: 5
  action: MIX
  description: add vitamins solutions from 1000 x stocks
- step_number: 6
  action: DISSOLVE
  description: Dissolve the vitamins in 10mM phosphate buffer, pH7.2.
- step_number: 7
  action: FILTER_STERILIZE
  description: Titrate with NaOH until vitamins are dissolved, filter sterilize afterwards,
    and freeze in appropriate aliquots until usage.
- step_number: 8
  action: DISSOLVE
  description: Dissolve the vitamin B12 in water.
- step_number: 9
  action: FILTER_STERILIZE
  description: Titrate with HCl until vitamin B12 is dissolved, filter sterilize afterwards,
    and freeze in appropriate aliquots until usage.
- step_number: 10
  action: MIX
  description: pH 6.8
applications:
- Microbial cultivation
