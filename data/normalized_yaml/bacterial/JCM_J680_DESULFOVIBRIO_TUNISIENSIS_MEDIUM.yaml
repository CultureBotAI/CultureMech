preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: 'Mix components and adjust pH to 7.2 with 1.0 N KOH. Bring to a boil
    and cool down under a N2 gas stream. Then, distribute the medium into culture
    vessels (e.g., 5 ml of the medium in the Hungate tubes) under a N2-CO2 (4:1, v/v)
    gas mixture, seal with butyl rubber stoppers and autoclave. Aseptically and anaerobically
    add the following solutions (filter-sterilized or *autoclaved) into the medium
    (per liter):'
- step_number: 2
  action: ADJUST_PH
  description: Dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH solution.
    Then proceed to add minerals. Adjust final pH to 7.0.
