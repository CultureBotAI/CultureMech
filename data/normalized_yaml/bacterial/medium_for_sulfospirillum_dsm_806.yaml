preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: Adjust pH to 7.0. Phosphate and cysteine should be dissolved together
    in 1/10 vol. of water and sterilized separately.
- step_number: 2
  action: DISSOLVE
  description: First dissolve FeCl2 in the HCl, then dilute in water, add and dissolve
    the other salts. Finally make up to 1000.00 ml.
