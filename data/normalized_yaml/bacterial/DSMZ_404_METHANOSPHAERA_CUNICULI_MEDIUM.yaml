preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Dissolve ingredients (except bicarbonate, methanol, vitamins, cysteine
    and sulfide), then sparge medium with 80% H2 and 20% CO2 gas mixture for 30 -
    45 min to make it anoxic. Add and dissolve bicarbonate and adjust pH to 7.0, then
    distribute under 80% H2 and 20% CO2 gas atmosphere into anoxic Hungate-type tubes
    or serum vials to 30% of their volume and autoclave. After sterilization add methanol
    (50% v/v), vitamins, cysteine and sulfide from sterile anoxic stock solutions
    prepared under 100% N2 gas atmosphere. Vitamins are sterilized by filtration.
    Adjust pH of complete medium to 7.0 - 7.2.
- step_number: 2
  action: MIX
  description: After inoculation, pressurize culture bottles with sterile 80% H2 and
    20% CO2 gas mixture to 2 bar overpressure.
- step_number: 3
  action: ADJUST_PH
  description: First dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH,
    then add minerals. Adjust final to pH 7.0 with KOH.
applications:
- Microbial cultivation
