preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Prepare the medium and boil, cool under N2:CO2 (80:20 v/v). Dispense
    medium into Hungate tubes or serum bottles under N2:CO2 (80:20 v/v), autoclave.
    To the sterile medium add from sterile stock solutions 2% Na2S x 9 H2O (0.1ml/10ml),
    10% NaHCO3 (0.5ml/10ml), and 0.2% sodium dithionite (0.05ml/10ml). Final pH 7.0
- step_number: 2
  action: ADJUST_PH
  description: First dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH,
    then add minerals. Adjust final to pH 7.0 with KOH.
applications:
- Microbial cultivation
