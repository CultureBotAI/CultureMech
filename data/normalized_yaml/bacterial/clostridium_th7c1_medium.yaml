preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: 'Mix components thoroughly, adjust pH to 7.3 with KOH, distribute the
    medium into culture vessels (e.g., 5 ml of the medium in the Hungate tubes) under
    a N2-CO2 (4:1, v/v) gas mixture, seal with butyl rubber stoppers and autoclave.
    After cooling, add per liter the following solutions from anaerobic stocks (autoclaved
    or *filter-sterilized):'
- step_number: 2
  action: ADJUST_PH
  description: Dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH solution.
    Then proceed to add minerals. Adjust final pH to 7.0.
