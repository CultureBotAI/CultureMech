preparation_steps:
- step_number: 1
  action: FILTER_STERILIZE
  description: Adjust pH to 7.0. Prepare medium anaerobically and dispense into rubber-stoppered
    tubes under oxygen-free N2. Add inactivated sterile rabbit serum to give final
    concentration in each tube of 5%. Add filter-sterilized thiamine pyrophosphate
    to each tube to give a final concentration of 0.75 mg/100 ml. Subculture with
    a Pasteur pipette (20-30 drops). Gas phase for culture system should be oxygen-free
    N2 or N2-CO2 (90:10).
