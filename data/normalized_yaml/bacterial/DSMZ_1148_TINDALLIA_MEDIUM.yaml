preparation_steps:
- step_number: 1
  action: MIX
  description: Prepare the medium omitting Na2CO3, NaHCO3, Na2S x 9 H2O, and Vitamin
    solution.
- step_number: 2
  action: HEAT
  description: Boil the medium and cool under nitrogen, add Na2CO3 and NaHCO3.
- step_number: 3
  action: ADJUST_PH
  description: Adjust pH to 9.5-10.0 with 10M KOH.
- step_number: 4
  action: POUR_PLATES
  description: Dispense into tubes or bottle fitted with rubber stoppers.
- step_number: 5
  action: AUTOCLAVE
  description: Autoclave at 121 °C for 15 min.
- step_number: 6
  action: MIX
  description: Add Na2S x 9 H2O (neutralized) and Vitamin solution from sterile stock
    solutions
applications:
- Microbial cultivation
