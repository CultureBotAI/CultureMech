preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Add all products except white wine, hemin and cysteine solutions. Adjust
    pH to 6.5 and autoclave for 15 minutes. Cool to 50°C and add aseptically white
    wine, hemin and cysteine solutions.
- step_number: 2
  action: AUTOCLAVE
  description: Dissolve 50 mg hemin in 1 ml 1N NaOH; make to 100 ml with distilled
    water. Autoclave at 121°C for 15 min.
- step_number: 3
  action: FILTER_STERILIZE
  description: Filter sterilize.
