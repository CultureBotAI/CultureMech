preparation_steps:
- step_number: 1
  action: FILTER_STERILIZE
  description: Add 0.45 ml Sol. B to 10 ml Sol. A. Inoculate and pressurize the tubes
    with H2 to 0.5 bar.
- step_number: 2
  action: AUTOCLAVE
  description: Boil for 5 min, cool to 50°C while gassing with 80% N2 + 20% CO2. Distribute
    to anaerobic tubes under the same atmosphere and autoclave.
- step_number: 3
  action: MIX
  description: Sterilize by filtration, add 20 ml rabbit serum, gas with 80% N2 +
    20% CO2.
applications:
- Microbial cultivation
