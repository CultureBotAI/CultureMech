preparation_steps:
- step_number: 1
  action: MIX
  description: H3P is a heterotrophic medium for growth, purity checking and isolation
    of a broad spectrum of aerobic bacteria (Ref. 3367).
- step_number: 2
  action: AUTOCLAVE
  description: Solutions A, B, C and D are autoclaved separately for 15 min at 121°C,
    cooled down to 50°C and then mixed aseptically with filter-sterilized solution
    E (at 50°C) and 5.0 ml of standard vitamin solution. The final pH of this medium
    should be 6.8 without adjustment.
- step_number: 3
  action: MIX
  description: pH 7.0
- step_number: 4
  action: MIX
  description: pH 7.0
- step_number: 5
  action: FILTER_STERILIZE
  description: filter-sterilized
- step_number: 6
  action: FILTER_STERILIZE
  description: Filter sterilize (0.2 µm pore-size) and store at 4°C.
applications:
- Microbial cultivation
