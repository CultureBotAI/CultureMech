preparation_steps:
- step_number: 1
  action: FILTER_STERILIZE
  description: Combine the warm (37°C) solutions A, B, C, D, and filter-sterilize
    the warm medium. Solution B can also be added after filtration.
- step_number: 2
  action: HEAT
  description: Alternatively, buy supplemented or un-supplemented BSK-H medium (Fa.
    Bio&SELL or Sigma) and supplement the medium according to manufacturer's advice.
    Sterilize the mixed and warm (37°C) medium by filtration.
- step_number: 3
  action: FILTER_STERILIZE
  description: Stir slowly at 4 - 10°C for 3 hours, adjust pH to 7.6 with 5 M NaOH.
    Filter sterilize.
- step_number: 4
  action: AUTOCLAVE
  description: Dissolve 14.0 g gelatine in 200 ml bidest. water, autoclave 15 minutes
    at 115°C.
- step_number: 5
  action: DISSOLVE
  description: 'Dissolve 50.05 g bovine serum albumine, fract. V (important: Sigma
    No A9647) in 143 ml bidest. water, or use BSA-solution Sigma A7409.'
applications:
- Microbial cultivation
