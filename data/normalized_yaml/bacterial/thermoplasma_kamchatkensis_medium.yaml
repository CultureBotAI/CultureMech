preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Mix components except sulfur, yeast extract and sucrose, adjust pH
    to 2.5 with 10 N H2SO4 and autoclave. Separately autoclave yeast extract and sucrose
    and add to the medium. Steam sulfur for 3 hr on each of 3 successive days. Aseptically
    distribute the medium into culture vessels (e.g., 10 ml in Balch tubes) containing
    appropriate amount of sulfur, replace gas phase with a N2-CO2 (4:1, v/v) gas mixture
    and seal with butyl rubber stoppers.
