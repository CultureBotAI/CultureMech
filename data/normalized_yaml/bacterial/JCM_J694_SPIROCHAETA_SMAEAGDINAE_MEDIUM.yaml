- step_number: 1
  action: AUTOCLAVE
  description: 'Separately autoclave Solutions A and B under a N2-CO2 (4:1, v/v) gas
    mixture. After cooling, combine both solutions under the same gas mixture and
    add the following solutions from sterile anaerobic stocks (autoclaved or *filter-sterilized):'
- step_number: 2
  action: MIX
  description: Check the final pH of the medium to be 7.0.
- step_number: 3
  action: ADJUST_PH
  description: Dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH solution.
    Then proceed to add minerals. Adjust final pH to 7.0.
