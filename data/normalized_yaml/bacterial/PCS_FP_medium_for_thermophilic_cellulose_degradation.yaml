notes: 'Vessel type: test tubes with loose caps


  PCS basal medium (peptone-cellulose-salt) supplemented with filter paper as cellulose
  substrate and calcium carbonate buffer. Medium prepared with loose caps to allow
  oxygen entry while maintaining high humidity. Static (non-shaking) incubation. The
  aerobic members (Pseudoxanthomonas, Brevibacillus, Bordetella) consume oxygen to
  create localized anaerobic microenvironments for the cellulolytic Clostridium species.
  Inoculum volume: 40 microliters per 4 mL medium. Subculture protocol: 40-700 microliters
  transferred to fresh medium after 6 days.

  '
