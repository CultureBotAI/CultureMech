    supports: SUPPORT
    snippet: A cellulose-degrading defined mixed culture (designated SF356) consisting
      of five bacterial strains (Clostridium straminisolvens CSK1, Clostridium sp.
      strain FG4, Pseudoxanthomonas sp. strain M1-3, Brevibacillus sp. strain M1-5,
      and Bordetella sp. strain M1-6) exhibited both functional and structural stability
    explanation: Establishes SF356 as a defined cellulose-degrading community (detailed
      medium composition in methods section includes PCS-FP medium with filter paper,
      yeast extract, peptone, NaCl, CaCO3 at pH 8.0, 50°C)
  - reference: PMID:15545431
    supports: SUPPORT
    snippet: The optimum temperature and initial pH for its growth and cellulose degradation
      are 50-55 degrees C and pH 7.5
    explanation: Establishes optimal growth parameters for C. straminisolvens CSK1,
      the primary cellulolytic member
