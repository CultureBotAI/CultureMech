preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: Adjust pH to 7.2.
- step_number: 2
  action: FILTER_STERILIZE
  description: Place a strip of sterile cellulose filter paper onto an agar plate.
    Alternatively, place a strip of sterile cellulose filter paper into a culture
    tube containing 5 ml of medium, thereby leaving 1 - 2 cm of the strip outside
    of the medium. Inoculate the strain onto the cellulose filter paper. The strain
    will grow on the cellulose paper only.
