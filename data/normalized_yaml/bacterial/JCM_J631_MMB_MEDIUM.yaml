preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: Adjust pH to 7.0 - 7.5.
- step_number: 2
  action: MIX
  description: For preparation of solid medium, add 15.0 g/L agar.
- step_number: 3
  action: ADJUST_PH
  description: Dissolve and neutralized nitrilotriacetic acid in 500.0 ml distilled
    water with the addition of KOH. Add the remaining chemicals in order listed. Adjust
    pH to 6.8 and bring volume to 1.0 L with distilled water.
