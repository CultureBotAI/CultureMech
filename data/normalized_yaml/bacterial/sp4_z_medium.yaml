preparation_steps:
- step_number: 1
  action: MIX
  description: The difference between this medium and "normal" SP4 medium (Medium
    1076) is that the yeast extract was left out and DNA was added instead. Since
    most mycoplasmas use either glucose or arginine as their energy source one is
    added to the media. Do not combine both in one medium, arginine can inhibit the
    growth of some glucose utilizers (unknown reason).
- step_number: 2
  action: AUTOCLAVE
  description: Adjust pH to 7.4; autoclave at 121°C for 15 minutes.
- step_number: 3
  action: MIX
  description: 'Add aseptically:'
- step_number: 4
  action: MIX
  description: 'As energy source add either:'
- step_number: 5
  action: MIX
  description: 'For Ureaplasma add instead of Glucose or Arginine:'
- step_number: 6
  action: HEAT
  description: For agar plates use only 126 ml of distilled water and add 2 g of agar.
    Medium containing agar should be placed at 55°C before adding supplements.
