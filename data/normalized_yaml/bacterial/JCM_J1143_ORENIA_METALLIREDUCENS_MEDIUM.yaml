preparation_steps:
- step_number: 1
  action: HEAT
  description: 'Mix components thoroughly, bring to a boil and cool down under a N2-CO2
    (80:20, v/v) gas mixture. When the medium is cooled to around 50C, add the following
    components:'
- step_number: 2
  action: AUTOCLAVE
  description: 'Continue flushing with the gas mixture until the chemicals are dissolved
    completely. Distribute the medium into culture vessels under the same gas mixture,
    seal with butyl rubber stoppers and autoclave. After cooling, add per liter the
    following solutions (autoclave and stored under a N2 atmosphere):'
