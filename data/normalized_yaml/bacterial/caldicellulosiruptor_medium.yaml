preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Dissolve ingredients except cysteine and cellobiose. Sparge medium
    with 100% N2 gas for 30 - 45 min to make it anoxic, then add cysteine and adjust
    pH to 7.2. Distribute medium under same gas atmosphere into anoxic Hungate-type
    tubes or serum vials and autoclave. Add cellobiose after autoclaving from an anoxic
    stock solution prepared under 100% N2 gas atmosphere and sterilized by filtration.
    Adjust pH of the complete medium to 7.2, if necessary.
- step_number: 2
  action: DISSOLVE
  description: First dissolve FeCl2 in the HCl, then dilute in water, add and dissolve
    the other salts. Finally make up to 1000.00 ml.
applications:
- Microbial cultivation
