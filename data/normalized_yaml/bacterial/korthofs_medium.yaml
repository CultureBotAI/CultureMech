preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Autoclave distilled water. After autoclaving, allow to cool, aseptically
    add 10 x Korthof's basal medium and heat-inactivated rabbit serum that has been
    filter-sterilized ahead of time.
- step_number: 2
  action: AUTOCLAVE
  description: Mix ingredients except CaCl2 and autoclave. Dissolve CaCl2 in 50 ml
    distilled water and filter-sterilize. After autoclaving, allow to cool, add sterile
    CaCl2 solution to the medium.
