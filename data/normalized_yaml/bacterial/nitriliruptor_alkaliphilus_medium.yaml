preparation_steps:
- step_number: 1
  action: DISSOLVE
  description: Dissolve in this order in 1L preferably MilliQ water. Sterilize in
    closed bottles at 120°C 20 min. After cooling, usually there will be some precipitate
    on the bottom. That´s why it is handy to have another empty 1L bottle to decant
    clear top solution into it.
- step_number: 2
  action: MIX
  description: 'After sterilization add from concentrated steril stock solutions:'
- step_number: 3
  action: AUTOCLAVE
  description: Trace metals, MgSO4 x 7 H2O and Na2S2O3 x 5 H2O solution you can autoclave
- step_number: 4
  action: FILTER_STERILIZE
  description: Vitamin B12 and Isobutyramide solution you have to filter-sterilize
- step_number: 5
  action: FILTER_STERILIZE
  description: 50% solution of Na2S2O3 (Fluka), pH 9-10 >> filter sterilize or 110°C
    20 min
- step_number: 6
  action: MIX
  description: pH final 3-4 by HCl
applications:
