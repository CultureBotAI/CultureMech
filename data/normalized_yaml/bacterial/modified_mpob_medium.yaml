preparation_steps:
- step_number: 1
  action: FILTER_STERILIZE
  description: Prepare the medium anaerobically under a N2-CO2 (4:1, v/v) gas mixture.
    Mix ingredients except Trace vitamins. After autoclaving, anaerobically and aseptically
    add the filter-sterilized Trace vitamins to the medium. Check final pH to be 7.0
    - 7.2. Pressurize the inoculated bottles to 70 kPa N2-CO2 (4:1, v/v).
- step_number: 2
  action: DISSOLVE
  description: Dissolve FeCl2 x 4H2O first in HCl. Then dilute in distilled water
    and add the remaining salts.
