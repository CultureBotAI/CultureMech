preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Adjust pH to 7.2 with NaOH. Autoclave at 121°C for 15 min. Autoclave
    the phosphate buffer separately and then add to the medium.
- step_number: 2
  action: ADJUST_PH
  description: Adjust pH to 7.2
- step_number: 3
  action: ADJUST_PH
  description: Dissolve the nitrilotriacetic acid, adjust the pH to 7.0 with KOH (about
    8 - 9 g). Dissolve other salts separately, combine and adjust the pH to 6.8 with
    NaOH or H2SO4.
