    pH to 7.0 and autoclave. For preparation of solid medium, add 20.0 g/L Bacto agar
    (BD-Difco). Separately autoclave the following solution:'
- step_number: 2
  action: MIX
  description: After autoclaving, add the solution to the medium.
- step_number: 3
  action: ADJUST_PH
  description: Adjust pH to 3.6.
