preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Dissolve ingredients except carbonate, vitamins, cysteine and sulfide,
    then sparge medium with 100% N2 gas for 30 - 45 min to make it anoxic. Dispense
    medium under the same gas atmosphere into anoxic Hungate-type tubes or serum vials
    and autoclave. Add vitamins (sterilized by filtration), cysteine and sulfide from
    sterile anoxic stock solutions prepared under 100% N2 gas and carbonate from a
    sterile anoxic stock solution prepared under 80% N2 and 20% CO2 gas mixture. Prior
    to use adjust pH of complete medium to 8.0 - 8.5.
- step_number: 2
  action: ADJUST_PH
  description: First dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH,
    then add minerals. Adjust final to pH 7.0 with KOH.
applications:
- Microbial cultivation
