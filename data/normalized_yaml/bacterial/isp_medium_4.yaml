preparation_steps:
- step_number: 1
  action: HEAT
  description: The pH should be between 7.0 and 7.4. Do not adjust if it is within
    this range. Mix solutions I and II together. Add 20.0 g agar. Liquify agar by
    steaming at 100°C for 10 to 20 min.
- step_number: 2
  action: MIX
  description: Difco soluble starch, 10.0 g. Make a paste of the starch with a small
    amount of cold distilled water and bring to a volume of 500 ml.
