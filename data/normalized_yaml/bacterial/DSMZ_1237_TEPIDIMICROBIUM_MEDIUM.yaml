preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Dissolve ingredients (except ferrous chloride, carbonate, glucose,
    vitamins, cysteine and sulfide), adjust pH to 7.5 with NaOH and sparge medium
    with 100% N2 gas for 30 - 45 min to make it anoxic. Dispense medium under 100%
    N2 gas atmosphere into anoxic Hungate-type tubes or serum vials and autoclave.
    Add glucose, vitamins, ferrous chloride, cysteine and sulfide form sterile anoxic
    stock solutions prepared under 100% N2 gas and carbonate from a sterile stock
    solution prepared under 80% N2 and 20% CO2 gas mixture. Solutions of ferrous chloride
    and vitamins should be sterilized by filtration. Adjust pH of the complete medium
    to 8.5, if necessary.
- step_number: 2
  action: ADJUST_PH
  description: First dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH,
    then add minerals. Adjust final to pH 7.0 with KOH.
applications:
- Microbial cultivation
