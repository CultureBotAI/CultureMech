preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Dissolve ingredients except cysteine, thiosulfate and glucose. Sparge
    medium with 100% N2 gas for 30 - 45 min to make it anoxic, then add cysteine and
    adjust pH to 6.8 - 7.2. Dispense medium under 100% N2 gas atmosphere into anoxic
    Hungate-type tubes or serum vials and autoclave. Add thiosulfate and glucose from
    anoxic stock solutions prepared under 100% N2 gas and sterilized by filtration.
    Adjust pH of complete medium to 7.0, if necessary.
