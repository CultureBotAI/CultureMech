preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: Adjust pH to 7.2.
- step_number: 2
  action: FILTER_STERILIZE
  description: To prepare liver extract, put 10 g liver powder in 170 ml water, keep
    at 50 to 60C for 1 hr, boil for 5 min, adjust pH to 7.2 and filter.
- step_number: 3
  action: ADJUST_PH
  description: Mix ingredients except horse blood and adjust pH to 7.2. After autoclaving,
    cool to 50C, and aseptically add 50.0 ml of horse blood.
- step_number: 4
  action: MIX
  description: 'Comment: Commercial BL agar (Nissui) is also available.'
