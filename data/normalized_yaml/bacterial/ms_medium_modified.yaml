preparation_steps:
- step_number: 1
  action: MIX
  description: Each of the solutions (A, B, and C) is prepared with anaerobic double
    distilled water.
- step_number: 2
  action: POUR_PLATES
  description: "The medium is prepared anaerobically under nitrogen gas and dispensed\
    \ into Hungate tubes or serum bottle sealed with rubber septa. The medium to gas\
    \ phase ratio should be about 1:10 (v:v). \r\nSterilise the medium by heating\
    \ at 100° C for 3 hours on three consecutive days (e.g., in a water bath)."
- step_number: 3
  action: MIX
  description: Add  4% O2 for microaerophilic conditions.
- step_number: 4
  action: MIX
  description: 100 mM NaOH saturated with CO2
- step_number: 5
  action: MIX
  description: Adjust to pH 4 with HCl
- step_number: 6
  action: ADJUST_PH
  description: Adjust pH to 3.0 with HCl
