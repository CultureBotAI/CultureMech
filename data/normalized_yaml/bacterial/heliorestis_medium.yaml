preparation_steps:
- step_number: 1
  action: HEAT
  description: Boil the medium for few minutes. Fill in tubes with rubber stoppers
    under nitrogen gas. Sterilize at 121°C for 15 min.
- step_number: 2
  action: FILTER_STERILIZE
  description: Prepare NaHCO3, Na2CO3 and sulfide as separate sterile stock solution,
    Vitamin B12 and Biotin as filter-sterilized stock solution and add to sterile
    medium after autoclaving. Adjust pH to 9 - 9.5 .
- step_number: 3
  action: MIX
  description: To control anoxic conditions, add resazurin to a final concentration
    of 0.002%.
applications:
- Microbial cultivation
