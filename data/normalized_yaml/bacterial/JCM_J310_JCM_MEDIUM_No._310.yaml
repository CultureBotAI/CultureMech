    solution and MgCl2 x 6H2O solution. Aseptically add KSCN solution, Trace elements
    solution and MgCl2 x 6H2O solution to the medium.
- step_number: 2
  action: ADJUST_PH
  description: Adjust pH to 3 with HCl.
