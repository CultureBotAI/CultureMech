preparation_steps:
- step_number: 1
  action: HEAT
  description: After autoclaving, cool to 50-60°C and combine the solution by pouring
    solution 2 to solution 1.
- step_number: 2
  action: MIX
  description: Adjust to pH 5.5 with NaOH/KOH solution (see below).
- step_number: 3
  action: DISSOLVE
  description: First dissolve FeCl2 in the HCl, then dilute in water, add and dissolve
    the other salts. Finally make up to 1000.00 ml.
