  description: Adjust pH to 5.6.
- step_number: 2
  action: AUTOCLAVE
  description: Wash potatoes with tap water, peel and cut into 1 cm cubes. Rinse with
    tap water quickly and boil 200 g of potato cubes with 1.0 L of distilled water
    for 20 min. Mash and squeeze through a muslin bag. Add agar and boil until melting.
    Add sucrose and mix thoroughly. Make up to 1.0 L, adjust pH and autoclave for
    sterilization.
