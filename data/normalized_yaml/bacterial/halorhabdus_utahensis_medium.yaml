preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: Prepare the medium, and adjust the pH to 7.6 with 5M NaOH.
- step_number: 2
  action: AUTOCLAVE
  description: Autoclave and when the medium has cooled add 2.5 ml of the phosphate
    solution, 0.5 ml of the calcium chloride solution, and 0.25 ml of the Fe/Mn solution.
    This strain will not grow in normal media for halobacteria, such as DSM medium
    372!
- step_number: 3
  action: MIX
  description: Prepare and sterilise separately
- step_number: 4
  action: MIX
  description: Prepare and sterilise separately
- step_number: 5
  action: MIX
  description: Prepare and sterilise separately
