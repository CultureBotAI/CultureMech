preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Mix ingredients except cysteine x HCl x H2O, NaHCO3 and Trace vitamins,
    and autoclave under a N2-CO2 (80:20) atmosphere. Filter-sterilize NaHCO3 as a
    10% solution and Trace vitamins while gassing with CO2. Separately autoclave L-cysteine
    x HCl x H2O as a 5% solution under a CO2 atmosphere. Aseptically and anaerobically
    add NaHCO3 and Trace vitamins to the medium under a N2-CO2 (80:20) atmosphere.
    Prior to inoculation, add the sterile L-cysteine x HCl x H2O solution.
- step_number: 2
  action: ADJUST_PH
  description: Adjust pH to 7.0 with 1 N KOH.
applications:
- Microbial cultivation
