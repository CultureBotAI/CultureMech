preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Adjust pH to 2.5 with H2SO4 and autoclave.
- step_number: 2
  action: FILTER_STERILIZE
  description: Dissolve in final 100 ml of 0.2 N H2SO4 and filter-sterilize.
- step_number: 3
  action: AUTOCLAVE
  description: To complete the medium, add 70 ml Solution B to 1.0 L Solution A. For
    solid medium, prepare double-strength Solution A and autoclave. Separately autoclave
    an equal amount of 1.4% Gerlite (gellan gum) solution. After autoclaving, keep
    the two solutions at 70C and mix thoroughly. Then, add filter-sterilized Solution
    B (70 ml/L) and pour into petri dishes.
