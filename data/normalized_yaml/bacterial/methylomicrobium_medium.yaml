preparation_steps:
- step_number: 1
  action: MIX
  description: 'Final pH of the medium: 8.5-9.0'
- step_number: 2
  action: AUTOCLAVE
  description: Dispense the medium into the culture vessels. For small volumes serum
    bottles or Hungate tubes may be used. The gas phase to liquid ratio should be
    about 10:1. Use a gas phase containing air, 50% methane and autoclave at 121°C
    for 15 minutes. When the growth medium is cool the NaHCO3, the Na2CO3 and phosphate
    buffer are added.
- step_number: 3
  action: MIX
  description: Liquid cultures should be grown with shaking.
- step_number: 4
  action: MIX
  description: 'To the sterile medium add from sterile stock solutions:'
applications:
- Microbial cultivation
