notes: '

  Nitrogen-free medium developed for selective isolation of Leptospirillum ferrodiazotrophum
  (Leptospirillum group III), the nitrogen-fixing member of Richmond Mine biofilm.
  Richmond Mine AMD biofilm sample naturally abundant in group III was homogenized,
  filtered, and serially diluted into nitrogen-free liquid medium. Culture grew autotrophically
  to maximum density ~10^6 cells/ml, oxidizing ferrous iron as sole energy source.
  Ammonium sulfate deliberately omitted to select for diazotrophic organisms capable
  of nitrogen fixation. This selective isolation strategy was guided by metagenomic
  data showing a single nif operon on a Leptospirillum group III genome fragment.
  Axenic culture confirmed by 16S rRNA-ITS clone library analysis. Note: This medium
  supports L. ferrodiazotrophum but not the complete biofilm community.'
