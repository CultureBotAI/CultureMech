preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Mix ingredients except Na2S2O3 x 5H2O, yeast extract, Trace vitamins
    and 2-mercaptoethanol, and adjust pH to 6.0. Bring to a boil for 5-10 sec, then,
    cool down under a stream of H2-CO2 (80:20, v/v). Dispense the medium into suitable
    culture vessels under a stream of H2-CO2 (80:20, v/v), seal with butyl rubber
    stoppers and autoclave 115C for 40 min. Separately autoclave Na2S2O3 x 5H2O and
    2-mercaptoethanol as 50 g/L solutions and yeast extract as 100 g/L solution under
    a N2 atmosphere. Filter-sterilize Trace vitamins and store under a N2 atmosphere.
    Prior to inoculation, aseptically and anaerobically add the Na2S2O3 x 5H2O, yeast
    extract, Trace vitamins and 2-mercaptoethanol solutions to the medium. Pressurize
    the inoculated bottles to 200 kPa H2-CO2 (80:20, v/v).
- step_number: 2
  action: ADJUST_PH
  description: Dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH. Then
    proceed to add minerals. Adjust final pH to 7.0.
- step_number: 3
  action: DISSOLVE
  description: Dissolve 0.2 g of Fe(NH4)2(SO4)2 x 6H2O in 5 ml of distilled water
    containing 2 drops of concentrated HCl. When the Fe(NH4)2(SO4)2 x 6H2O crystal
    have dissolved, bring volume up to 100 ml.
