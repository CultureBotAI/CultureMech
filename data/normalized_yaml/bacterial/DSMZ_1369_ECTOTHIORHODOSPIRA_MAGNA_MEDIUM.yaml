preparation_steps:
- step_number: 1
  action: MIX
  description: pH 9.0-9.5
- step_number: 2
  action: MIX
  description: Prepare the medium without the NaHCO3, Na2S x 9 H2O, Na2CO3 and vitamin
    B12, under a nitrogen atmosphere.
- step_number: 3
  action: AUTOCLAVE
  description: Autoclave and add the vitamin B12 from a filter-sterilised stock solution
    and the NaHCO3 (autoclaved in sealed, half full vessels), Na2S x 9 H2O, Na2CO3
    from sterile stock solutions. The final pH of the medium should be 9.0-9.5.
- step_number: 4
  action: MIX
  description: pH 3.0-4.0
applications:
- Microbial cultivation
