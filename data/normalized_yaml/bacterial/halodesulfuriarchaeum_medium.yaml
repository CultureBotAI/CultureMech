preparation_steps:
- step_number: 1
  action: POUR_PLATES
  description: 'Prepare the liquid medium. Dispense the medium into Hungate tubes
    or serum bottles under gassing with N2. Steam medium for 3h on each of 3 successive
    days. Before inoculation add from sterile stock solutions:'
- step_number: 2
  action: ADJUST_PH
  description: Adjust pH to 3.0-4.0 with HCl.
- step_number: 3
  action: AUTOCLAVE
  description: Autoclave at 121 °C for 15 min.
- step_number: 4
  action: AUTOCLAVE
  description: 'Note: autoclave in closed bottles'
- step_number: 5
  action: MIX
  description: '1: acidic solution (HCl, pH3; 100ml)'
- step_number: 6
  action: MIX
  description: '2: basic solution (100ml 0.1N NaOH)'
- step_number: 7
  action: MIX
  description: '3: Neutral solution in 100 ml demi water'
- step_number: 8
  action: MIX
  description: '4: neutral solution in 100 ml demi water'
- step_number: 9
  action: MIX
  description: Sterilize by filtration.
- step_number: 10
  action: MIX
  description: Mix 1:1:1:1 just after addition or add separatlely, each 1ml/L.
applications:
- Microbial cultivation
