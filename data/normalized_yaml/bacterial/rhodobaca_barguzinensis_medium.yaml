preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: Adjust pH to 9.0-9.5
- step_number: 2
  action: AUTOCLAVE
  description: Prepare and boil the medium in the absence of Na2S2O3 x 5 H2O, NaHCO3,
    Vitamin B12, MgCl2 x 6 H2O. Cool under a stream of nitrogen and add the remaining
    components, except vitamin B12 and Na2S2O3 x 5 H2O. Dispense into tubes or bottle
    fitted with rubber stoppers and autoclave. Add the vitamin B12 (filter sterilized)
    and Na2S2O3 x 5 H2O from sterile stock solutions.
applications:
- Microbial cultivation
