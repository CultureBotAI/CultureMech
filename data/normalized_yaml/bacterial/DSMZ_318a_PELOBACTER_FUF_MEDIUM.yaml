preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Dissolve ingredients except vitamins, furoic acid, cysteine, and sulfide,
    and adjust the pH of the solution to 7.0. Sparge medium with 100% N2 gas for 30
    - 45 min to make it anoxic. Dispense medium under the same gas atmosphere into
    anoxic Hungate-type tubes or serum vials and autoclave. Add furoic acid (stock
    solution neutralized with NaOH), cysteine, and sulfide from sterile anoxic stock
    solutions prepared under 100% N2 gas. Before use, adjust the pH of the complete
    medium to 7.0 - 7.2, if necessary.
- step_number: 2
  action: ADJUST_PH
  description: First dissolve NTA in 200 ml of distilled water and adjust pH to 6.5
    with KOH, then dissolve mineral salts. Finally adjust pH to 6.5 with KOH and make
    up to 1000.00 ml.
applications:
