preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Mix ingredients except CaCl2 x 2H2O, MgCl2 x 6H2O, sulfur and Na2S
    x 9H2O, adjust pH to 6.5 and autoclave. Separately autoclave CaCl2 x 2H2O and
    MgCl2 x 6H2O and add to the medium. Steam sulfur for 3 hr on each of 3 successive
    days. Autoclave neutralized 5% Na2S x 9H2O under a N2 atmosphere. Dispense the
    medium into culture vessels containing sulfur under a N2 atmosphere, and seal
    with butyl rubber stoppers. Prior to inoculation, add the sterile Na2S x 9H2O
    solution to the medium and readjust pH, if necessary.
- step_number: 2
  action: ADJUST_PH
  description: Dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH solution.
    Then proceed to add minerals. Adjust final pH to 7.0.
applications:
- Microbial cultivation
