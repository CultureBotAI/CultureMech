preparation_steps:
- step_number: 1
  action: FILTER_STERILIZE
  description: 'Filter-sterilize and add after autoclaving:'
- step_number: 2
  action: FILTER_STERILIZE
  description: The pH of the medium was adjusted to 9.5 by addition of NaOH and then
    sterilized by autoclaving. Before inoculating medium RV5, 0.1% (w/v) NaHCO3 was
    added to tubes, bottles, or molten media from a 5% (w/v) filter-sterilized stock
    solution. For routine culture, medium RV5 supplemented with 0.05% (w/v) Difco
    yeast extract was used.
