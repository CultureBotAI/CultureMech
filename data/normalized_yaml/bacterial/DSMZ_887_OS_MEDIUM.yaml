preparation_steps:
- step_number: 1
  action: MIX
  description: Sparge medium with 100% N2 gas mixture for 30 min to make anoxic.
- step_number: 2
  action: ADJUST_PH
  description: Adjust pH to 7.0 with H2SO4.
- step_number: 3
  action: MIX
  description: Fill 10 ml medium into 100 ml Serum bottles under a stream of H2/CO2
    gas and seal with a rubber stopper.
- step_number: 4
  action: AUTOCLAVE
  description: Autoclave at 121 °C for 20 min.
- step_number: 5
  action: MIX
  description: After autoclaving add the following (e.g., from sterile stock solutions)
- step_number: 6
  action: MIX
  description: Adjust the gas atmosphere strain specifically.
- step_number: 7
  action: ADJUST_PH
  description: First dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH,
    then add minerals. Adjust final to pH 7.0 with KOH.
applications:
