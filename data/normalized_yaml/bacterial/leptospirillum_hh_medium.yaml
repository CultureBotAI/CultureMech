    A and B and add trace elements solution. The final pH of the medium should be
    2.3.
- step_number: 2
  action: MIX
  description: 'Note: At the beginning of growth incubate statically without shaking.'
- step_number: 3
  action: ADJUST_PH
  description: Adjust pH to 2.3 with 10 N H2SO4.
- step_number: 4
  action: MIX
  description: The pH of this solution should be 1.2.
