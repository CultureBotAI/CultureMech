preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Dissolve ingredients (except bicarbonate, isopropyl alcohol, vitamins
    and sulfide), then sparge medium with 80% N2 and 20% CO2 gas mixture for 30 -
    45 min to make it anoxic. Add and dissolve bicarbonate and adjust pH to 7.0, then
    dispense under same gas atmosphere into anoxic Hungate-type tubes or serum vials
    and autoclave. After sterilization add isopropyl alcohol and cysteine from sterile
    anoxic stock solutions autoclaved under 100% N2 gas atmosphere. Vitamins are prepared
    under 100% N2 gas atmosphere and sterilized by filtration. Adjust pH of complete
    medium to 6.8 - 7.0, if necessary.
- step_number: 2
  action: ADJUST_PH
  description: First dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH,
    then add minerals. Adjust final to pH 7.0 with KOH.
applications:
- Microbial cultivation
