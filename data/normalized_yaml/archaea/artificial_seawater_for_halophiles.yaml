preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Add components except NaHCO3 and sodium pyruvate to distilled water
    and bring volume to 1.0 L. Adjust pH to 7.4 with 1 M Tris base and autoclave.
    Filter-sterilize 8% (w/v) NaHCO3 and 25% (w/v) sodium pyruvate solutions and add
    to the medium aseptically.
