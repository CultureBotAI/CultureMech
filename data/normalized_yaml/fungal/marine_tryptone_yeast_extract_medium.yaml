preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: 'Mix components thoroughly and adjust pH to 7.0. Bring to a boil and
    cool down under a N2 gas atmosphere. Distribute the medium in culture vessels
    (e.g., 10 ml in Balch tubes) under N2, seal with butyl rubber stoppers and autoclave.
    After cooling, aseptically and anaerobically add per liter the following solutions
    (autoclaved and stored under a N2 atmosphere):'
- step_number: 2
  action: AUTOCLAVE
  description: 'Comment: For strains JCM 32481, JCM 32483, JCM 32614 and JCM 32615,
    add separately autoclaved 1.0 M sodium pyruvate solution to the medium (20.0 ml
    per liter) instead of 0.2 M cellobiose solution.'
