notes: 'Headspace gas: N2/CO2 (80:20)

  Vessel type: Anaerobic pressure tubes or serum bottles (10 mL cultures); 160 mL
  serum bottles with 50 mL medium for larger cultures


  Modified freshwater medium boiled to reduce oxygen solubility, then cooled under
  N2/CO2 (80:20) gas mixture. Ethanol (20 mM) and other additives added from anaerobic
  sterile stocks: 1 mM cysteine and 0.5 mM Na2S·9H2O as reducing agents. Bicarbonate/CO2
  serves as sole electron acceptor. Vitamins included per standard formulation. Cultures
  grown in 10 mL anaerobic pressure tubes or serum bottles; larger studies used 50
  mL medium in 160 mL serum bottles. Sampling performed with N2/CO2 (80:20) degassed
  hypodermic syringes. Digesters operated at 37°C mesophilic conditions.'
