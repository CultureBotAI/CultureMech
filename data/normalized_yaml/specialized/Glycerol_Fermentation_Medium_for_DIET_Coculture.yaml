notes: 'Headspace gas: N2 (>99.995%)

  Vessel type: 100 mL serum bottles with 50 mL working volume

  Inoculum source: C. pasteurianum full grown pre-culture (1/50 dilution) and concentrated
  G. sulfurreducens suspension


  Medium supplemented with 10 mL vitamin solution (DSMZ medium 141), 10 mL trace element
  solution (DSMZ medium 141), and 0.5 mL trace element solution SL-10 (DSMZ medium
  320) per liter. Cultures maintained at 35°C with constant agitation under strict
  anaerobic conditions using Hungate technique. Physical contact between bacteria
  enables electron exchange either directly via interspecies wiring or indirectly
  using soluble electron mediators like L-cysteine present in medium.'
