notes: 'Vessel type: growth pouches or square plates

  Light regime: 16h light / 8h dark

  Light intensity: 100


  Modified Broughton and Dilworth nitrogen-free plant nutrient medium for studying
  symbiotic nitrogen fixation and nodulation. Gnotobiotic system allowing visualization
  of root colonization and nodule formation by Mesorhizobium strains. Medium supports
  both nitrogen-fixing symbionts and non-nodulating commensal bacteria.

