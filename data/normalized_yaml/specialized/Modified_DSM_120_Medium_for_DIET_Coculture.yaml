notes: "Headspace gas: N2/CO2 (80:20)\nVessel type: Anaerobic serum bottles with thick\
  \ butyl rubber stoppers\n\nModified DSM 120 medium with no yeast extract, Casitone,\
  \ or resazurin. Specific composition: 0.5 mM sulfide, 1 mM cysteine, 0.002 g/L CaCl2\xB7\
  2H2O, 1 g/L NaCl, 2 g/L NaHCO3. Medium boiled to reduce oxygen, cooled under N2/CO2\
  \ gas mixture. Sulfide and cysteine essential for long-term M. barkeri cultivation.\
  \ Initial cocultures: 0.5 ml each organism in 9 ml medium; later transfers: 10%\
  \ inocula in 45 ml medium."
