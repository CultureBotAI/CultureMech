preparation_steps:
- step_number: 1
  action: ADJUST_PH
  description: Adjust pH to 7.5.
- step_number: 2
  action: AUTOCLAVE
  description: Autoclave at 121°C for 15 min. Before inoculation add 1.0 ml/ l 5%
    sulfide solution pH 7.5 and 1.0 ml/l vitamin solution.
- step_number: 3
  action: ADJUST_PH
  description: First dissolve nitrilotriacetic acid and adjust pH to 6.5 with KOH,
    then add minerals. Final pH 7.0 (with KOH).
applications:
- Microbial cultivation
