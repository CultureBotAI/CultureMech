preparation_steps:
- step_number: 1
  action: AUTOCLAVE
  description: Mix components except L-cysteine x HCl x H2O and Na2S x 9H2O, bring
    to a boil and cool down under a steam of N2. Distribute the medium into culture
    vessels under a N2 gas atmosphere, seal with butyl rubber stoppers and autoclave.
    Separately autoclave 5% L-cysteine x HCl x H2O solution and 5% Na2S x 9H2O solution
    under a N2 gas atmosphere. Prior to inoculation, aseptically and anaerobically
    add L-cysteine x HCl x H2O and Na2S x 9H2O solutions to the medium.
